<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hub">
  <meta name="theme-color" content="#09090f">
  <link rel="manifest" href="./manifest.json">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <title>Hub</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
    :root {
      --bg: #09090f;
      --bg1: #0f0f18;
      --bg2: #14141f;
      --bg3: #1a1a28;
      --surf: #1f1f30;
      --surf2: #272738;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.11);
      --border3: rgba(255, 255, 255, 0.18);
      --text: #eeeef5;
      --text2: #8888a8;
      --text3: #4c4c68;
      --acc: #6e5cf5;
      --acc2: #9b8af9;
      --acc-glow: rgba(110, 92, 245, .28);
      --green: #3ecf7a;
      --green-bg: rgba(62, 207, 122, .1);
      --red: #f05f5f;
      --red-bg: rgba(240, 95, 95, .1);
      --amber: #f5bb45;
      --amber-bg: rgba(245, 187, 69, .1);
      --r: 20px;
      --r-sm: 12px;
      --sh: 0 12px 40px rgba(0, 0, 0, .5);
      --fd: 'Bricolage Grotesque', sans-serif;
      --fb: 'Instrument Sans', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fb);
      min-height: 100dvh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
    #shell {
      width: 100%;
      max-width: 768px;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media(min-width:520px) {
      #shell {
        border-left: 1px solid var(--border2);
        border-right: 1px solid var(--border2);
      }
    }

    /* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column-reverse;
      background: var(--bg);
      transition: transform .32s cubic-bezier(.32, .72, 0, 1);
      will-change: transform;
    }

    .view.behind {
      transform: translateX(-30%);
      pointer-events: none;
    }

    .view.active {
      transform: translateX(0);
    }

    .view.forward {
      transform: translateX(100%);
      pointer-events: none;
    }

    .view-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 24px);
      scrollbar-width: none;
    }

    .view-scroll::-webkit-scrollbar {
      display: none;
    }

    /* ═══════════════════════════════════════════
   HOME HEADER
═══════════════════════════════════════════ */
    .home-header {
      padding: 31px 22px 0;
      flex-shrink: 0;
    }

    .home-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .logo {
      font-family: var(--fd);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(130deg, #fff 30%, var(--acc2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--acc);
      border-radius: 50%;
      margin-left: 1px;
      box-shadow: 0 0 10px var(--acc);
      vertical-align: super;
    }

    .home-top-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #homeDate {
      font-size: 13px;
      color: var(--text3);
      letter-spacing: .4px;
    }

    /* Botão instalar PWA — oculto por padrão */
    #btnInstall {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid var(--acc-glow);
      background: rgba(110, 92, 245, .12);
      color: var(--acc2);
      font-family: var(--fb);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    #btnInstall:hover {
      background: rgba(110, 92, 245, .22);
    }

    .home-sub {
      font-size: 13.5px;
      color: var(--text3);
      margin-bottom: 14px;
    }

    /* chips */
    .chips-row {
      margin: 10px 23px 0px 27px;
      display: flex;
      gap: 8px;
      overflow-x: scroll;
      padding: 0 22px 6px;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .chips-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex-shrink: 0;
      padding: 11px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text2);
      font-family: var(--fb);
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .chip.on {
      background: var(--acc);
      border-color: var(--acc);
      color: #fff;
      box-shadow: 0 4px 16px var(--acc-glow);
    }

    .chip:hover:not(.on) {
      border-color: var(--border3);
      color: var(--text);
    }

    /* home content */
    .home-content {
      padding: 4px 22px 110px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin: 14px 0 10px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 16px 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .14s, border-color .14s, box-shadow .14s;
      animation: up .28s ease both;
    }

    .card:active {
      transform: scale(.975);
    }

    .card:hover {
      border-color: var(--border2);
      box-shadow: var(--sh);
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .card-stripe {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-type {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .card-del {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .14s, color .14s;
    }

    .card-del:hover {
      background: var(--red-bg);
      color: var(--red);
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-g {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge-a {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .badge-p {
      background: rgba(110, 92, 245, .14);
      color: var(--acc2);
    }

    .card-age {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── Undo toast ── */
    .toast-undo {
      display: inline;
      margin-left: 8px;
      color: var(--acc2);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
    .fab-wrap {
      position: fixed;
      bottom: 28px;
      right: 0px;
      left: 0;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 22px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 80;
    }

    .fab {
      pointer-events: all;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--acc), #9e8cfb);
      border: none;
      color: #fff;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 28px var(--acc-glow), 0 3px 10px rgba(0, 0, 0, .3);
      transition: transform .13s, box-shadow .13s;
    }

    .fab:active {
      transform: scale(.91);
    }

    /* ═══════════════════════════════════════════
   SHEET / OVERLAY
═══════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(7px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease;
    }

    .overlay.on {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      width: 100%;
      max-width: 480px;
      background: var(--bg1);
      border-radius: 26px 26px 0 0;
      border: 1px solid var(--border2);
      border-bottom: none;
      padding-bottom: env(safe-area-inset-bottom, 22px);
      max-height: 90dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32, .72, 0, 1);
      scrollbar-width: none;
    }

    .sheet::-webkit-scrollbar {
      display: none;
    }

    .overlay.on .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 34px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 12px auto 6px;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 14px;
    }

    .sheet-title {
      font-family: var(--fd);
      font-size: 20px;
      font-weight: 700;
    }

    .x-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text2);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .14s;
    }

    .x-btn:hover {
      background: var(--surf2);
    }

    .sheet-body {
      padding: 0 20px 22px;
    }

    /* tiles */
    .tiles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 22px;
    }

    .tile {
      background: var(--surf);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: all .16s;
    }

    .tile:hover:not(.dim) {
      border-color: var(--border2);
    }

    .tile.sel {
      border-color: var(--acc);
      background: rgba(110, 92, 245, .1);
      box-shadow: 0 0 0 1px var(--acc);
    }

    .tile.dim {
      opacity: .38;
      cursor: not-allowed;
    }

    .tile-ico {
      font-size: 24px;
      display: block;
      margin-bottom: 5px;
    }

    .tile-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      line-height: 1.3;
    }

    .tile.sel .tile-lbl {
      color: var(--acc2);
    }

    .soon {
      display: inline-block;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 6px;
      background: var(--surf2);
      color: var(--text3);
      margin-top: 2px;
    }

    /* form */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--fb);
      font-size: 14.5px;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--acc);
      box-shadow: 0 0 0 3px var(--acc-glow);
    }

    .field textarea {
      min-height: 76px;
    }

    .btn-main {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--acc), #9e8cfb);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 18px var(--acc-glow);
      transition: transform .13s;
    }

    .btn-main:active {
      transform: scale(.98);
    }

    /* ═══════════════════════════════════════════
   PLUGIN NAV
═══════════════════════════════════════════ */
    .plugin-nav {
      padding: 50px 18px 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back {
      width: 38px;
      height: 55px;
      border-radius: 11px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .13s;
    }

    .back:hover {
      background: var(--surf2);
    }

    .plugin-nav-info {
      flex: 1;
      min-width: 0;
    }

    .plugin-nav-title {
      font-family: var(--fd);
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plugin-nav-sub {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .nav-actions {
      display: flex;
      gap: 4px;
    }

    .ico-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .13s, color .13s;
    }

    .ico-btn:hover {
      background: var(--surf);
      color: var(--text);
    }

    /* ═══════════════════════════════════════════
   EMPTY
═══════════════════════════════════════════ */
    .empty {
      text-align: center;
      padding: 56px 28px;
      animation: up .35s ease both;
    }

    .empty .ico {
      font-size: 50px;
      display: block;
      margin-bottom: 14px;
    }

    .empty h3 {
      font-family: var(--fd);
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    .empty p {
      font-size: 14px;
      color: var(--text3);
      line-height: 1.6;
      max-width: 240px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--surf2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 9px 16px;
      font-size: 13.5px;
      color: var(--text);
      box-shadow: var(--sh);
      z-index: 999;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }

    #toast.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════════
   HOME SEARCH BAR
═══════════════════════════════════════════ */
    .home-search-row {
      display: flex;
      gap: 8px;
      padding: 5px 22px 10px;
      align-items: center;
    }

    .home-search-wrap {
      position: relative;
      flex: 1;
    }

    .home-search {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 14px 36px 13px 72px;
      color: var(--text);
      font-family: var(--fb);
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .home-search:focus {
      border-color: var(--acc);
      box-shadow: 0 0 0 3px var(--acc-glow);
    }

    .home-search-ico {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      opacity: .45;
    }

    .home-search-actions {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
      flex-direction: row-reverse;
    }

    .hs-btn {
      width: 26px;
      height: 29px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .13s, color .13s;
    }

    .hs-btn:hover {
      background: var(--surf2);
      color: var(--text);
    }

    .hs-btn.active {
      color: var(--red);
      animation: recPulse2 1.4s ease-in-out infinite;
    }

    @keyframes recPulse2 {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* ═══════════════════════════════════════════
   IMPORT / EXPORT
═══════════════════════════════════════════ */
    .io-sheet-body {
      padding: 0 20px 24px;
    }

    .io-section {
      margin-bottom: 20px;
    }

    .io-title {
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .io-sub {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .io-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 14px 16px;
      border-radius: 13px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text);
      font-family: var(--fb);
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 8px;
    }

    .io-btn:hover {
      border-color: var(--border3);
      background: var(--surf2);
    }

    .io-btn-ico {
      font-size: 20px;
      flex-shrink: 0;
    }

    .io-btn-info {
      flex: 1;
      text-align: left;
    }

    .io-btn-label {
      font-family: var(--fd);
      font-size: 14px;
      font-weight: 600;
    }

    .io-btn-desc {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 1px;
    }

    .io-btn.accent {
      background: rgba(110, 92, 245, .1);
      border-color: var(--acc);
      color: var(--acc2);
    }

    .io-btn.accent:hover {
      background: rgba(110, 92, 245, .18);
    }

    .io-file-input {
      display: none;
    }

    .io-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ═══════════════════════════════════════════
   OFFLINE BANNER
═══════════════════════════════════════════ */
    #offlineBanner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--amber-bg);
      border-bottom: 1px solid var(--amber);
      color: var(--amber);
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      padding: 7px 16px;
      z-index: 9999;
    }

    #offlineBanner.on {
      display: block;
    }
  </style>

<body>

  <!-- Offline banner -->
  <div id="offlineBanner">📡 Você está offline — dados salvos localmente</div>

  <div id="shell">

    <!-- HOME VIEW -->
    <div class="view active" id="viewHome">
      <header class="home-header">
        <div class="home-top">
          <span class="logo">Hub<span class="logo-dot"></span></span>
          <div class="home-top-right">
            <button id="btnInstall" onclick="PWA.install()" title="Instalar app">
              ⬇️ Instalar
            </button>
            <span id="homeDate"></span>
          </div>
        </div>
        <div class="home-sub">Meu espaço pessoal</div>
      </header>

      <div class="home-search-row">
        <div class="home-search-wrap">
          <span class="home-search-ico">🔍</span>
          <input class="home-search" id="homeSearch" type="text" placeholder="Pesquisar registros…"
            oninput="Home.onSearch(this.value)">
          <div class="home-search-actions">
            <button class="hs-btn" id="hsClear" style="display:none" onclick="Home.clearSearch()"
              title="Limpar">✕</button>
            <button class="hs-btn" id="hsMic" onclick="Home.toggleVoice()" title="Pesquisar por voz">🎙️</button>
          </div>
        </div>
      </div>

      <div class="chips-row" id="chipsRow"></div>

      <div class="view-scroll">
        <div class="home-content">
          <p class="section-label">Registros</p>
          <div class="cards" id="cardsContainer"></div>
        </div>
      </div>
    </div>

    <!-- PLUGIN VIEW -->
    <div class="view forward" id="viewPlugin">
      <nav class="plugin-nav">
        <button class="back" id="pluginBack">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <div class="plugin-nav-info">
          <div class="plugin-nav-title" id="pluginNavTitle">—</div>
          <div class="plugin-nav-sub" id="pluginNavSub">—</div>
        </div>
        <div class="nav-actions" id="pluginNavActions"></div>
      </nav>
      <div class="view-scroll" id="pluginBody"></div>
    </div>

    <!-- FAB -->
    <div class="fab-wrap">
      <button class="fab" id="fabBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ADD SHEET -->
  <div class="overlay" id="addOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <span class="sheet-title">Novo registro</span>
        <button class="x-btn" id="sheetClose">✕</button>
      </div>
      <div class="sheet-body">
        <p class="section-label" style="margin-top:0">Tipo</p>
        <div class="tiles" id="pluginTiles"></div>
        <div class="field">
          <label>Título</label>
          <input type="text" id="newTitle" placeholder="Nome do registro…" />
        </div>
        <div class="field">
          <label>Descrição <span style="opacity:.4;font-size:10px">(opcional)</span></label>
          <textarea id="newDesc" placeholder="Adicione uma descrição…"></textarea>
        </div>
        <button class="btn-main" id="createBtn">Criar registro</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- IO SHEET -->
  <div class="overlay" id="ioOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <span class="sheet-title" id="ioSheetTitle">Importar / Exportar</span>
        <button class="x-btn" onclick="IO.close()">✕</button>
      </div>
      <div class="io-sheet-body">
        <div class="io-section">
          <div class="io-title">📤 Exportar</div>
          <div class="io-sub">Salva um arquivo <code>.hubplugin</code> com todos os dados deste registro.</div>
          <button class="io-btn accent" onclick="IO.exportRecord()">
            <span class="io-btn-ico">💾</span>
            <div class="io-btn-info">
              <div class="io-btn-label">Exportar este registro</div>
              <div class="io-btn-desc">Gera um arquivo .hubplugin para download</div>
            </div>
          </button>
        </div>
        <div class="io-divider"></div>
        <div class="io-section">
          <div class="io-title">📥 Importar</div>
          <div class="io-sub">Selecione um arquivo <code>.hubplugin</code> exportado anteriormente.</div>
          <button class="io-btn" onclick="document.getElementById('ioFileInput').click()">
            <span class="io-btn-ico">📂</span>
            <div class="io-btn-info">
              <div class="io-btn-label">Selecionar arquivo .hubplugin</div>
              <div class="io-btn-desc">Abre o seletor de arquivos</div>
            </div>
          </button>
          <input type="file" id="ioFileInput" class="io-file-input" accept=".hubplugin,.json"
            onchange="IO.importFile(this)">
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
     CORE ENGINE
════════════════════════════════════════════ -->
  <script>
    'use strict';

    /* ─────────────────────────────────────────
       INDEXEDDB
    ───────────────────────────────────────── */
    const DB = (() => {
      let _db;
      const _ready = new Promise((res, rej) => {
        const req = indexedDB.open('hub_v1', 1);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('records')) {
            const st = d.createObjectStore('records', { keyPath: 'id' });
            st.createIndex('type', 'type', { unique: false });
            st.createIndex('createdAt', 'createdAt', { unique: false });
          }
        };
        req.onsuccess = e => { _db = e.target.result; res(_db); };
        req.onerror = () => rej(req.error);
      });

      const _st = mode => _ready.then(d => d.transaction('records', mode).objectStore('records'));
      const _p = req => new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });

      return {
        getAll: () => _st('readonly').then(st => _p(st.getAll())),
        get: id => _st('readonly').then(st => _p(st.get(id))),
        put: rec => _st('readwrite').then(st => _p(st.put(rec))),
        del: id => _st('readwrite').then(st => _p(st.delete(id))),
      };
    })();

    /* ─────────────────────────────────────────
       PLUGIN REGISTRY
       ─────────────────────────────────────────
       registerPlugin(obj) registra um plugin.
       Se o plugin incluir a propriedade `css`,
       o engine injeta o estilo automaticamente —
       não é necessário colar CSS no <style>.
    ───────────────────────────────────────── */
    const PLUGINS = [];

    function registerPlugin(p) {
      /* Auto-inject CSS se o plugin trouxer o seu próprio */
      if (p.css) {
        const style = document.createElement('style');
        style.setAttribute('data-plugin', p.id);
        style.textContent = p.css;
        document.head.appendChild(style);
      }
      PLUGINS.push(p);
    }

    /* ─────────────────────────────────────────
       APP STATE
    ───────────────────────────────────────── */
    const App = {
      records: [],
      currentFilter: 'all',
      activeRecord: null,
      activePlugin: null,
      searchQuery: '',

      async loadAll() {
        const rows = await DB.getAll();
        this.records = rows.sort((a, b) => b.updatedAt - a.updatedAt);
      },

      async saveRecord(rec) {
        rec.updatedAt = Date.now();
        await DB.put(rec);
        const i = this.records.findIndex(r => r.id === rec.id);
        if (i >= 0) this.records[i] = rec; else this.records.unshift(rec);
        this.records.sort((a, b) => b.updatedAt - a.updatedAt);
      },

      async deleteRecord(id) {
        await DB.del(id);
        this.records = this.records.filter(r => r.id !== id);
      },
    };

    /* ─────────────────────────────────────────
       NAVIGATION
    ───────────────────────────────────────── */
    const Nav = {
      openPlugin(record) {
        /* Guard: registro pode ter sido deletado */
        if (!record) return;

        const plugin = PLUGINS.find(p => p.id === record.type);
        if (!plugin) { toast('Plugin não encontrado'); return; }

        App.activeRecord = record;
        App.activePlugin = plugin;

        document.getElementById('pluginNavTitle').textContent = record.title;
        document.getElementById('pluginNavSub').textContent = plugin.name;

        const actionsEl = document.getElementById('pluginNavActions');
        const pluginBtns = (plugin.navActions || []).map(a =>
          `<button class="ico-btn" data-action="${a.id}" title="${a.title}">${a.icon}</button>`
        ).join('');
        const ioBtnHtml = `<button class="ico-btn" data-action="__io" title="Importar / Exportar">📦</button>`;
        actionsEl.innerHTML = pluginBtns + ioBtnHtml;
        actionsEl.onclick = e => {
          const btn = e.target.closest('[data-action]');
          if (!btn) return;
          if (btn.dataset.action === '__io') { IO.open(record); return; }
          const action = (plugin.navActions || []).find(a => a.id === btn.dataset.action);
          if (action) action.handler(record);
        };

        const body = document.getElementById('pluginBody');
        body.innerHTML = '';
        plugin.mount(body, record);

        document.getElementById('viewHome').className = 'view behind';
        document.getElementById('viewPlugin').className = 'view active';
        document.getElementById('fabBtn').style.display = 'none';
      },

      closePlugin() {
        if (App.activePlugin?.unmount) App.activePlugin.unmount();
        document.getElementById('viewHome').className = 'view active';
        document.getElementById('viewPlugin').className = 'view forward';
        document.getElementById('fabBtn').style.display = '';
        App.activeRecord = null;
        App.activePlugin = null;
        Home.render();
      },
    };

    /* ─────────────────────────────────────────
       HOME
    ───────────────────────────────────────── */
    const Home = {
      _voiceRec: null,
      _voiceActive: false,
      _searchTimer: null,

      render() {
        this._renderChips();
        this._renderCards();
      },

      _renderChips() {
        const row = document.getElementById('chipsRow');
        row.innerHTML = [
          { id: 'all', label: 'Todos' },
          ...PLUGINS.map(p => ({ id: p.id, label: p.icon + ' ' + p.name }))
        ].map(c =>
          `<button class="chip ${App.currentFilter === c.id ? 'on' : ''}"
            onclick="App.currentFilter='${c.id}';Home.render()">
            ${c.label}
          </button>`
        ).join('');
      },

      _renderCards() {
        const cont = document.getElementById('cardsContainer');
        const q = App.searchQuery.toLowerCase().trim();

        let list = App.currentFilter === 'all'
          ? App.records
          : App.records.filter(r => r.type === App.currentFilter);

        if (q) {
          list = list.filter(r =>
            r.title.toLowerCase().includes(q) ||
            (r.description || '').toLowerCase().includes(q) ||
            PLUGINS.find(p => p.id === r.type)?.name.toLowerCase().includes(q)
          );
        }

        if (!list.length) {
          cont.innerHTML = q
            ? `<div class="empty"><span class="ico">🔍</span><h3>Nada encontrado</h3>
               <p>Nenhum registro corresponde a "<strong>${esc(q)}</strong>".</p></div>`
            : `<div class="empty"><span class="ico">✨</span><h3>Nenhum registro ainda</h3>
               <p>Toque no <strong>+</strong> para criar o primeiro.</p></div>`;
          return;
        }

        cont.innerHTML = list.map((rec, i) => {
          const plugin = PLUGINS.find(p => p.id === rec.type);
          if (!plugin) return '';
          const preview = plugin.cardPreview?.(rec) || '';
          const badge = plugin.cardBadge?.(rec) || '';
          const date = new Date(rec.createdAt).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
          return `
            <div class="card" style="animation-delay:${i * .05}s"
              onclick="Nav.openPlugin(App.records.find(r=>r.id==='${rec.id}'))">
              <div class="card-stripe" style="background:${plugin.color}"></div>
              <div class="card-head">
                <div class="card-icon" style="background:${plugin.color}22">${plugin.icon}</div>
                <div class="card-info">
                  <div class="card-name">${esc(rec.title)}</div>
                  <div class="card-type">${plugin.name}</div>
                </div>
                <button class="card-del"
                  onclick="event.stopPropagation();Sheet.deleteRecord('${rec.id}')">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
              ${preview ? `<div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5">${preview}</div>` : ''}
              <div class="card-foot">${badge}<span class="card-age">${date}</span></div>
            </div>`;
        }).join('');
      },

      onSearch(val) {
        /* Debounce: evita re-render a cada tecla em celular lento */
        clearTimeout(this._searchTimer);
        const clearBtn = document.getElementById('hsClear');
        if (clearBtn) clearBtn.style.display = val ? '' : 'none';
        this._searchTimer = setTimeout(() => {
          App.searchQuery = val;
          this._renderCards();
        }, 120);
      },

      clearSearch() {
        App.searchQuery = '';
        const inp = document.getElementById('homeSearch');
        if (inp) inp.value = '';
        const clearBtn = document.getElementById('hsClear');
        if (clearBtn) clearBtn.style.display = 'none';
        this._renderCards();
        inp?.focus();
      },

      toggleVoice() {
        if (this._voiceActive) { this._stopVoice(); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { toast('Reconhecimento de voz não suportado neste navegador'); return; }
        const mic = document.getElementById('hsMic');
        this._voiceRec = new SR();
        this._voiceRec.lang = 'pt-BR';
        this._voiceRec.continuous = false;
        this._voiceRec.interimResults = true;
        this._voiceRec.onstart = () => { this._voiceActive = true; if (mic) mic.classList.add('active'); toast('🎙️ Ouvindo…'); };
        this._voiceRec.onresult = e => {
          const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
          const inp = document.getElementById('homeSearch');
          if (inp) inp.value = transcript;
          this.onSearch(transcript);
        };
        this._voiceRec.onerror = () => { this._stopVoice(); toast('Erro no microfone'); };
        this._voiceRec.onend = () => this._stopVoice();
        this._voiceRec.start();
      },

      _stopVoice() {
        this._voiceActive = false;
        const mic = document.getElementById('hsMic');
        if (mic) mic.classList.remove('active');
        try { this._voiceRec?.stop(); } catch (e) { }
        this._voiceRec = null;
      },
    };

    /* ─────────────────────────────────────────
       ADD SHEET
    ───────────────────────────────────────── */
    const Sheet = {
      selectedType: null,
      _undoTimer: null,
      _undoPending: null,

      open() {
        this.selectedType = PLUGINS[0]?.id ?? null;
        this._renderTiles();
        document.getElementById('newTitle').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('addOverlay').classList.add('on');
        setTimeout(() => document.getElementById('newTitle').focus(), 340);
      },

      close() { document.getElementById('addOverlay').classList.remove('on'); },

      _renderTiles() {
        const COMING_SOON = [
          // { icon:'📊', name:'Tabela' }
        ];
        const tiles = [
          ...PLUGINS.map(p => ({
            html: `<div class="tile ${p.id === this.selectedType ? 'sel' : ''}"
              onclick="Sheet.selectType('${p.id}',this)">
              <span class="tile-ico">${p.icon}</span>
              <span class="tile-lbl">${p.name}</span>
            </div>`
          })),
          ...COMING_SOON.map(c => ({
            html: `<div class="tile dim">
              <span class="tile-ico">${c.icon}</span>
              <span class="tile-lbl">${c.name}<br><span class="soon">em breve</span></span>
            </div>`
          }))
        ];
        document.getElementById('pluginTiles').innerHTML = tiles.map(t => t.html).join('');
      },

      selectType(id, el) {
        this.selectedType = id;
        document.querySelectorAll('#pluginTiles .tile').forEach(t => t.classList.remove('sel'));
        el.classList.add('sel');
      },

      async create() {
        const title = document.getElementById('newTitle').value.trim();
        if (!title) { toast('Insira um título'); return; }
        if (!this.selectedType) { toast('Selecione um tipo'); return; }
        const plugin = PLUGINS.find(p => p.id === this.selectedType);
        if (!plugin) { toast('Plugin inválido'); return; }

        const rec = {
          id: 'r' + Date.now(),
          type: plugin.id,
          title,
          description: document.getElementById('newDesc').value.trim(),
          createdAt: Date.now(),
          updatedAt: Date.now(),
          data: plugin.defaultData?.() ?? {},
        };

        await App.saveRecord(rec);
        this.close();
        Home.render();
        toast(plugin.icon + ' Criado!');
        setTimeout(() => Nav.openPlugin(rec), 340);
      },

      /* ── Delete com Desfazer ── */
      deleteRecord(id) {
        /* Cancela undo anterior pendente se houver */
        if (this._undoPending) {
          App.deleteRecord(this._undoPending);
          this._undoPending = null;
          clearTimeout(this._undoTimer);
        }

        /* Remove da lista visual imediatamente */
        App.records = App.records.filter(r => r.id !== id);
        Home.render();

        this._undoPending = id;
        toastUndo('🗑 Removido', () => {
          /* Usuário tocou em Desfazer */
          clearTimeout(this._undoTimer);
          this._undoPending = null;
          App.loadAll().then(() => Home.render());
        });

        /* Confirma deleção real após 3.5s */
        this._undoTimer = setTimeout(async () => {
          if (this._undoPending === id) {
            await App.deleteRecord(id);
            this._undoPending = null;
          }
        }, 3500);
      },
    };

    /* ─────────────────────────────────────────
       IMPORT / EXPORT
    ───────────────────────────────────────── */
    const IO = {
      _record: null,

      open(record) {
        this._record = record;
        const plugin = PLUGINS.find(p => p.id === record.type);
        document.getElementById('ioSheetTitle').textContent =
          (plugin?.icon || '') + ' ' + (plugin?.name || 'Registro') + ' · I/O';
        document.getElementById('ioOverlay').classList.add('on');
      },

      close() {
        document.getElementById('ioOverlay').classList.remove('on');
        const fi = document.getElementById('ioFileInput');
        if (fi) fi.value = '';
      },

      exportRecord() {
        if (!this._record) return;
        const payload = {
          __hub_version: 1,
          plugin: this._record.type,
          exportedAt: Date.now(),
          record: this._record,
        };
        const json = JSON.stringify(payload, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${this._record.title.replace(/[^a-z0-9]/gi, '_')}_${this._record.type}.hubplugin`;
        a.click();
        URL.revokeObjectURL(url);
        toast('📤 Exportado com sucesso!');
      },

      importFile(input) {
        const file = input.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async e => {
          try {
            const payload = JSON.parse(e.target.result);
            if (payload.__hub_version !== 1 || !payload.record || !payload.plugin) {
              toast('❌ Arquivo inválido ou corrompido'); return;
            }
            const plugin = PLUGINS.find(p => p.id === payload.plugin);
            if (!plugin) { toast(`❌ Plugin "${payload.plugin}" não instalado`); return; }

            const rec = payload.record;
            const existing = App.records.find(r => r.id === rec.id);
            if (existing) {
              Object.assign(existing, rec);
              await App.saveRecord(existing);
              toast('♻️ Registro atualizado!');
            } else {
              rec.createdAt = rec.createdAt || Date.now();
              rec.updatedAt = Date.now();
              await App.saveRecord(rec);
              toast('📥 Registro importado: ' + rec.title);
            }
            this.close();
            Home.render();
          } catch (err) {
            toast('❌ Erro ao importar: ' + err.message);
          }
        };
        reader.readAsText(file);
      },
    };

    /* ─────────────────────────────────────────
       PWA — Instalar + Offline
    ───────────────────────────────────────── */
    const PWA = {
      _prompt: null,

      init() {
        /* Captura o evento de instalação */
        window.addEventListener('beforeinstallprompt', e => {
          e.preventDefault();
          this._prompt = e;
          const btn = document.getElementById('btnInstall');
          if (btn) btn.style.display = 'flex';
        });

        /* Esconde botão após instalar */
        window.addEventListener('appinstalled', () => {
          const btn = document.getElementById('btnInstall');
          if (btn) btn.style.display = 'none';
          toast('✅ App instalado!');
        });

        /* Banner offline */
        const banner = document.getElementById('offlineBanner');
        const update = () => banner && banner.classList.toggle('on', !navigator.onLine);
        window.addEventListener('online', update);
        window.addEventListener('offline', update);
        update();

        /* Registra service worker */
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(() => { });
        }
      },

      async install() {
        if (!this._prompt) { toast('Já instalado ou não disponível'); return; }
        const result = await this._prompt.prompt();
        if (result?.outcome === 'accepted') toast('✅ Instalando…');
        this._prompt = null;
        const btn = document.getElementById('btnInstall');
        if (btn) btn.style.display = 'none';
      },
    };

    /* ─────────────────────────────────────────
       UTILS
    ───────────────────────────────────────── */
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* Toast simples */
    let _toastT;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.innerHTML = esc(msg);
      el.classList.add('on');
      clearTimeout(_toastT);
      _toastT = setTimeout(() => el.classList.remove('on'), 2200);
    }

    /* Toast com botão Desfazer */
    let _undoCb;
    function toastUndo(msg, onUndo) {
      _undoCb = onUndo;
      const el = document.getElementById('toast');
      el.innerHTML = esc(msg) + ' <span class="toast-undo" onclick="_undoCb&&_undoCb()">Desfazer</span>';
      el.classList.add('on');
      clearTimeout(_toastT);
      _toastT = setTimeout(() => el.classList.remove('on'), 3500);
    }

    /* Data com atualização automática à meia-noite */
    function _updateDate() {
      const el = document.getElementById('homeDate');
      if (el) el.textContent = new Date().toLocaleDateString('pt-BR', {
        weekday: 'short', day: 'numeric', month: 'short'
      });
    }
    _updateDate();
    setInterval(_updateDate, 60_000);

    /* ─────────────────────────────────────────
       WIRE HANDLERS
    ───────────────────────────────────────── */
    document.getElementById('fabBtn').onclick = () => Sheet.open();
    document.getElementById('sheetClose').onclick = () => Sheet.close();
    document.getElementById('createBtn').onclick = () => Sheet.create();
    document.getElementById('pluginBack').onclick = () => Nav.closePlugin();
    document.getElementById('addOverlay').onclick = e => { if (e.target === e.currentTarget) Sheet.close(); };
    document.getElementById('ioOverlay').onclick = e => { if (e.target === e.currentTarget) IO.close(); };

    /* Swipe-back */
    (() => {
      const v = document.getElementById('viewPlugin');
      let sx = 0, sy = 0;
      v.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
      v.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = Math.abs(e.changedTouches[0].clientY - sy);
        if (dx > 60 && dy < 40 && sx < 60) Nav.closePlugin();
      }, { passive: true });
    })();

  </script>

      defaultData: () => ({ clips: [] }),

      /* ── Card na home ───────────────────────── */
      cardPreview(rec) {
        const n = (rec.data.clips || []).length;
        if (!n) return 'Sem gravações ainda';
        const total = (rec.data.clips || []).reduce((s, c) => s + (c.duration || 0), 0);
        return `${n} gravação${n !== 1 ? 's' : ''} · ${this._fmtDur(total)} total`;
      },
      cardBadge(rec) {
        const n = (rec.data.clips || []).length;
        if (!n) return '<span class="badge badge-p">Vazio</span>';
        return `<span class="badge badge-g">🎙️ ${n} clip${n !== 1 ? 's' : ''}</span>`;
      },

      navActions: [{
        id: 'sort', icon: '⇅', title: 'Mais recentes primeiro',
        handler(rec) {
          const p = App.activePlugin;
          p._sortAsc = !p._sortAsc;
          p._render();
        }
      }],

      /* ── Estado interno ─────────────────────── */
      _el: null, _rec: null,
      _mediaRec: null,   // MediaRecorder
      _recState: 'idle', // idle | recording | paused
      _recChunks: [],
      _recSeconds: 0,
      _recTimer: null,
      _waveTimer: null,
      _pendingBlob: null,   // blob waiting to be saved
      _pendingDur: 0,
      _audioCtx: null,
      _analyser: null,
      _srcNode: null,
      _stream: null,
      _playingId: null,
      _audioEl: null,
      _renamingId: null,
      _sortAsc: false,
      _searchQ: '',

      /* ══ HOOKS ══════════════════════════════════ */
      mount(container, rec) {
        this._el = container;
        this._rec = rec;
        this._recState = 'idle';
        this._pendingBlob = null;
        this._playingId = null;
        this._renamingId = null;
        this._searchQ = '';
        this._render();
      },

      unmount() {
        this._stopPlayback();
        this._cancelRec();
        this._el = null;
        this._rec = null;
      },

      /* ── save ───────────────────────────────── */
      async _save() { await App.saveRecord(this._rec); },

      /* ════════════════════════════════════════════
         RENDER
      ════════════════════════════════════════════ */
      _render() {
        if (!this._el) return;
        const clips = this._rec.data.clips || [];
        const n = clips.length;

        document.getElementById('pluginNavSub').textContent =
          `${n} gravação${n !== 1 ? 's' : ''} · ${this._fmtDur(clips.reduce((s, c) => s + (c.duration || 0), 0))} total`;

        this._el.innerHTML = `
      <div class="au-wrap">

        ${/* ── search ── */ ''}
        <div class="au-search-row">
          <div class="au-search-wrap">
            <span class="au-search-ico">🔍</span>
            <input class="au-search" id="au_search" type="text"
              placeholder="Pesquisar gravações…"
              value="${esc(this._searchQ)}"
              oninput="App.activePlugin._onSearch(this.value)">
          </div>
        </div>

        ${/* ── recorder zone ── */ ''}
        <div class="au-rec-zone">
          ${this._recState === 'idle' && !this._pendingBlob ? `
            <button class="au-rec-btn idle" onclick="App.activePlugin._startRec()">
              <span class="au-rec-ico">🎙️</span>
            </button>
            <span class="au-timer">00:00</span>
            <span class="au-rec-label">Toque para gravar</span>
          ` : this._recState !== 'idle' ? `
            <div class="au-wave-row" id="au_wave">
              ${Array.from({ length: 20 }, (_, i) => `<div class="au-wave-bar" id="aubar_${i}" style="height:${4 + Math.random() * 20}px"></div>`).join('')}
            </div>
            <span class="au-timer ${this._recState}" id="au_timer">${this._fmtSec(this._recSeconds)}</span>
            <div class="au-ctrl-row">
              ${this._recState === 'recording' ? `
                <button class="au-ctrl-btn" onclick="App.activePlugin._pauseRec()">⏸ Pausar</button>
              ` : `
                <button class="au-ctrl-btn" onclick="App.activePlugin._resumeRec()">▶ Continuar</button>
              `}
              <button class="au-ctrl-btn" onclick="App.activePlugin._stopRec()">⏹ Salvar</button>
              <button class="au-ctrl-btn danger" onclick="App.activePlugin._cancelRec()">✕</button>
            </div>
          ` : ''}

          ${/* ── pending save ── */ this._pendingBlob ? `
            <div class="au-save-box">
              <div class="au-save-title">💾 Salvar gravação · ${this._fmtSec(this._pendingDur)}</div>
              <div class="au-save-row">
                <input class="au-save-inp" id="au_pending_title" type="text"
                  placeholder="Nome da gravação…" value=""
                  onkeydown="if(event.key==='Enter')App.activePlugin._saveClip()">
                <button class="au-save-btn" onclick="App.activePlugin._saveClip()">Salvar</button>
                <button class="au-discard-btn" onclick="App.activePlugin._discardPending()">✕</button>
              </div>

        </div>

        ${/* ── list ── */ ''}
        ${n === 0 ? `
          <div class="au-empty">
            <span class="ico">🎙️</span>

            <p>Toque no botão acima para gravar sua primeira nota de áudio.</p>

        ` : `
          <p class="au-section-lbl">Gravações</p>
          <div class="au-list">
            ${this._filteredClips().map((clip, i) => this._clipCard(clip, i)).join('')}

      </div>`;

        /* restart live waveform if recording */
        if (this._recState !== 'idle') this._startWaveAnim();
        /* focus pending title */
        if (this._pendingBlob) {
          setTimeout(() => document.getElementById('au_pending_title')?.focus(), 80);
        }
      },

      _clipCard(clip, i) {
        const isPlaying = this._playingId === clip.id;
        const isRenaming = this._renamingId === clip.id;
        const date = new Date(clip.createdAt).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

        return `
      <div class="au-card" style="animation-delay:${i * .04}s" id="aucard_${clip.id}">
        <div class="au-card-head">
          <button class="au-play-btn ${isPlaying ? 'playing' : 'idle'}"
            onclick="App.activePlugin._togglePlay('${clip.id}')">
            ${isPlaying ? '⏸' : '▶'}
          </button>
          <div class="au-card-info">
            <div class="au-card-title">${esc(clip.title || 'Sem título')}</div>
            <div class="au-card-meta">${this._fmtDur(clip.duration)} · ${date}</div>
          </div>
          <button class="au-card-del" onclick="App.activePlugin._renameStart('${clip.id}')" title="Renomear" style="font-size:13px;">✏️</button>
          <button class="au-card-del" onclick="App.activePlugin._deleteClip('${clip.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>

        ${isRenaming ? `
          <div class="au-rename-row">
            <input class="au-rename-inp" id="au_rename_inp" type="text"
              value="${esc(clip.title || '')}" placeholder="Nome…"
              onkeydown="if(event.key==='Enter')App.activePlugin._renameSave('${clip.id}')">
            <button class="au-rename-ok" onclick="App.activePlugin._renameSave('${clip.id}')">OK</button>
          </div>
        ` : ''}

        ${isPlaying ? `
          <div class="au-player">
            <input class="au-seek-track" id="au_seek" type="range" min="0" max="100" value="0"
              oninput="App.activePlugin._seek(this.value)">
            <div class="au-time-row">
              <span id="au_cur">0:00</span>
              <span>${this._fmtDur(clip.duration)}</span>
            </div>
          </div>
        ` : ''}
      </div>`;
      },

      /* ════════════════════════════════════════════
         RECORDER
      ════════════════════════════════════════════ */
      async _startRec() {
        try {
          this._stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          toast('Microfone não autorizado'); return;
        }

        /* Web Audio analyser for waveform */
        this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this._analyser = this._audioCtx.createAnalyser();
        this._analyser.fftSize = 64;
        this._srcNode = this._audioCtx.createMediaStreamSource(this._stream);
        this._srcNode.connect(this._analyser);

        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';

        this._mediaRec = new MediaRecorder(this._stream, mime ? { mimeType: mime } : {});
        this._recChunks = [];
        this._recSeconds = 0;

        this._mediaRec.ondataavailable = e => { if (e.data.size > 0) this._recChunks.push(e.data); };
        this._mediaRec.onstop = () => this._onRecStop();

        this._mediaRec.start(100);
        this._recState = 'recording';
        this._startTimer();
        this._render();
      },

      _pauseRec() {
        if (this._mediaRec?.state === 'recording') {
          this._mediaRec.pause();
          this._recState = 'paused';
          this._stopTimer();
          this._render();
        }
      },

      _resumeRec() {
        if (this._mediaRec?.state === 'paused') {
          this._mediaRec.resume();
          this._recState = 'recording';
          this._startTimer();
          this._render();
        }
      },

      _stopRec() {
        if (this._mediaRec && this._mediaRec.state !== 'inactive') {
          this._mediaRec.stop();
          this._stopTimer();
          this._stopWaveAnim();
          this._stream?.getTracks().forEach(t => t.stop());
        }
      },

      _cancelRec() {
        this._stopTimer();
        this._stopWaveAnim();
        if (this._mediaRec && this._mediaRec.state !== 'inactive') {
          this._mediaRec.onstop = null;
          this._mediaRec.stop();
        }
        this._stream?.getTracks().forEach(t => t.stop());
        this._audioCtx?.close();
        this._recState = 'idle';
        this._recChunks = [];
        this._pendingBlob = null;
        this._render();
      },

      _onRecStop() {
        const mime = this._mediaRec?.mimeType || 'audio/webm';
        this._pendingBlob = new Blob(this._recChunks, { type: mime });
        this._pendingDur = this._recSeconds;
        this._recState = 'idle';
        this._recChunks = [];
        this._audioCtx?.close();
        this._render();
      },

      /* timer */
      _startTimer() {
        this._recTimer = setInterval(() => {
          this._recSeconds++;
          const el = document.getElementById('au_timer');
          if (el) el.textContent = this._fmtSec(this._recSeconds);
        }, 1000);
      },
      _stopTimer() { clearInterval(this._recTimer); },

      /* live waveform animation */
      _startWaveAnim() {
        if (!this._analyser) return;
        const data = new Uint8Array(this._analyser.frequencyBinCount);
        const tick = () => {
          if (this._recState === 'idle') return;
          this._analyser.getByteFrequencyData(data);
          for (let i = 0; i < 20; i++) {
            const bar = document.getElementById('aubar_' + i);
            if (bar) {
              const v = this._recState === 'paused'
                ? 4
                : 4 + (data[Math.floor(i * data.length / 20)] / 255) * 32;
              bar.style.height = v + 'px';
            }
          }
          this._waveTimer = requestAnimationFrame(tick);
        };
        this._waveTimer = requestAnimationFrame(tick);
      },
      _stopWaveAnim() { cancelAnimationFrame(this._waveTimer); },

      /* save pending blob */
      async _saveClip() {
        if (!this._pendingBlob) return;
        const inp = document.getElementById('au_pending_title');
        const title = inp?.value.trim() || `Gravação ${new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;

        /* store blob as base64 inside IDB record */
        const base64 = await this._blobToBase64(this._pendingBlob);
        const clip = {
          id: 'c' + Date.now(),
          title,
          duration: this._pendingDur,
          mime: this._pendingBlob.type,
          data: base64,
          createdAt: Date.now(),
        };

        this._rec.data.clips.unshift(clip);
        this._pendingBlob = null;
        await this._save();
        this._render();
        toast('🎙️ Gravação salva!');
      },

      _discardPending() {
        this._pendingBlob = null;
        this._render();
        toast('Gravação descartada');
      },

      /* ════════════════════════════════════════════
         PLAYBACK
      ════════════════════════════════════════════ */
      _togglePlay(id) {
        if (this._playingId === id) {
          this._stopPlayback();
          return;
        }
        this._stopPlayback();
        const clip = this._rec.data.clips.find(c => c.id === id);
        if (!clip) return;

        const audio = new Audio(clip.data);
        this._audioEl = audio;
        this._playingId = id;
        this._render();

        audio.ontimeupdate = () => {
          const seek = document.getElementById('au_seek');
          const cur = document.getElementById('au_cur');
          if (!audio.duration) return;
          if (seek) seek.value = (audio.currentTime / audio.duration * 100).toFixed(1);
          if (cur) cur.textContent = this._fmtDur(Math.floor(audio.currentTime));
        };
        audio.onended = () => { this._playingId = null; this._audioEl = null; this._render(); };
        audio.onerror = () => { toast('Erro ao reproduzir'); this._stopPlayback(); };
        audio.play().catch(() => toast('Erro ao reproduzir'));
      },

      _stopPlayback() {
        if (this._audioEl) {
          this._audioEl.pause();
          this._audioEl.onended = null;
          this._audioEl.ontimeupdate = null;
          this._audioEl = null;
        }
        const prev = this._playingId;
        this._playingId = null;
        if (prev) this._render();
      },

      _seek(pct) {
        if (this._audioEl && this._audioEl.duration) {
          this._audioEl.currentTime = (pct / 100) * this._audioEl.duration;
        }
      },

      /* ════════════════════════════════════════════
         SEARCH / SORT / RENAME / DELETE
      ════════════════════════════════════════════ */
      _onSearch(q) {
        this._searchQ = q;
        const list = document.querySelector('.au-list');
        if (!list) return;
        // re-render just the list section for perf
        list.innerHTML = this._filteredClips().map((c, i) => this._clipCard(c, i)).join('');
      },

      _filteredClips() {
        const clips = [...(this._rec.data.clips || [])];
        if (!this._sortAsc) clips.sort((a, b) => b.createdAt - a.createdAt);
        else clips.sort((a, b) => a.createdAt - b.createdAt);
        const q = this._searchQ.toLowerCase().trim();
        if (!q) return clips;
        return clips.filter(c => (c.title || '').toLowerCase().includes(q));
      },

      _renameStart(id) {
        this._stopPlayback();
        this._renamingId = id;
        this._render();
        setTimeout(() => document.getElementById('au_rename_inp')?.focus(), 60);
      },

      async _renameSave(id) {
        const inp = document.getElementById('au_rename_inp');
        const val = inp?.value.trim();
        if (!val) return;
        const clip = this._rec.data.clips.find(c => c.id === id);
        if (clip) clip.title = val;
        this._renamingId = null;
        await this._save();
        this._render();
        toast('✏️ Renomeado');
      },

      async _deleteClip(id) {
        this._stopPlayback();
        this._rec.data.clips = this._rec.data.clips.filter(c => c.id !== id);
        await this._save();
        this._render();
        toast('Gravação removida');
      },

      /* ── utils ──────────────────────────────── */
      _fmtSec(s) {
        const m = Math.floor(s / 60), sec = s % 60;
        return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      },
      _fmtDur(s) {
        s = Math.round(s || 0);
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60), sec = s % 60;
        return sec ? `${m}m ${sec}s` : `${m}m`;
      },
      _blobToBase64(blob) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = () => rej(r.error);
          r.readAsDataURL(blob);
        });
      },
    });
  </script>

  <script>
    (async () => {
      PWA.init();
      await App.loadAll();
      Home.render();
    })();
  </script>
