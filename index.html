      defaultData: () => ({
        laborRate: 120,
        nodes: {
          'n1': {
            id: 'n1', type: 'question', question: 'O equipamento liga normalmente?', hint: '', photos: [],
            yes: { type: 'next', nextId: 'n2' },
            no: { type: 'next', nextId: 'n3' }
          },
          'n2': {
            id: 'n2', type: 'question', question: 'Apresenta ruído ou vibração anormal?', hint: '', photos: [],
            yes: { type: 'result', resultType: 'warn', icon: '⚠️', title: 'Verificar rolamentos', desc: 'Possível desgaste nos rolamentos.', costType: 'part', costLabel: 'Rolamento', costValue: 80, costUnit: 'un', photos: [] },
            no: { type: 'result', resultType: 'ok', icon: '✅', title: 'Funcionamento normal', desc: 'Sem anomalias detectadas.', costType: 'none', photos: [] }
          },
          'n3': {
            id: 'n3', type: 'question', question: 'Há tensão na entrada elétrica?', hint: 'Use multímetro para verificar.', photos: [],
            yes: { type: 'result', resultType: 'err', icon: '⚡', title: 'Defeito interno', desc: 'Tensão OK mas equipamento não liga.', costType: 'labor', costLabel: 'Diagnóstico elétrico', costValue: 150, costUnit: 'h', photos: [] },
            no: { type: 'result', resultType: 'err', icon: '🔌', title: 'Sem energia', desc: 'Verifique disjuntor e fiação.', costType: 'none', photos: [] }
          },
        },
        rootId: 'n1',
        session: { path: [], done: false, checked: {} },
      }),

      cardPreview(rec) {
        const total = Object.keys(rec.data.nodes || {}).length;
        const checked = Object.keys(rec.data.session?.checked || {}).length;
        const totalR = this._totalCost(rec.data);
        return [
          total + ' nó' + (total !== 1 ? 's' : ''),
          checked ? checked + ' item' + (checked !== 1 ? 's' : '') + ' marcado' + (checked !== 1 ? 's' : '') : null,
          totalR > 0 ? 'R$ ' + totalR.toFixed(2).replace('.', ',') : null,
        ].filter(Boolean).join(' · ');
      },

      cardBadge(rec) {
        if (rec.data.session?.done) {
          const t = this._totalCost(rec.data);
          if (t > 0) return '<span class="badge badge-g">R$ ' + t.toFixed(2).replace('.', ',') + '</span>';
          return '<span class="badge badge-g">✓ Concluído</span>';
        }
        if ((rec.data.session?.path || []).length) return '<span class="badge badge-a">Em andamento</span>';
        return '<span class="badge badge-p">Novo</span>';
      },

      navActions: [
        {
          id: 'reset', icon: '↺', title: 'Reiniciar diagnóstico',
          handler() { App.activePlugin._resetSession(); }
        },
      ],

      _el: null, _rec: null, _mode: 'run', _viewerState: null,

      mount(container, rec) {
        this._el = container; this._rec = rec; this._mode = 'run';
        if (!this._rec.data.session.checked) this._rec.data.session.checked = {};
        if (!this._rec.data.laborRate) this._rec.data.laborRate = 120;
        for (const node of Object.values(this._rec.data.nodes)) {
          if (!node.photos) node.photos = [];
          for (const ans of ['yes', 'no']) {
            if (node[ans] && !node[ans].photos) node[ans].photos = [];
          }
        }
        this._render();
      },

      unmount() { this._closeViewer(); this._el = null; this._rec = null; },

      async _save() { await App.saveRecord(this._rec); },

      /* ── RENDER ── */
      _render() {
        if (!this._el) return;
        const { session, nodes } = this._rec.data;
        const total = Object.keys(nodes).length;
        const pct = session.done ? 100 : total ? Math.min(Math.round(session.path.length / total * 100), 95) : 0;
        document.getElementById('pluginNavSub').textContent =
          this._mode === 'edit' ? 'Editando fluxo' :
            session.done ? 'Concluído · ' + pct + '%' : pct + '% percorrido';
        this._el.innerHTML =
          '<div class="fl-wrap">' +
          '<div class="fl-tabs">' +
          '<button class="fl-tab ' + (this._mode === 'run' ? 'on' : '') + '" onclick="App.activePlugin._setMode(\'run\')">▶ Diagnóstico</button>' +
          '<button class="fl-tab ' + (this._mode === 'edit' ? 'on' : '') + '" onclick="App.activePlugin._setMode(\'edit\')">✏️ Editar fluxo</button>' +
          '</div>' +
          '<div id="fl_content"></div>' +
          '<div style="height:16px"></div>' +
          '</div>';
        this._mode === 'run' ? this._renderRun() : this._renderEdit();
      },

      /* ── RUN MODE ── */
      _renderRun() {
        const cont = document.getElementById('fl_content');
        const { session, nodes, rootId } = this._rec.data;
        let html = '<div class="fl-chain">';
        let nodeId = rootId;
        for (let i = 0; i < session.path.length; i++) {
          const step = session.path[i];
          const node = nodes[step.nodeId];
          if (!node) break;
          html += this._answeredNodeHtml(node, step.answer, i);
          const branch = node[step.answer];
          if (branch && branch.type === 'result') {
            html += this._resultCardHtml(branch, step.nodeId + '_' + step.answer);
            nodeId = null;
          } else if (branch && branch.type === 'next') {
            html += '<div class="fl-conn-line"></div>';
            nodeId = branch.nextId;
          }
        }
        if (!session.done && nodeId && nodes[nodeId]) {
          html += this._currentQuestionHtml(nodes[nodeId], session.path.length);
        }
        html += '</div>';
        cont.innerHTML = html + this._budgetPanelHtml();
        setTimeout(function () {
          var el = cont.closest('.view-scroll');
          if (el) el.scrollTo({ top: 99999, behavior: 'smooth' });
        }, 80);
      },

      _answeredNodeHtml(node, answer, idx) {
        var photos = node.photos || [];
        var thumbs = '';
        for (var i = 0; i < photos.length && i < 3; i++) {
          thumbs += '<img class="fl-photo-thumb" src="' + photos[i] + '" style="width:48px;height:48px;border-radius:8px;object-fit:cover;cursor:pointer;margin-right:4px"' +
            ' onclick="App.activePlugin._openViewer(App.activePlugin._rec.data.nodes[\'' + node.id + '\'].photos,' + i + ',\'node_' + node.id + '\')">';
        }
        return '<div class="fl-node done"><div class="fl-qcard">' +
          '<div class="fl-qnum">Etapa ' + (idx + 1) + '</div>' +
          '<div class="fl-question">' + esc(node.question) + '</div>' +
          (thumbs ? '<div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">' + thumbs + '</div>' : '') +
          '<span class="fl-answer-badge ' + answer + '">' + (answer === 'yes' ? '✓ Sim' : '✕ Não') + '</span>' +
          '</div></div>';
      },

      _currentQuestionHtml(node, idx) {
        var photos = node.photos || [];
        var thumbs = '';
        for (var i = 0; i < photos.length; i++) {
          thumbs += '<img class="fl-photo-thumb" src="' + photos[i] + '"' +
            ' onclick="App.activePlugin._openViewer(App.activePlugin._rec.data.nodes[\'' + node.id + '\'].photos,' + i + ',\'node_' + node.id + '\')">';
        }
        return '<div class="fl-node active">' +
          '<div class="fl-qcard active">' +
          '<div class="fl-qnum">Etapa ' + (idx + 1) + '</div>' +
          '<div class="fl-question">' + esc(node.question) + '</div>' +
          (node.hint ? '<div class="fl-hint">💡 ' + esc(node.hint) + '</div>' : '') +
          (photos.length ?
            '<div class="fl-photos"><div class="fl-photos-lbl">📷 Fotos</div><div class="fl-photo-grid">' + thumbs + '</div></div>' : '') +
          '</div>' +
          '<div class="fl-btns">' +
          '<button class="fl-ans-btn yes" onclick="App.activePlugin._answer(\'' + node.id + '\',\'yes\')">✓ Sim</button>' +
          '<button class="fl-ans-btn no"  onclick="App.activePlugin._answer(\'' + node.id + '\',\'no\')">✕ Não</button>' +
          '</div></div>';
      },

      _resultCardHtml(branch, key) {
        var checked = this._rec.data.session.checked;
        var item = checked[key] || null;
        var isChecked = !!item;
        var qty = item ? (item.qty || 1) : 1;
        var type = branch.costType || 'none';
        var hasValue = type !== 'none' && branch.costValue > 0;
        var typeLabel = type === 'part' ? '🔩 Peça' : type === 'labor' ? '🔧 Mão de obra' : '';
        var valueStr = hasValue ? 'R$ ' + Number(branch.costValue).toFixed(2).replace('.', ',') : '';
        var nodeId = key.split('_')[0];
        var answer = key.split('_')[1];

        var costRowHtml = hasValue
          ? '<div class="fl-cost-row">' +
          '<div class="fl-cost-check ' + (isChecked ? 'on' : '') + '" onclick="App.activePlugin._toggleCheck(\'' + key + '\',' + branch.costValue + ',\'' + type + '\',' + branch.costValue + ')">' + (isChecked ? '✓' : '') + '</div>' +
          '<div class="fl-cost-info">' +
          '<div class="fl-cost-label">' + esc(branch.costLabel || branch.title) + '</div>' +
          '<div class="fl-cost-type">' + typeLabel + ' · ' + valueStr + ' / ' + (branch.costUnit || 'un') + '</div>' +
          (isChecked && type !== 'none' ?
            '<div class="fl-cost-qty">' +
            '<button class="fl-cost-qty-btn" onclick="App.activePlugin._changeQty(\'' + key + '\', -1)">−</button>' +
            '<span class="fl-cost-qty-val">' + qty + '</span>' +
            '<button class="fl-cost-qty-btn" onclick="App.activePlugin._changeQty(\'' + key + '\', 1)">+</button>' +
            '<span style="font-size:11px;color:var(--text3);margin-left:4px">' + (branch.costUnit || 'un') + '</span>' +
            '</div>' : '') +
          '</div>' +
          (isChecked ? '<div class="fl-cost-value">R$ ' + (Number(branch.costValue) * qty).toFixed(2).replace('.', ',') + '</div>' : '') +
          '</div>'
          : '<div class="fl-cost-row" style="opacity:.5">' +
          '<div class="fl-cost-check ' + (isChecked ? 'on' : '') + '" onclick="App.activePlugin._toggleCheck(\'' + key + '\',0,\'' + type + '\',0)">' + (isChecked ? '✓' : '') + '</div>' +
          '<div class="fl-cost-info">' +
          '<div class="fl-cost-label">' + (isChecked ? '✓ Executado' : 'Marcar como executado') + '</div>' +
          '<div class="fl-cost-type">Sem custo cadastrado</div>' +
          '</div>' +
          '</div>';

        var photos = branch.photos || [];
        var thumbs = '';
        for (var i = 0; i < photos.length; i++) {
          thumbs += '<img class="fl-photo-thumb" src="' + photos[i] + '"' +
            ' onclick="App.activePlugin._openViewerByKey(\'' + key + '\',\'' + nodeId + '\',\'' + answer + '\',' + i + ')">';
        }
        var photosHtml =
          '<div class="fl-photos">' +
          '<div class="fl-photos-lbl">📷 Fotos ' + (photos.length ? '(' + photos.length + ')' : '') + '</div>' +
          '<div class="fl-photo-grid">' +
          thumbs +
          '<div class="fl-photo-add" onclick="App.activePlugin._photoMenu(\'result\',\'' + nodeId + '\',\'' + answer + '\')">' +
          '<span class="fl-photo-add-icon">📷</span><span>Foto</span>' +
          '</div>' +
          '</div>' +
          '</div>';

        return '<div class="fl-result ' + (branch.resultType || 'info') + '">' +
          '<div class="fl-result-head">' +
          '<span class="fl-result-ico">' + (branch.icon || '📌') + '</span>' +
          '<span class="fl-result-title">' + esc(branch.title) + '</span>' +
          '</div>' +
          (branch.desc ? '<div class="fl-result-desc">' + esc(branch.desc) + '</div>' : '') +
          costRowHtml +
          photosHtml +
          '</div>';
      },

      /* ── FOTO MENU ── */
      _photoMenu(context, nodeId, answer) {
        document.getElementById('fl_photo_menu') && document.getElementById('fl_photo_menu').remove();
        var self = this;
        var opts = [
          { icon: '📷', label: 'Câmera traseira', capture: 'environment' },
          { icon: '🤳', label: 'Câmera frontal', capture: 'user' },
          { icon: '🖼️', label: 'Galeria de fotos', capture: '' },
        ];
        var btns = opts.map(function (o) {
          return '<button class="fl-photo-menu-btn" onclick="App.activePlugin._pickPhoto(\'' + context + '\',\'' + nodeId + '\',\'' + answer + '\',\'' + o.capture + '\')">' +
            '<span>' + o.icon + '</span>' + o.label + '</button>';
        }).join('');
        var menu = document.createElement('div');
        menu.className = 'fl-photo-menu';
        menu.id = 'fl_photo_menu';
        menu.innerHTML =
          '<div class="fl-photo-menu-bg" onclick="document.getElementById(\'fl_photo_menu\').remove()"></div>' +
          '<div class="fl-photo-menu-sheet">' +
          '<div class="fl-photo-menu-title">Adicionar foto</div>' +
          btns +
          '<button class="fl-photo-menu-cancel" onclick="document.getElementById(\'fl_photo_menu\').remove()">Cancelar</button>' +
          '</div>';
        document.body.appendChild(menu);
      },

      _pickPhoto(context, nodeId, answer, capture) {
        var el = document.getElementById('fl_photo_menu');
        if (el) el.remove();
        var self = this;
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = (capture === '');
        if (capture) input.setAttribute('capture', capture);
        input.onchange = function () {
          if (context === 'node') self._addPhotosToNode(nodeId, input);
          else if (context === 'result') self._addPhotosToResult(nodeId, answer, input);
          else self._addPhotosToResultEdit(nodeId, answer, input);
        };
        input.click();
      },

      /* ── ADICIONAR / REMOVER FOTOS ── */
      async _addPhotosToNode(nodeId, input) {
        var files = Array.from(input.files);
        if (!files.length) return;
        var node = this._rec.data.nodes[nodeId];
        if (!node) return;
        if (!node.photos) node.photos = [];
        for (var i = 0; i < files.length; i++) {
          var b64 = await this._toBase64(files[i]);
          node.photos.push(b64);
        }
        await this._save();
        this._renderEdit();
        toast('📷 ' + files.length + ' foto' + (files.length > 1 ? 's' : '') + ' adicionada' + (files.length > 1 ? 's' : '') + '!');
      },

      async _addPhotosToResult(nodeId, answer, input) {
        var files = Array.from(input.files);
        if (!files.length) return;
        var branch = this._rec.data.nodes[nodeId] && this._rec.data.nodes[nodeId][answer];
        if (!branch) return;
        if (!branch.photos) branch.photos = [];
        for (var i = 0; i < files.length; i++) {
          var b64 = await this._toBase64(files[i]);
          branch.photos.push(b64);
        }
        await this._save();
        this._renderRun();
        toast('📷 ' + files.length + ' foto' + (files.length > 1 ? 's' : '') + ' adicionada' + (files.length > 1 ? 's' : '') + '!');
      },

      async _addPhotosToResultEdit(nodeId, answer, input) {
        var files = Array.from(input.files);
        if (!files.length) return;
        var branch = this._rec.data.nodes[nodeId] && this._rec.data.nodes[nodeId][answer];
        if (!branch) return;
        if (!branch.photos) branch.photos = [];
        for (var i = 0; i < files.length; i++) {
          var b64 = await this._toBase64(files[i]);
          branch.photos.push(b64);
        }
        await this._save();
        this._renderEdit();
        toast('📷 ' + files.length + ' foto' + (files.length > 1 ? 's' : '') + ' adicionada' + (files.length > 1 ? 's' : '') + '!');
      },

      async _removeNodePhoto(nodeId, idx) {
        var node = this._rec.data.nodes[nodeId];
        if (!node || !node.photos) return;
        node.photos.splice(idx, 1);
        await this._save();
        this._renderEdit();
      },

      async _removeResultPhoto(nodeId, answer, idx) {
        var branch = this._rec.data.nodes[nodeId] && this._rec.data.nodes[nodeId][answer];
        if (!branch || !branch.photos) return;
        branch.photos.splice(idx, 1);
        await this._save();
        this._renderEdit();
      },

      _toBase64(file) {
        return new Promise(function (res, rej) {
          var img = new Image();
          var url = URL.createObjectURL(file);
          img.onload = function () {
            URL.revokeObjectURL(url);
            var MAX = 1200, w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            var c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            res(c.toDataURL('image/jpeg', 0.80));
          };
          img.onerror = rej;
          img.src = url;
        });
      },

      /* ── VIEWER ── */
      _openViewer(photos, index, context) {
        this._viewerState = { photos: photos, index: index, context: context };
        this._renderViewer();
      },

      _openViewerByKey(key, nodeId, answer, index) {
        var branch = this._rec.data.nodes[nodeId] && this._rec.data.nodes[nodeId][answer];
        if (!branch || !branch.photos || !branch.photos.length) return;
        this._viewerState = { photos: branch.photos, index: index, context: 'result_' + key, nodeId: nodeId, answer: answer };
        this._renderViewer();
      },

      _renderViewer() {
        this._closeViewer(true);
        var s = this._viewerState;
        if (!s || !s.photos.length) return;
        var i = Math.max(0, Math.min(s.index, s.photos.length - 1));
        s.index = i;
        var total = s.photos.length;
        var el = document.createElement('div');
        el.className = 'fl-viewer';
        el.id = 'fl_viewer';
        el.innerHTML =
          '<div class="fl-viewer-bar">' +
          '<button class="fl-viewer-close" onclick="App.activePlugin._closeViewer()">✕</button>' +
          '<span class="fl-viewer-counter">' + (i + 1) + ' / ' + total + '</span>' +
          '<button class="fl-viewer-del" onclick="App.activePlugin._deleteViewerPhoto()">🗑 Remover</button>' +
          '</div>' +
          '<img class="fl-viewer-img" src="' + s.photos[i] + '" id="fl_viewer_img">' +
          '<div class="fl-viewer-nav">' +
          (i > 0 ? '<button class="fl-viewer-arrow" onclick="App.activePlugin._viewerNav(-1)">‹</button>' : '<div></div>') +
          (i < total - 1 ? '<button class="fl-viewer-arrow" onclick="App.activePlugin._viewerNav(1)">›</button>' : '<div></div>') +
          '</div>';
        el.onclick = function (e) { if (e.target === el) App.activePlugin._closeViewer(); };
        document.body.appendChild(el);
      },

      _viewerNav(delta) {
        if (!this._viewerState) return;
        this._viewerState.index = Math.max(0, Math.min(this._viewerState.photos.length - 1, this._viewerState.index + delta));
        this._renderViewer();
      },

      async _deleteViewerPhoto() {
        var s = this._viewerState;
        if (!s) return;
        s.photos.splice(s.index, 1);
        await this._save();
        if (!s.photos.length) { this._closeViewer(); this._render(); return; }
        s.index = Math.min(s.index, s.photos.length - 1);
        this._renderViewer();
        if (this._mode === 'run') this._renderRun();
        else this._renderEdit();
      },

      _closeViewer(silent) {
        var el = document.getElementById('fl_viewer');
        if (el) el.remove();
        if (!silent) this._viewerState = null;
      },

      /* ── LÓGICA DIAGNÓSTICO ── */
      _answer(nodeId, answer) {
        var sess = this._rec.data.session;
        var nodes = this._rec.data.nodes;
        if (sess.path.find(function (s) { return s.nodeId === nodeId; })) return;
        sess.path.push({ nodeId: nodeId, answer: answer });
        var branch = nodes[nodeId] && nodes[nodeId][answer];
        if (branch && branch.type === 'result') sess.done = true;
        else if (branch && branch.type === 'next' && !nodes[branch.nextId]) sess.done = true;
        var self = this;
        this._save().then(function () { self._renderRun(); });
      },

      async _toggleCheck(key, unitPrice, type, rawVal) {
        var checked = this._rec.data.session.checked;
        if (checked[key]) delete checked[key];
        else checked[key] = { qty: 1, unitPrice: Number(rawVal) || 0, type: type };
        await this._save();
        this._renderRun();
      },

      async _changeQty(key, delta) {
        var checked = this._rec.data.session.checked;
        if (!checked[key]) return;
        checked[key].qty = Math.max(1, (checked[key].qty || 1) + delta);
        await this._save();
        this._renderRun();
      },

      _budgetPanelHtml() {
        var session = this._rec.data.session;
        var nodes = this._rec.data.nodes;
        var checked = session.checked || {};
        var keys = Object.keys(checked);
        if (!keys.length && !session.done) return '';
        var items = [];
        for (var k = 0; k < keys.length; k++) {
          var key = keys[k];
          var item = checked[key];
          var parts = key.split('_');
          var branch = nodes[parts[0]] && nodes[parts[0]][parts[1]];
          if (!branch) continue;
          var unitPrice = Number(branch.costValue) || 0;
          var qty = item.qty || 1;
          items.push({
            label: branch.costLabel || branch.title, type: branch.costType || 'none',
            unit: branch.costUnit || 'un', unitPrice: unitPrice, qty: qty, subtotal: unitPrice * qty
          });
        }
        if (!items.length) {
          if (!session.done) return '';
          return '<div class="fl-budget"><div class="fl-budget-title">🧾 Orçamento</div><div class="fl-budget-empty">Nenhum item marcado ainda.</div></div>';
        }
        var partsArr = items.filter(function (i) { return i.type === 'part'; });
        var laborArr = items.filter(function (i) { return i.type === 'labor'; });
        var othersArr = items.filter(function (i) { return i.type === 'none'; });
        var rows = function (list, icon) {
          return list.map(function (i) {
            return '<div class="fl-budget-line"><span class="name">' + icon + ' ' + esc(i.label) + '</span><span class="qty">' + i.qty + '×</span><span class="val">R$ ' + i.subtotal.toFixed(2).replace('.', ',') + '</span></div>';
          }).join('');
        };
        var total = items.reduce(function (s, i) { return s + i.subtotal; }, 0);
        return '<div class="fl-budget">' +
          '<div class="fl-budget-title">🧾 Orçamento do serviço</div>' +
          (partsArr.length ? '<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">🔩 Peças</div>' + rows(partsArr, '') : '') +
          (laborArr.length ? '<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">🔧 Mão de obra</div>' + rows(laborArr, '') : '') +
          (othersArr.length ? '<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">📌 Outros</div>' + rows(othersArr, '') : '') +
          '<div class="fl-budget-sep"></div>' +
          '<div class="fl-budget-total"><span class="fl-budget-lbl">Total a cobrar</span><span class="fl-budget-sum">R$ ' + total.toFixed(2).replace('.', ',') + '</span></div>' +
          '</div>';
      },

      _totalCost(data) {
        var checked = data.session && data.session.checked || {};
        var nodes = data.nodes || {};
        var total = 0;
        var keys = Object.keys(checked);
        for (var i = 0; i < keys.length; i++) {
          var parts = keys[i].split('_');
          var branch = nodes[parts[0]] && nodes[parts[0]][parts[1]];
          if (branch) total += (Number(branch.costValue) || 0) * (checked[keys[i]].qty || 1);
        }
        return total;
      },

      async _resetSession() {
        this._rec.data.session = { path: [], done: false, checked: {} };
        await this._save();
        this._render();
        toast('↺ Diagnóstico reiniciado');
      },

      /* ── EDIT MODE ── */
      _renderEdit() {
        var cont = document.getElementById('fl_content');
        var nodes = this._rec.data.nodes;
        var ids = Object.keys(nodes);
        var self = this;
        var rootOpts = ids.map(function (id) {
          return '<option value="' + id + '" ' + (id === self._rec.data.rootId ? 'selected' : '') + '>' + esc((nodes[id].question || '').slice(0, 40) || id) + '</option>';
        }).join('');
        cont.innerHTML =
          '<div class="fl-edit-wrap">' +
          '<div class="fl-rate-box">' +
          '<span class="fl-rate-lbl">💵 Valor padrão hora de trabalho (R$/h)</span>' +
          '<input class="fl-rate-inp" type="number" min="0" step="10" value="' + (this._rec.data.laborRate || 120) + '" oninput="App.activePlugin._rec.data.laborRate=+this.value">' +
          '<span class="fl-rate-unit">/h</span>' +
          '</div>' +
          '<div class="fl-root-row">' +
          '<span class="fl-root-lbl">🚩 Nó raiz (pergunta inicial):</span>' +
          '<select class="fl-root-sel" onchange="App.activePlugin._rec.data.rootId=this.value">' + rootOpts + '</select>' +
          '</div>' +
          ids.map(function (id, i) { return self._editCard(nodes[id], i + 1); }).join('') +
          '<button class="fl-add-btn" onclick="App.activePlugin._addNode()">＋ Adicionar pergunta</button>' +
          '</div>';
      },

      _editCard(node, num) {
        var TYPES = [{ id: 'part', label: '🔩 Peça' }, { id: 'labor', label: '🔧 M.O.' }, { id: 'none', label: '⊘ Nenhum' }];
        var nodes = this._rec.data.nodes;
        var self = this;

        /* fotos do nó */
        var nodePhotos = (node.photos || []).map(function (p, i) {
          return '<div class="fl-edit-photo-wrap">' +
            '<img class="fl-edit-photo-thumb" src="' + p + '" onclick="App.activePlugin._openViewer(App.activePlugin._rec.data.nodes[\'' + node.id + '\'].photos,' + i + ',\'node_' + node.id + '\')">' +
            '<button class="fl-edit-photo-del" onclick="App.activePlugin._removeNodePhoto(\'' + node.id + '\',' + i + ')">✕</button>' +
            '</div>';
        }).join('');

        var nodePhotosHtml =
          '<div class="fl-edit-photos">' +
          '<div class="fl-edit-photos-lbl">📷 Fotos da pergunta</div>' +
          '<div class="fl-edit-photo-grid">' +
          nodePhotos +
          '<div class="fl-edit-photo-add" onclick="App.activePlugin._photoMenu(\'node\',\'' + node.id + '\',\'\')">' +
          '<span class="fl-edit-photo-add-icon">📷</span><span>Adicionar</span>' +
          '</div>' +
          '</div>' +
          '</div>';

        var branchHtml = function (answer, label) {
          var b = node[answer] || {};
          var isNext = b.type === 'next';
          var isResult = b.type === 'result';
          var otherIds = Object.keys(nodes).filter(function (id) { return id !== node.id; });
          var costType = b.costType || 'none';

          var brPhotos = (b.photos || []).map(function (p, i) {
            return '<div class="fl-edit-photo-wrap">' +
              '<img class="fl-edit-photo-thumb" src="' + p + '" onclick="App.activePlugin._openViewerByKey(\'' + node.id + '_' + answer + '\',\'' + node.id + '\',\'' + answer + '\',' + i + ')">' +
              '<button class="fl-edit-photo-del" onclick="App.activePlugin._removeResultPhoto(\'' + node.id + '\',\'' + answer + '\',' + i + ')">✕</button>' +
              '</div>';
          }).join('');

          var resultPhotosHtml =
            '<div class="fl-edit-photos">' +
            '<div class="fl-edit-photos-lbl">📷 Fotos deste resultado</div>' +
            '<div class="fl-edit-photo-grid">' +
            brPhotos +
            '<div class="fl-edit-photo-add" onclick="App.activePlugin._photoMenu(\'result-edit\',\'' + node.id + '\',\'' + answer + '\')">' +
            '<span class="fl-edit-photo-add-icon">📷</span><span>Adicionar</span>' +
            '</div>' +
            '</div>' +
            '</div>';

          return '<div class="fl-branch-box">' +
            '<div class="fl-branch-title">' + label + '</div>' +
            '<div class="fl-efield"><label>Tipo</label>' +
            '<select onchange="App.activePlugin._setBranchType(\'' + node.id + '\',\'' + answer + '\',this.value)">' +
            '<option value="next" ' + (isNext ? 'selected' : '') + '>→ Ir para outra pergunta</option>' +
            '<option value="result" ' + (isResult ? 'selected' : '') + '>⚑ Resultado final</option>' +
            '</select></div>' +
            (isNext ?
              '<div class="fl-efield"><label>Próxima pergunta</label>' +
              '<select onchange="App.activePlugin._setNextId(\'' + node.id + '\',\'' + answer + '\',this.value)">' +
              otherIds.map(function (id) { return '<option value="' + id + '" ' + (b.nextId === id ? 'selected' : '') + '>' + esc((nodes[id].question || '').slice(0, 40) || id) + '</option>'; }).join('') +
              '</select></div>' : '') +
            (isResult ?
              '<div class="fl-efield"><label>Tipo de resultado</label>' +
              '<select onchange="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'resultType\',this.value)">' +
              '<option value="ok"   ' + (b.resultType === 'ok' ? 'selected' : '') + '>✅ OK</option>' +
              '<option value="warn" ' + (b.resultType === 'warn' ? 'selected' : '') + '>⚠️ Atenção</option>' +
              '<option value="err"  ' + (b.resultType === 'err' ? 'selected' : '') + '>❌ Erro</option>' +
              '<option value="info" ' + (b.resultType === 'info' ? 'selected' : '') + '>ℹ️ Info</option>' +
              '</select></div>' +
              '<div class="fl-efield"><label>Ícone (emoji)</label>' +
              '<input type="text" value="' + esc(b.icon || '') + '" placeholder="✅ ⚡ 🔋 🔧…" oninput="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'icon\',this.value)"></div>' +
              '<div class="fl-efield"><label>Título</label>' +
              '<input type="text" value="' + esc(b.title || '') + '" oninput="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'title\',this.value)"></div>' +
              '<div class="fl-efield"><label>Descrição</label>' +
              '<textarea rows="2" oninput="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'desc\',this.value)">' + esc(b.desc || '') + '</textarea></div>' +
              '<div class="fl-cost-fields">' +
              '<div style="font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">💰 Custo</div>' +
              '<div class="fl-cost-type-row">' +
              TYPES.map(function (t) { return '<button class="fl-cost-type-btn ' + (costType === t.id ? 'on' : '') + '" onclick="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'costType\',\'' + t.id + '\')">' + t.label + '</button>'; }).join('') +
              '</div>' +
              (costType !== 'none' ?
                '<div class="fl-efield" style="margin-top:6px"><label>Nome da ' + (costType === 'part' ? 'peça' : 'tarefa') + '</label>' +
                '<input type="text" value="' + esc(b.costLabel || b.title || '') + '" oninput="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'costLabel\',this.value)"></div>' +
                '<div class="fl-cost-inline">' +
                '<div class="fl-efield"><label>Valor (R$)</label><input type="number" min="0" step="0.01" value="' + (b.costValue || 0) + '" oninput="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'costValue\',+this.value)"></div>' +
                '<div class="fl-efield"><label>Unidade</label>' +
                '<select onchange="App.activePlugin._setField(\'' + node.id + '\',\'' + answer + '\',\'costUnit\',this.value)">' +
                '<option value="un" ' + ((b.costUnit || 'un') === 'un' ? 'selected' : '') + '>un</option>' +
                '<option value="h"  ' + (b.costUnit === 'h' ? 'selected' : '') + '>h</option>' +
                '<option value="m"  ' + (b.costUnit === 'm' ? 'selected' : '') + '>m</option>' +
                '<option value="kg" ' + (b.costUnit === 'kg' ? 'selected' : '') + '>kg</option>' +
                '<option value="l"  ' + (b.costUnit === 'l' ? 'selected' : '') + '>L</option>' +
                '</select></div>' +
                '</div>' : '') +
              '</div>' +
              resultPhotosHtml
              : '') +
            '</div>';
        };

        return '<div class="fl-ecard" id="flecard_' + node.id + '">' +
          '<div class="fl-ecard-head" onclick="App.activePlugin._toggleCard(\'' + node.id + '\')">' +
          '<span class="fl-ecard-num">' + num + '</span>' +
          '<span class="fl-ecard-q">' + esc((node.question || '').slice(0, 70)) + ((node.question || '').length > 70 ? '…' : '') + '</span>' +
          '<span class="fl-ecard-chev">▾</span>' +
          '</div>' +
          '<div class="fl-ecard-body">' +
          '<div class="fl-efield"><label>Pergunta</label>' +
          '<textarea rows="2" oninput="App.activePlugin._setNodeField(\'' + node.id + '\',\'question\',this.value)">' + esc(node.question || '') + '</textarea></div>' +
          '<div class="fl-efield"><label>Dica (opcional)</label>' +
          '<input type="text" value="' + esc(node.hint || '') + '" oninput="App.activePlugin._setNodeField(\'' + node.id + '\',\'hint\',this.value)"></div>' +
          nodePhotosHtml +
          branchHtml('yes', '✅ Se SIM') +
          branchHtml('no', '❌ Se NÃO') +
          '<div class="fl-ecard-actions">' +
          '<button class="fl-save-btn" onclick="App.activePlugin._saveEdit()">💾 Salvar</button>' +
          '<button class="fl-del-btn" onclick="App.activePlugin._deleteNode(\'' + node.id + '\')">🗑</button>' +
          '</div>' +
          '</div>' +
          '</div>';
      },

      _toggleCard(id) { var el = document.getElementById('flecard_' + id); if (el) el.classList.toggle('open'); },

      _setNodeField(id, field, val) { if (this._rec.data.nodes[id]) this._rec.data.nodes[id][field] = val; },

      _setBranchType(nodeId, answer, type) {
        var node = this._rec.data.nodes[nodeId]; if (!node) return;
        node[answer] = type === 'next'
          ? { type: 'next', nextId: Object.keys(this._rec.data.nodes).find(function (id) { return id !== nodeId; }) || '' }
          : { type: 'result', resultType: 'ok', icon: '✅', title: '', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '', photos: [] };
        this._renderEdit();
      },

      _setNextId(nodeId, answer, nextId) {
        var n = this._rec.data.nodes[nodeId]; if (n && n[answer]) n[answer].nextId = nextId;
      },

      _setField(nodeId, answer, field, val) {
        var node = this._rec.data.nodes[nodeId]; if (!node) return;
        if (!node[answer]) node[answer] = {};
        node[answer][field] = val;
        if (field === 'costType') this._renderEdit();
      },

      async _saveEdit() {
        var lr = this._el && this._el.querySelector('.fl-rate-inp');
        if (lr) this._rec.data.laborRate = +lr.value || 120;
        await this._save();
        toast('💾 Fluxo salvo!');
        this._renderEdit();
      },

      async _addNode() {
        var id = 'n' + Date.now();
        this._rec.data.nodes[id] = {
          id: id, type: 'question', question: 'Nova pergunta', hint: '', photos: [],
          yes: { type: 'result', resultType: 'ok', icon: '✅', title: 'OK', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '', photos: [] },
          no: { type: 'result', resultType: 'err', icon: '❌', title: 'Problema', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '', photos: [] },
        };
        await this._save();
        this._renderEdit();
        setTimeout(function () {
          var el = document.getElementById('flecard_' + id);
          if (el) { el.classList.add('open'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }, 80);
      },

      async _deleteNode(id) {
        var nodes = this._rec.data.nodes;
        if (Object.keys(nodes).length <= 1) { toast('Precisa ter pelo menos 1 nó'); return; }
        delete nodes[id];
        var ids = Object.keys(nodes);
        for (var i = 0; i < ids.length; i++) {
          var n = nodes[ids[i]];
          for (var j = 0; j < 2; j++) {
            var ans = ['yes', 'no'][j];
            if (n[ans] && n[ans].nextId === id)
              n[ans] = { type: 'result', resultType: 'ok', icon: '✅', title: 'OK', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '', photos: [] };
          }
        }
        if (this._rec.data.rootId === id) this._rec.data.rootId = Object.keys(nodes)[0];
        await this._save();
        this._renderEdit();
        toast('Nó removido');
      },

      _setMode(m) { this._mode = m; this._render(); },
    });
  </script>

  <!--pluguin horas-->
  <!-- ▼SCRIPT -->
  <script>
    registerPlugin({

      /* ── Identidade ─────────────────────────── */
      id: 'horas',
      name: 'Horas Trabalhadas',
      icon: '⏱️',
      color: '#10b981',
      css: `
      .hr-wrap {
      padding: 14px 16px 80px;
    }

    /* ── tabs ── */
    .hr-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .hr-tab {
      flex: 1;
      padding: 8px 0;
      border-radius: 11px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text2);
      font-family: var(--fd);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .hr-tab.on {
      background: var(--acc);
      border-color: var(--acc);
      color: #fff;
      box-shadow: 0 4px 14px var(--acc-glow);
    }

    /* ── summary strip ── */
    .hr-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .hr-sum-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px 14px;
    }

    .hr-sum-val {
      font-family: var(--fd);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .hr-sum-lbl {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    .hr-sum-card.green .hr-sum-val {
      color: var(--green);
    }

    .hr-sum-card.amber .hr-sum-val {
      color: var(--amber);
    }

    .hr-sum-card.acc .hr-sum-val {
      color: var(--acc2);
    }

    .hr-sum-card.red .hr-sum-val {
      color: var(--red);
    }

    /* ── settings box ── */
    .hr-settings {
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .hr-settings-title {
      font-family: var(--fd);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .hr-settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hr-set-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hr-set-field label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .hr-set-inp {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      padding: 8px 11px;
      color: var(--text);
      font-family: var(--fb);
      font-size: 13.5px;
      outline: none;
      transition: border-color .14s;
      width: 100%;
    }

    .hr-set-inp:focus {
      border-color: var(--acc);
    }

    /* ── add day btn ── */
    .hr-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 2px dashed var(--border2);
      background: transparent;
      color: var(--text3);
      font-family: var(--fd);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 14px;
    }

    .hr-add-btn:hover {
      border-color: var(--acc);
      color: var(--acc2);
    }

    /* ── period nav ── */
    .hr-period-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .hr-period-title {
      font-family: var(--fd);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .hr-period-btns {
      display: flex;
      gap: 6px;
    }

    .hr-pnav-btn {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .13s;
    }

    .hr-pnav-btn:hover {
      background: var(--surf2);
    }

    /* ── day card ── */
    .hr-day-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 8px;
      animation: up .2s ease both;
    }

    .hr-day-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
    }

    .hr-day-date {
      flex: 1;
    }

    .hr-day-name {
      font-family: var(--fd);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      text-transform: capitalize;
    }

    .hr-day-sub {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .hr-day-badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-family: var(--fd);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .hr-day-badge.ok {
      background: var(--green-bg);
      color: var(--green);
    }

    .hr-day-badge.low {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .hr-day-badge.zero {
      background: var(--surf2);
      color: var(--text3);
    }

    .hr-day-chev {
      font-size: 12px;
      color: var(--text3);
      transition: transform .2s;
      flex-shrink: 0;
    }

    .hr-day-card.open .hr-day-chev {
      transform: rotate(180deg);
    }

    .hr-day-body {
      display: none;
      padding: 0 14px 14px;
    }

    .hr-day-card.open .hr-day-body {
      display: block;
    }

    /* time grid */
    .hr-time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .hr-time-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hr-time-field label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .hr-time-inp {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      padding: 8px 11px;
      color: var(--text);
      font-family: var(--fd);
      font-size: 15px;
      font-weight: 700;
      outline: none;
      transition: border-color .14s;
      width: 100%;
      text-align: center;
    }

    .hr-time-inp:focus {
      border-color: var(--acc);
    }

    /* day extras */
    .hr-extras-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .hr-day-result {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg3);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .hr-day-res-lbl {
      font-size: 12.5px;
      color: var(--text2);
    }

    .hr-day-res-val {
      font-family: var(--fd);
      font-size: 16px;
      font-weight: 800;
      color: var(--green);
    }

    .hr-day-actions {
      display: flex;
      gap: 7px;
    }

    .hr-day-save-btn {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      background: var(--acc);
      border: none;
      color: #fff;
      font-family: var(--fd);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .13s;
    }

    .hr-day-save-btn:hover {
      opacity: .85;
    }

    .hr-day-del-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--red-bg);
      color: var(--red);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── finance panel ── */
    .hr-finance {
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .hr-fin-title {
      font-family: var(--fd);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .hr-fin-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .hr-fin-row:last-child {
      border-bottom: none;
    }

    .hr-fin-row .lbl {
      color: var(--text2);
      flex: 1;
    }

    .hr-fin-row .val {
      font-family: var(--fd);
      font-weight: 700;
    }

    .hr-fin-row .val.green {
      color: var(--green);
    }

    .hr-fin-row .val.red {
      color: var(--red);
    }

    .hr-fin-row .val.amber {
      color: var(--amber);
    }

    .hr-fin-sep {
      height: 1px;
      background: var(--border2);
      margin: 8px 0;
    }

    .hr-fin-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 2px;
    }

    .hr-fin-total-lbl {
      font-family: var(--fd);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .hr-fin-total-val {
      font-family: var(--fd);
      font-size: 24px;
      font-weight: 800;
    }

    /* ── export btn ── */
    .hr-export-btn {
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid var(--border2);
      background: var(--surf);
      color: var(--text2);
      font-family: var(--fd);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hr-export-btn:hover {
      border-color: var(--acc2);
      color: var(--acc2);
    }

    .hr-export-btn.primary {
      background: linear-gradient(135deg, var(--acc), #9e8cfb);
      border-color: var(--acc);
      color: #fff;
      box-shadow: 0 4px 14px var(--acc-glow);
    }

    /* ── section label ── */
    .hr-section-lbl {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin: 14px 0 8px;
    }

    /* ── empty ── */
    .hr-empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--text3);
    }

    .hr-empty span {
      display: block;
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hr-empty h3 {
      font-family: var(--fd);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .hr-empty p {
      font-size: 13px;
      line-height: 1.6;
    }`,
      defaultData: () => ({
        hourRate: 15.00,    // R$ por hora
        defaultTimes: { entrada: '08:00', almoco: '12:30', retorno: '13:30', saida: '17:00' },
        saldoAnterior: 0,
        adiantamento: 0,
        days: [],
        /* day = { id, date:'YYYY-MM-DD', entrada, almoco, retorno, saida,
                   extras:[{desc,value}], obs } */
      }),

      /* ── Card na home ───────────────────────── */
      cardPreview(rec) {
        const days = rec.data.days || [];
        const total = days.reduce((s, d) => s + this._dayMinutes(d), 0);
        const earn = (total / 60) * (rec.data.hourRate || 0);
        if (!days.length) return 'Nenhum dia registrado';
        return `${days.length} dia${days.length !== 1 ? 's' : ''} · ${this._fmtH(total)} trabalhadas · R$ ${earn.toFixed(2).replace('.', ',')}`;
      },
      cardBadge(rec) {
        const days = rec.data.days || [];
        // find today
        const today = this._dateKey(new Date());
        const hasToday = days.some(d => d.date === today);
        if (hasToday) return '<span class="badge badge-g">✓ Hoje registrado</span>';
        if (!days.length) return '<span class="badge badge-p">Novo</span>';
        return `<span class="badge badge-p">⏱️ ${days.length}d</span>`;
      },

      navActions: [
        {
          id: 'add', icon: '＋', title: 'Registrar dia',
          handler() { App.activePlugin._openDayForm(null); }
        },
        {
          id: 'exp', icon: '📋', title: 'Copiar relatório',
          handler() { App.activePlugin._copyReport('all'); }
        },
      ],

      /* ── Estado ─────────────────────────────── */
      _el: null, _rec: null,
      _view: 'week',        // 'week' | 'finance'
      _weekOffset: 0,       // 0=semana atual, -1=anterior…

      /* ══ HOOKS ══════════════════════════════════ */
      mount(container, rec) {
        this._el = container; this._rec = rec;
        this._view = 'week'; this._weekOffset = 0;
        this._render();
      },
      unmount() { this._el = null; this._rec = null; },
      async _save() { await App.saveRecord(this._rec); },

      /* ════════════════════════════════════════════
         RENDER PRINCIPAL
      ════════════════════════════════════════════ */
      _render() {
        if (!this._el) return;
        const days = this._rec.data.days || [];
        const total = days.reduce((s, d) => s + this._dayMinutes(d), 0);
        const earn = (total / 60) * (this._rec.data.hourRate || 0);
        document.getElementById('pluginNavSub').textContent =
          `${days.length} dias · ${this._fmtH(total)} · R$ ${earn.toFixed(2).replace('.', ',')}`;

        this._el.innerHTML = `
      <div class="hr-wrap">
        <div class="hr-tabs">
          <button class="hr-tab ${this._view === 'week' ? 'on' : ''}"
            onclick="App.activePlugin._setView('week')">📅 Semana</button>
          <button class="hr-tab ${this._view === 'finance' ? 'on' : ''}"
            onclick="App.activePlugin._setView('finance')">💰 Financeiro</button>
        </div>
        <div id="hr_content"></div>
      </div>`;

        this._view === 'week' ? this._renderWeek() : this._renderFinance();
      },

      /* ════════════════════════════════════════════
         VISTA SEMANA
      ════════════════════════════════════════════ */
      _renderWeek() {
        const cont = document.getElementById('hr_content');
        if (!cont) return;

        const { start, end } = this._weekRange(this._weekOffset);
        const weekDays = this._rec.data.days.filter(d => d.date >= start && d.date <= end);
        const weekMins = weekDays.reduce((s, d) => s + this._dayMinutes(d), 0);
        const weekEarn = (weekMins / 60) * (this._rec.data.hourRate || 0);
        const allMins = this._rec.data.days.reduce((s, d) => s + this._dayMinutes(d), 0);
        const allEarn = (allMins / 60) * (this._rec.data.hourRate || 0);

        const startFmt = new Date(start + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        const endFmt = new Date(end + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });

        cont.innerHTML = `
      <div class="hr-summary">
        <div class="hr-sum-card acc">
          <div class="hr-sum-val">${this._fmtH(weekMins)}</div>
          <div class="hr-sum-lbl">Horas esta semana</div>
        </div>
        <div class="hr-sum-card green">
          <div class="hr-sum-val">R$ ${weekEarn.toFixed(2).replace('.', ',')}</div>
          <div class="hr-sum-lbl">Ganhos esta semana</div>
        </div>
        <div class="hr-sum-card">
          <div class="hr-sum-val">${this._fmtH(allMins)}</div>
          <div class="hr-sum-lbl">Total geral de horas</div>
        </div>
        <div class="hr-sum-card amber">
          <div class="hr-sum-val">R$ ${allEarn.toFixed(2).replace('.', ',')}</div>
          <div class="hr-sum-lbl">Total geral bruto</div>
        </div>
      </div>

      <button class="hr-add-btn" onclick="App.activePlugin._openDayForm(null)">
        ＋ Registrar dia de trabalho
      </button>

      <div class="hr-period-nav">
        <button class="hr-pnav-btn" onclick="App.activePlugin._shiftWeek(-1)">‹</button>
        <div class="hr-period-title">${startFmt} – ${endFmt}</div>
        <div style="display:flex;gap:6px">
          <button class="hr-pnav-btn" onclick="App.activePlugin._shiftWeek(0)" title="Semana atual" style="font-size:12px;width:auto;padding:0 9px">Hoje</button>
          <button class="hr-pnav-btn" onclick="App.activePlugin._shiftWeek(1)">›</button>
        </div>
      </div>

      ${weekDays.length === 0 ? `
        <div class="hr-empty">
          <span>⏱️</span>
          <h3>Nenhum dia nesta semana</h3>
          <p>Toque em <strong>＋</strong> para registrar.</p>
        </div>` : `
        <div id="hr_days">
          ${weekDays.sort((a, b) => b.date.localeCompare(a.date)).map((d, i) => this._dayCardHtml(d, i)).join('')}
        </div>`}`;
      },

      _dayCardHtml(day, idx) {
        const mins = this._dayMinutes(day);
        const earn = (mins / 60) * (this._rec.data.hourRate || 0);
        const dateStr = new Date(day.date + 'T12:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
        const timeStr = day.entrada && day.saida ? `${day.entrada} → ${day.saida}` : 'Horário incompleto';
        const badgeCls = mins >= 480 ? 'ok' : mins > 0 ? 'low' : 'zero';
        const badgeTxt = mins > 0 ? this._fmtH(mins) : '—';
        const extraSum = (day.extras || []).reduce((s, e) => s + (Number(e.value) || 0), 0);

        return `
      <div class="hr-day-card" id="hrday_${day.id}" style="animation-delay:${idx * .04}s">
        <div class="hr-day-head" onclick="App.activePlugin._toggleDay('${day.id}')">
          <div class="hr-day-date">
            <div class="hr-day-name">${dateStr}</div>
            <div class="hr-day-sub">${timeStr}${extraSum ? ` · +R$ ${extraSum.toFixed(2).replace('.', ',')} extras` : ''}</div>
          </div>
          <div class="hr-day-badge ${badgeCls}">${badgeTxt}</div>
          <span class="hr-day-chev">▾</span>
        </div>
        <div class="hr-day-body" id="hrbody_${day.id}">
          ${this._dayFormHtml(day)}
        </div>
      </div>`;
      },

      _dayFormHtml(day) {
        const mins = this._dayMinutes(day);
        const earn = (mins / 60) * (this._rec.data.hourRate || 0);
        const extraRows = (day.extras || []).map((e, i) => `
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <input style="flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:7px 10px;color:var(--text);font-size:13px;outline:none"
          type="text" value="${esc(e.desc || '')}" placeholder="Descrição"
          oninput="App.activePlugin._setExtra('${day.id}',${i},'desc',this.value)">
        <input style="width:90px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:7px 10px;color:var(--text);font-family:var(--fd);font-size:13px;font-weight:700;outline:none;text-align:right"
          type="number" step="0.01" value="${e.value || ''}" placeholder="R$"
          oninput="App.activePlugin._setExtra('${day.id}',${i},'value',+this.value)">
        <button style="width:30px;height:34px;border-radius:9px;border:none;background:var(--red-bg);color:var(--red);cursor:pointer;flex-shrink:0;font-size:14px"
          onclick="App.activePlugin._removeExtra('${day.id}',${i})">✕</button>
      </div>`).join('');

        return `
      <div class="hr-time-grid">
        <div class="hr-time-field">
          <label>🟢 Entrada</label>
          <input class="hr-time-inp" type="time" value="${day.entrada || ''}"
            oninput="App.activePlugin._setDayField('${day.id}','entrada',this.value)">
        </div>
        <div class="hr-time-field">
          <label>🍽️ Almoço saída</label>
          <input class="hr-time-inp" type="time" value="${day.almoco || ''}"
            oninput="App.activePlugin._setDayField('${day.id}','almoco',this.value)">
        </div>
        <div class="hr-time-field">
          <label>🔄 Retorno almoço</label>
          <input class="hr-time-inp" type="time" value="${day.retorno || ''}"
            oninput="App.activePlugin._setDayField('${day.id}','retorno',this.value)">
        </div>
        <div class="hr-time-field">
          <label>🔴 Saída</label>
          <input class="hr-time-inp" type="time" value="${day.saida || ''}"
            oninput="App.activePlugin._setDayField('${day.id}','saida',this.value)">
        </div>
      </div>

      <div class="hr-day-result">
        <span class="hr-day-res-lbl">Horas trabalhadas · Valor do dia</span>
        <span class="hr-day-res-val" id="hrres_${day.id}">${this._fmtH(mins)} · R$ ${earn.toFixed(2).replace('.', ',')}</span>
      </div>

      <div class="hr-section-lbl" style="margin-top:0">💼 Extras / Serviços adicionais</div>
      <div id="hrextras_${day.id}">${extraRows}</div>
      <button style="width:100%;padding:7px;border-radius:9px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px;transition:all .13s"
        onmouseover="this.style.borderColor='var(--acc2)';this.style.color='var(--acc2)'"
        onmouseout="this.style.borderColor='';this.style.color=''"
        onclick="App.activePlugin._addExtra('${day.id}')">+ Adicionar extra</button>

      <div class="hr-time-field" style="margin-bottom:12px">
        <label>📝 Observações</label>
        <input style="width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:8px 11px;color:var(--text);font-size:13px;outline:none"
          type="text" value="${esc(day.obs || '')}" placeholder="Anotações do dia…"
          oninput="App.activePlugin._setDayField('${day.id}','obs',this.value)">
      </div>

      <div class="hr-day-actions">
        <button class="hr-day-save-btn" onclick="App.activePlugin._saveDay('${day.id}')">💾 Salvar</button>
        <button class="hr-day-del-btn"  onclick="App.activePlugin._deleteDay('${day.id}')">🗑</button>
      </div>`;
      },

      /* ════════════════════════════════════════════
         VISTA FINANCEIRO
      ════════════════════════════════════════════ */
      _renderFinance() {
        const cont = document.getElementById('hr_content');
        if (!cont) return;
        const data = this._rec.data;
        const days = data.days || [];
        const rate = data.hourRate || 0;

        const totalMins = days.reduce((s, d) => s + this._dayMinutes(d), 0);
        const totalHoras = totalMins / 60;
        const ganhoHoras = totalHoras * rate;
        const totalExtras = days.reduce((s, d) => s + (d.extras || []).reduce((x, e) => x + (Number(e.value) || 0), 0), 0);
        const saldo = Number(data.saldoAnterior) || 0;
        const adiant = Number(data.adiantamento) || 0;
        const total = ganhoHoras + totalExtras + saldo - adiant;
        const isPos = total >= 0;

        cont.innerHTML = `
      <div class="hr-settings">
        <div class="hr-settings-title">⚙️ Configurações</div>
        <div class="hr-settings-row">
          <div class="hr-set-field">
            <label>Valor por hora (R$)</label>
            <input class="hr-set-inp" type="number" min="0" step="0.50"
              value="${rate}"
              oninput="App.activePlugin._rec.data.hourRate=+this.value">
          </div>
          <div class="hr-set-field">
            <label>Adiantamento (R$)</label>
            <input class="hr-set-inp" type="number" min="0" step="10"
              value="${adiant}"
              oninput="App.activePlugin._rec.data.adiantamento=+this.value">
          </div>
          <div class="hr-set-field">
            <label>Saldo anterior (R$)</label>
            <input class="hr-set-inp" type="number" step="0.01"
              value="${saldo}"
              oninput="App.activePlugin._rec.data.saldoAnterior=+this.value">
          </div>
          <div class="hr-set-field">
            <label>Hora entrada padrão</label>
            <input class="hr-set-inp" type="time"
              value="${data.defaultTimes?.entrada || '08:00'}"
              oninput="App.activePlugin._setDefault('entrada',this.value)">
          </div>
          <div class="hr-set-field">
            <label>Almoço saída padrão</label>
            <input class="hr-set-inp" type="time"
              value="${data.defaultTimes?.almoco || '12:30'}"
              oninput="App.activePlugin._setDefault('almoco',this.value)">
          </div>
          <div class="hr-set-field">
            <label>Retorno almoço padrão</label>
            <input class="hr-set-inp" type="time"
              value="${data.defaultTimes?.retorno || '13:30'}"
              oninput="App.activePlugin._setDefault('retorno',this.value)">
          </div>
          <div class="hr-set-field">
            <label>Hora saída padrão</label>
            <input class="hr-set-inp" type="time"
              value="${data.defaultTimes?.saida || '17:00'}"
              oninput="App.activePlugin._setDefault('saida',this.value)">
          </div>
        </div>
        <button style="margin-top:10px;width:100%;padding:9px;border-radius:10px;background:var(--acc);border:none;color:#fff;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer"
          onclick="App.activePlugin._saveSettings()">Salvar configurações</button>
      </div>

      <div class="hr-finance">
        <div class="hr-fin-title">🧾 Resumo financeiro geral</div>
        <div class="hr-fin-row">
          <span class="lbl">⏱️ Total de horas trabalhadas</span>
          <span class="val">${this._fmtH(totalMins)}</span>
        </div>
        <div class="hr-fin-row">
          <span class="lbl">💵 Ganho por horas (${totalHoras.toFixed(2).replace('.', ',')}h × R$ ${rate.toFixed(2).replace('.', ',')})</span>
          <span class="val green">R$ ${ganhoHoras.toFixed(2).replace('.', ',')}</span>
        </div>
        ${totalExtras ? `
        <div class="hr-fin-row">
          <span class="lbl">🔧 Extras / Serviços adicionais</span>
          <span class="val green">R$ ${totalExtras.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        ${saldo ? `
        <div class="hr-fin-row">
          <span class="lbl">↩️ Saldo anterior</span>
          <span class="val ${saldo >= 0 ? 'green' : 'red'}">R$ ${saldo.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        ${adiant ? `
        <div class="hr-fin-row">
          <span class="lbl">💸 Adiantamento descontado</span>
          <span class="val red">– R$ ${adiant.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        <div class="hr-fin-sep"></div>
        <div class="hr-fin-total">
          <span class="hr-fin-total-lbl">💰 Total a receber</span>
          <span class="hr-fin-total-val" style="color:${isPos ? 'var(--green)' : 'var(--red)'}">
            R$ ${Math.abs(total).toFixed(2).replace('.', ',')}${!isPos ? ' (negativo)' : ''}
          </span>
        </div>
      </div>
<div class="hr-section-lbl">📋 Relatório completo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="hr-export-btn primary" style="margin-bottom:0"
          onclick="App.activePlugin._copyReport('all')">
          📋 Copiar texto
        </button>
                <button class="hr-export-btn" style="margin-bottom:0"
          onclick="App.activePlugin._export()">
          📤 Baixar .txt
        </button>
      </div>

      <div class="hr-section-lbl">📆 Apenas esta semana</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="hr-export-btn" style="margin-bottom:0;border-color:var(--acc-glow);color:var(--acc2)"
          onclick="App.activePlugin._copyReport('week')">
          📋 Copiar texto
        </button>
        <button class="hr-export-btn" style="margin-bottom:0"
          onclick="App.activePlugin._exportWeek()">
          📤 Baixar .txt
        </button>
      </div>`;
      },

      /* ════════════════════════════════════════════
         FORM — novo dia (bottom sheet)
      ════════════════════════════════════════════ */
      _openDayForm(dateStr) {
        const def = this._rec.data.defaultTimes || {};
        const today = dateStr || this._dateKey(new Date());
        const newDay = {
          id: 'd' + Date.now(),
          date: today,
          entrada: def.entrada || '08:00',
          almoco: def.almoco || '12:30',
          retorno: def.retorno || '13:30',
          saida: def.saida || '17:00',
          extras: [],
          obs: '',
        };
        // check if day already exists
        const exists = this._rec.data.days.find(d => d.date === today);
        if (exists) {
          toast('Já existe registro para hoje. Abra o card para editar.');
          this._weekOffset = 0;
          this._render();
          return;
        }

        const ov = document.createElement('div');
        ov.className = 'overlay'; ov.id = 'hr_form_ov';
        ov.innerHTML = `
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <span class="sheet-title">📅 Registrar dia</span>
          <button class="x-btn" onclick="App.activePlugin._closeForm()">✕</button>
        </div>
        <div style="padding:0 20px 24px">
          <div class="hr-set-field" style="margin-bottom:12px">
            <label>Data</label>
            <input class="hr-set-inp" type="date" id="hr_new_date" value="${today}"
              oninput="App.activePlugin._newDay.date=this.value">
          </div>
          <div class="hr-time-grid">
            <div class="hr-time-field">
              <label>🟢 Entrada</label>
              <input class="hr-time-inp" type="time" id="hr_new_entrada" value="${newDay.entrada}"
                oninput="App.activePlugin._newDay.entrada=this.value">
            </div>
            <div class="hr-time-field">
              <label>🍽️ Almoço</label>
              <input class="hr-time-inp" type="time" id="hr_new_almoco" value="${newDay.almoco}"
                oninput="App.activePlugin._newDay.almoco=this.value">
            </div>
            <div class="hr-time-field">
              <label>🔄 Retorno</label>
              <input class="hr-time-inp" type="time" id="hr_new_retorno" value="${newDay.retorno}"
                oninput="App.activePlugin._newDay.retorno=this.value">
            </div>
            <div class="hr-time-field">
              <label>🔴 Saída</label>
              <input class="hr-time-inp" type="time" id="hr_new_saida" value="${newDay.saida}"
                oninput="App.activePlugin._newDay.saida=this.value">
            </div>
          </div>
          <div class="hr-set-field" style="margin-bottom:16px">
            <label>📝 Observações</label>
            <input class="hr-set-inp" type="text" placeholder="Anotações do dia…"
              oninput="App.activePlugin._newDay.obs=this.value">
          </div>
          <button style="width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,var(--acc),#9e8cfb);border:none;color:#fff;font-family:var(--fd);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px var(--acc-glow)"
            onclick="App.activePlugin._confirmNewDay()">✓ Salvar dia</button>
        </div>
      </div>`;

        this._newDay = newDay;
        ov.onclick = e => { if (e.target === ov) this._closeForm(); };
        document.body.appendChild(ov);
        requestAnimationFrame(() => ov.classList.add('on'));
      },

      async _confirmNewDay() {
        const d = this._newDay;
        if (!d.date) { toast('Escolha uma data'); return; }
        if (this._rec.data.days.find(x => x.id !== d.id && x.date === d.date)) {
          toast('Já existe registro para esta data'); return;
        }
        this._rec.data.days.push(d);
        await this._save();
        this._closeForm();
        this._weekOffset = 0;
        this._render();
        toast('✓ Dia registrado!');
      },

      _closeForm() {
        const ov = document.getElementById('hr_form_ov');
        if (!ov) return;
        ov.classList.remove('on');
        setTimeout(() => ov.remove(), 320);
        this._newDay = null;
      },

      /* ════════════════════════════════════════════
         DAY CARD INTERACTIONS
      ════════════════════════════════════════════ */
      _toggleDay(id) {
        document.getElementById('hrday_' + id)?.classList.toggle('open');
      },

      _setDayField(id, field, val) {
        const day = this._rec.data.days.find(d => d.id === id);
        if (!day) return;
        day[field] = val;
        // live update result display
        const mins = this._dayMinutes(day);
        const earn = (mins / 60) * (this._rec.data.hourRate || 0);
        const res = document.getElementById('hrres_' + id);
        if (res) res.textContent = `${this._fmtH(mins)} · R$ ${earn.toFixed(2).replace('.', ',')}`;
      },

      _addExtra(id) {
        const day = this._rec.data.days.find(d => d.id === id);
        if (!day) return;
        day.extras = day.extras || [];
        day.extras.push({ desc: '', value: 0 });
        // re-render body only
        const body = document.getElementById('hrbody_' + id);
        if (body) body.innerHTML = this._dayFormHtml(day);
      },

      _removeExtra(id, idx) {
        const day = this._rec.data.days.find(d => d.id === id);
        if (!day) return;
        day.extras.splice(idx, 1);
        const body = document.getElementById('hrbody_' + id);
        if (body) body.innerHTML = this._dayFormHtml(day);
      },

      _setExtra(id, idx, field, val) {
        const day = this._rec.data.days.find(d => d.id === id);
        if (day?.extras?.[idx]) day.extras[idx][field] = val;
      },

      async _saveDay(id) {
        await this._save();
        // refresh card
        const day = this._rec.data.days.find(d => d.id === id);
        if (!day) return;
        const card = document.getElementById('hrday_' + id);
        if (card) {
          const wasOpen = card.classList.contains('open');
          const mins = this._dayMinutes(day);
          const earn = (mins / 60) * (this._rec.data.hourRate || 0);
          const dateStr = new Date(day.date + 'T12:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
          const timeStr = day.entrada && day.saida ? `${day.entrada} → ${day.saida}` : 'Horário incompleto';
          const badgeCls = mins >= 480 ? 'ok' : mins > 0 ? 'low' : 'zero';
          const badgeTxt = mins > 0 ? this._fmtH(mins) : '—';
          const extraSum = (day.extras || []).reduce((s, e) => s + (Number(e.value) || 0), 0);
          card.querySelector('.hr-day-name').textContent = dateStr;
          card.querySelector('.hr-day-sub').textContent = `${timeStr}${extraSum ? ` · +R$ ${extraSum.toFixed(2).replace('.', ',')} extras` : ''}`;
          card.querySelector('.hr-day-badge').className = `hr-day-badge ${badgeCls}`;
          card.querySelector('.hr-day-badge').textContent = badgeTxt;
          if (!wasOpen) card.classList.remove('open');
        }
        toast('💾 Salvo!');
      },

      async _deleteDay(id) {
        this._rec.data.days = this._rec.data.days.filter(d => d.id !== id);
        await this._save();
        this._render();
        toast('Dia removido');
      },

      /* ════════════════════════════════════════════
         SETTINGS
      ════════════════════════════════════════════ */
      _setDefault(field, val) {
        if (!this._rec.data.defaultTimes) this._rec.data.defaultTimes = {};
        this._rec.data.defaultTimes[field] = val;
      },
      async _saveSettings() {
        await this._save();
        toast('⚙️ Configurações salvas!');
      },

      /* ════════════════════════════════════════════
         EXPORT
      ════════════════════════════════════════════ */
      _buildReport(days, title) {
        const data = this._rec.data;
        const rate = data.hourRate || 0;
        const lines = [`${title}`, `Gerado em: ${new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`, `Valor/hora: R$ ${rate.toFixed(2).replace('.', ',')}`, '─'.repeat(42)];

        let totalMins = 0;
        let totalExtra = 0;

        for (const day of days.sort((a, b) => a.date.localeCompare(b.date))) {
          const mins = this._dayMinutes(day);
          const earn = (mins / 60) * rate;
          const extras = (day.extras || []).reduce((s, e) => s + (Number(e.value) || 0), 0);
          totalMins += mins;
          totalExtra += extras;
          const dateStr = new Date(day.date + 'T12:00').toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' });
          lines.push('');
          lines.push(`📅 ${dateStr}`);
          lines.push(`   Entrada: ${day.entrada || '—'}   Almoço: ${day.almoco || '—'}`);
          lines.push(`   Retorno: ${day.retorno || '—'}   Saída:  ${day.saida || '—'}`);
          lines.push(`   ⏱ Horas: ${this._fmtH(mins)}   💵 R$ ${earn.toFixed(2).replace('.', ',')}`);
          if (day.extras?.length) {
            for (const e of day.extras) lines.push(`   🔧 Extra: ${e.desc || '—'} = R$ ${Number(e.value).toFixed(2).replace('.', ',')}`);
          }
          if (day.obs) lines.push(`   📝 ${day.obs}`);
        }

        lines.push('');
        lines.push('═'.repeat(42));
        lines.push(`⏱ Total horas: ${this._fmtH(totalMins)}`);
        lines.push(`💵 Ganho horas: R$ ${((totalMins / 60) * rate).toFixed(2).replace('.', ',')}`);
        if (totalExtra) lines.push(`🔧 Extras:      R$ ${totalExtra.toFixed(2).replace('.', ',')}`);

        const saldo = Number(data.saldoAnterior) || 0;
        const adiant = Number(data.adiantamento) || 0;
        if (saldo) lines.push(`↩ Saldo ant.:  R$ ${saldo.toFixed(2).replace('.', ',')}`);
        if (adiant) lines.push(`💸 Adiant.:   – R$ ${adiant.toFixed(2).replace('.', ',')}`);

        const total = (totalMins / 60) * rate + totalExtra + saldo - adiant;
        lines.push('─'.repeat(42));
        lines.push(`💰 TOTAL A RECEBER: R$ ${total.toFixed(2).replace('.', ',')}`);
        lines.push('─'.repeat(42));
        return lines.join('\n');
      },

      _export() {
        const text = this._buildReport(this._rec.data.days, 'RELATÓRIO COMPLETO DE HORAS');
        this._downloadTxt(text, `horas_completo_${this._dateKey(new Date())}.txt`);
        toast('📤 Arquivo .txt baixado!');
      },

      _exportWeek() {
        const { start, end } = this._weekRange(this._weekOffset);
        const days = this._rec.data.days.filter(d => d.date >= start && d.date <= end);
        const startFmt = new Date(start + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        const endFmt = new Date(end + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        const text = this._buildReport(days, `RELATÓRIO SEMANAL: ${startFmt} – ${endFmt}`);
        this._downloadTxt(text, `horas_semana_${start}.txt`);
        toast('📤 Arquivo .txt baixado!');
      },

      async _copyReport(scope) {
        let text, label;
        if (scope === 'week') {
          const { start, end } = this._weekRange(this._weekOffset);
          const days = this._rec.data.days.filter(d => d.date >= start && d.date <= end);
          const startFmt = new Date(start + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
          const endFmt = new Date(end + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
          text = this._buildReport(days, `RELATÓRIO SEMANAL: ${startFmt} – ${endFmt}`);
          label = 'semana';
        } else {
          text = this._buildReport(this._rec.data.days, 'RELATÓRIO COMPLETO DE HORAS');
          label = 'relatório completo';
        }
        try {
          await navigator.clipboard.writeText(text);
          toast(`📋 ${label === 'semana' ? 'Semana copiada' : 'Relatório copiado'}! Cole no WhatsApp ou e-mail.`);
        } catch {
          /* fallback para dispositivos sem clipboard API */
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          document.execCommand('copy');
          ta.remove();
          toast(`📋 Texto copiado! Cole onde quiser.`);
        }
      },

      _downloadTxt(text, filename) {
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      },

      /* ════════════════════════════════════════════
         HELPERS
      ════════════════════════════════════════════ */
      _setView(v) { this._view = v; this._render(); },
      _shiftWeek(delta) {
        if (delta === 0) this._weekOffset = 0;
        else this._weekOffset += delta;
        this._renderWeek();
      },

      _weekRange(offset = 0) {
        const now = new Date();
        const dow = now.getDay(); // 0=dom
        const mon = new Date(now);
        mon.setDate(now.getDate() - dow + (dow === 0 ? -6 : 1) + offset * 7);
        const sun = new Date(mon);
        sun.setDate(mon.getDate() + 6);
        return { start: this._dateKey(mon), end: this._dateKey(sun) };
      },

      _dayMinutes(day) {
        if (!day.entrada || !day.saida) return 0;
        const toMin = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
        const entrada = toMin(day.entrada);
        const saida = toMin(day.saida);
        let worked = saida - entrada;
        if (day.almoco && day.retorno) {
          const al = toMin(day.almoco);
          const ret = toMin(day.retorno);
          if (ret > al) worked -= (ret - al);
        }
        return Math.max(0, worked);
      },

      _fmtH(mins) {
        const h = Math.floor(mins / 60), m = mins % 60;
        return m ? `${h}h${String(m).padStart(2, '0')}` : `${h}h`;
      },

      _dateKey(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      },
    });
  </script>

.ac-add-set-btn    { display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .13s; }
