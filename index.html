        items.filter(i => !i.done).forEach(i => { prioMap[i.priority || 'none']++; });

        let html =
          '<div class="ls-stats-grid">' +
          '<div class="ls-stat-card"><div class="ls-stat-val">' + total + '</div><div class="ls-stat-lbl">Total de itens</div><div class="ls-stat-sub">' + done + ' concluídos</div></div>' +
          '<div class="ls-stat-card"><div class="ls-stat-val">' + pct + '%</div><div class="ls-stat-lbl">Concluído</div><div class="ls-stat-sub">' + (total - done) + ' pendentes</div></div>' +
          '<div class="ls-stat-card"><div class="ls-stat-val" style="color:var(--red)">' + overdue + '</div><div class="ls-stat-lbl">Atrasados</div><div class="ls-stat-sub" style="color:var(--amber)">' + today + ' hoje</div></div>' +
          '<div class="ls-stat-card"><div class="ls-stat-val">' + subDone + '/' + subTotal + '</div><div class="ls-stat-lbl">Subtarefas</div><div class="ls-stat-sub">' + withSubs + ' itens com subtarefas</div></div>' +
          '</div>';

        html +=
          '<div class="ls-stat-card" style="margin-bottom:14px">' +
          '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Itens pendentes por prioridade</div>' +
          '<div class="ls-prio-stat-row"><div class="ls-prio-dot" style="background:#f05f5f"></div><span class="ls-prio-stat-lbl">Alta prioridade</span><span class="ls-prio-stat-val">' + prioMap.alta + '</span></div>' +
          '<div class="ls-prio-stat-row"><div class="ls-prio-dot" style="background:var(--amber)"></div><span class="ls-prio-stat-lbl">Média prioridade</span><span class="ls-prio-stat-val">' + prioMap.media + '</span></div>' +
          '<div class="ls-prio-stat-row"><div class="ls-prio-dot" style="background:#3ecf7a"></div><span class="ls-prio-stat-lbl">Baixa prioridade</span><span class="ls-prio-stat-val">' + prioMap.baixa + '</span></div>' +
          '<div class="ls-prio-stat-row"><div class="ls-prio-dot" style="background:var(--border2)"></div><span class="ls-prio-stat-lbl">Sem prioridade</span><span class="ls-prio-stat-val">' + prioMap.none + '</span></div>' +
          '</div>';

        /* categorias */
        const catMap = {};
        items.forEach(i => { const c = i.category || 'Sem categoria'; if (!catMap[c]) catMap[c] = { total: 0, done: 0 }; catMap[c].total++; if (i.done) catMap[c].done++; });

        html += '<div class="ls-stat-card"><div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Por categoria</div>';
        Object.entries(catMap).forEach(([cat, v]) => {
          const p = v.total ? Math.round(v.done / v.total * 100) : 0;
          html +=
            '<div class="ls-prio-stat-row">' +
            '<span class="ls-prio-stat-lbl">' + esc(cat) + '</span>' +
            '<div style="flex:1;height:6px;background:var(--border2);border-radius:3px;margin:0 10px;overflow:hidden">' +
            '<div style="width:' + p + '%;height:100%;background:#3ecf7a;border-radius:3px"></div>' +
            '</div>' +
            '<span class="ls-prio-stat-val">' + v.done + '/' + v.total + '</span>' +
            '</div>';
        });
        html += '</div>';

        cont.innerHTML = html;
      },

      /* ══════════════════════════════════════
         UTILITÁRIOS
      ══════════════════════════════════════ */
      _dueTxt(ts) {
        const d = new Date(ts);
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const diff = Math.floor((d - today) / (1000 * 60 * 60 * 24));
        if (diff < 0) return 'Atrasado ' + Math.abs(diff) + 'd';
        if (diff === 0) return 'Hoje ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        if (diff === 1) return 'Amanhã';
        return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
      },

      _isToday(ts) {
        const d = new Date(ts);
        const today = new Date();
        return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
      },

      _slugify(s) { return s.replace(/[^a-z0-9]/gi, '_').toLowerCase(); },

      _beep(freq, dur) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = freq; o.type = 'sine';
          g.gain.setValueAtTime(0.2, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur / 1000);
          o.start(ctx.currentTime); o.stop(ctx.currentTime + dur / 1000);
        } catch (e) { }
      },
    });
  </script>

  <!-- plugin fluxogramas aqui -->
  <script>
    registerPlugin({
      id: 'crono',
      name: 'Cronogramas',
      icon: '📋',
      color: '#6e5cf5',

      css: `
/* ═══════════════════════════════════════
   PLUGIN CRONOGRAMAS
═══════════════════════════════════════ */
.cr-wrap         { padding:0 0 80px; }

/* ── HEADER / TOOLBAR ── */
.cr-toolbar      { display:flex;gap:7px;padding:14px 16px 10px;flex-wrap:wrap;align-items:center; }
.cr-search-wrap  { flex:1;min-width:160px;position:relative; }
.cr-search       { width:100%;background:var(--surf);border:1px solid var(--border2);border-radius:11px;padding:9px 34px 9px 12px;color:var(--text);font-family:var(--fb);font-size:13.5px;outline:none;transition:border-color .14s; }
.cr-search:focus { border-color:#6e5cf5;box-shadow:0 0 0 3px rgba(110,92,245,.15); }
.cr-search-ico   { position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4;pointer-events:none; }
.cr-toolbar-btn  { padding:9px 13px;border-radius:11px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-size:13px;cursor:pointer;transition:all .14s;white-space:nowrap; }
.cr-toolbar-btn:hover { background:var(--surf2);color:var(--text);border-color:var(--border3); }
.cr-toolbar-btn.accent { background:rgba(110,92,245,.12);border-color:#6e5cf5;color:#9b8af9; }

/* ── FORM CRIAR / EDITAR ── */
.cr-form         { background:var(--surf);border:1px solid var(--border2);border-radius:16px;margin:0 14px 12px;overflow:hidden; }
.cr-form-head    { display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border); }
.cr-form-title   { font-family:var(--fd);font-size:15px;font-weight:700;color:var(--text); }
.cr-form-close   { width:28px;height:28px;border-radius:8px;border:none;background:var(--surf2);color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.cr-form-body    { padding:14px 16px; }
.cr-field        { margin-bottom:10px; }
.cr-field label  { display:block;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px; }
.cr-inp          { width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;color:var(--text);font-family:var(--fb);font-size:13.5px;outline:none;transition:border-color .14s;resize:none; }
.cr-inp:focus    { border-color:#6e5cf5; }
.cr-steps-inp    { font-family:'Courier New',monospace;font-size:13px;min-height:140px;white-space:pre;overflow-x:auto; }
.cr-indent-row   { display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap; }
.cr-indent-btn   { padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:11.5px;cursor:pointer;transition:all .13s; }
.cr-indent-btn:hover { background:var(--surf);color:var(--text); }

/* ── LISTA DE CRONOGRAMAS ── */
.cr-list         { display:flex;flex-direction:column;gap:10px;padding:0 14px; }

.cr-empty-ico    { font-size:44px;display:block;margin-bottom:10px; }

/* ── CARD CRONOGRAMA ── */
.cr-card         { background:var(--surf);border:1px solid var(--border2);border-radius:16px;overflow:hidden;transition:border-color .14s; }
.cr-card.done    { opacity:.65; }
.cr-card-head    { padding:13px 14px 10px; }
.cr-card-title-row { display:flex;align-items:flex-start;gap:8px;margin-bottom:8px; }

.cr-card-name    { font-family:var(--fd);font-size:16px;font-weight:700;color:var(--text);flex:1;line-height:1.3; }
.cr-card-name mark { background:#6e5cf522;color:#9b8af9;border-radius:3px;padding:0 2px; }
.cr-prog-row     { display:flex;align-items:center;gap:8px;margin-bottom:4px; }
.cr-prog-bar-bg  { flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden; }
.cr-prog-bar     { height:100%;background:linear-gradient(90deg,#6e5cf5,#9b8af9);border-radius:3px;transition:width .4s ease; }
.cr-prog-txt     { font-size:11px;color:var(--text3);white-space:nowrap; }
.cr-card-actions { display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 12px; }
.cr-act-btn      { display:flex;align-items:center;gap:4px;padding:7px 11px;border-radius:9px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .13s; }
.cr-act-btn:hover { background:var(--surf);color:var(--text);border-color:var(--border3); }
.cr-act-btn.accent { background:rgba(110,92,245,.1);border-color:#6e5cf5;color:#9b8af9; }
.cr-act-btn.green  { background:var(--green-bg);border-color:rgba(62,207,122,.3);color:#3ecf7a; }
.cr-act-btn.red    { background:var(--red-bg);border-color:rgba(240,95,95,.3);color:var(--red); }
.cr-act-btn.reading { background:var(--amber-bg);border-color:var(--amber);color:var(--amber); }

/* ── IMAGENS ── */
.cr-imgs-scroll  { display:none;gap:8px;overflow-x:auto;padding:0 14px 12px;scrollbar-width:none; }
.cr-imgs-scroll::-webkit-scrollbar { display:none; }
.cr-imgs-scroll.on { display:flex; }
.cr-img-card     { flex-shrink:0;width:90px;height:90px;border-radius:10px;overflow:hidden;cursor:pointer; }
.cr-img-card img { width:100%;height:100%;object-fit:cover; }

/* ── PASSOS ── */
.cr-steps-section { border-top:1px solid var(--border); }
.cr-steps-controls{ display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid var(--border); }
.cr-step-ctrl-btn { padding:4px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--surf2);color:var(--text3);font-size:11px;cursor:pointer;transition:all .13s; }
.cr-step-ctrl-btn:hover { color:var(--text);background:var(--surf); }
.cr-steps-search  { display:flex;gap:5px;padding:6px 14px;border-bottom:1px solid var(--border);align-items:center; }
.cr-step-search-inp{ flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12.5px;outline:none; }
.cr-step-search-inp:focus { border-color:#6e5cf5; }
.cr-step-nav-btn  { width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.cr-step-nav-btn:hover { background:var(--surf);color:var(--text); }
.cr-search-count  { font-size:11px;color:var(--text3);white-space:nowrap; }

.cr-steps-list    { padding:6px 0; }
.cr-step          { display:flex;align-items:flex-start;gap:8px;padding:7px 14px;cursor:pointer;transition:background .12s;position:relative; }
.cr-step:hover    { background:rgba(255,255,255,.03); }
.cr-step.active   { background:rgba(110,92,245,.08);border-left:3px solid #6e5cf5; }
.cr-step.completed .cr-step-text { text-decoration:line-through;color:var(--text3); }
.cr-step.focused  { background:rgba(245,187,69,.08);border-left:3px solid var(--amber); }

.cr-collapse-ico  { color:var(--text3);font-size:11px;cursor:pointer;flex-shrink:0;width:16px;text-align:center;margin-top:3px;user-select:none;transition:transform .15s; }
.cr-step-check    { width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surf2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-top:2px;font-size:10px;transition:all .14s; }
.cr-step-check.on { background:#6e5cf5;border-color:#6e5cf5;color:#fff; }
.cr-step-text     { flex:1;font-size:13.5px;color:var(--text);line-height:1.5;word-break:break-word; }
.cr-step-text mark{ background:#6e5cf522;color:#9b8af9;border-radius:3px;padding:0 2px; }

/* Níveis visuais */
.cr-step[data-level="1"] { padding-left:30px; }
.cr-step[data-level="2"] { padding-left:46px; }
.cr-step[data-level="3"] { padding-left:62px; }
.cr-step[data-level="4"] { padding-left:78px; }
.cr-step[data-level="5"] { padding-left:94px; }

/* Nota de áudio inline */
.cr-audio-player  { display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(110,92,245,.12);border:1px solid rgba(110,92,245,.25);cursor:pointer;vertical-align:middle;margin:0 3px;transition:all .13s; }
.cr-audio-player:hover,.cr-audio-player.playing { background:rgba(110,92,245,.22);border-color:#6e5cf5; }
.cr-audio-play-ico{ font-size:11px;color:#9b8af9; }
.cr-audio-dur     { font-size:10.5px;color:var(--text3); }
.cr-audio-waves   { display:flex;align-items:center;gap:2px; }
.cr-audio-waves span { display:block;width:2px;border-radius:1px;background:#9b8af9; }
.cr-audio-player.playing .cr-audio-waves span { animation:crWave .8s ease-in-out infinite; }
.cr-audio-waves span:nth-child(2){ animation-delay:.1s; }
.cr-audio-waves span:nth-child(3){ animation-delay:.2s; }
.cr-audio-waves span:nth-child(4){ animation-delay:.1s; }
@keyframes crWave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(2)} }

/* Modal imagem */
.cr-img-modal     { position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center; }
.cr-img-modal.on  { display:flex; }
.cr-img-modal img { max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain; }
.cr-img-modal-close { position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.cr-img-nav       { position:fixed;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.cr-img-nav.left  { left:12px; }
.cr-img-nav.right { right:12px; }

/* Câmera modal */
.cr-cam-modal     { position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px; }
.cr-cam-modal.on  { display:flex; }
.cr-cam-video     { max-width:90vw;max-height:65vh;border-radius:12px; }
.cr-cam-btns      { display:flex;gap:10px; }
.cr-cam-btn       { padding:12px 22px;border-radius:11px;border:none;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer; }
.cr-cam-btn.capture { background:#3ecf7a;color:#fff; }
.cr-cam-btn.switch  { background:#6e5cf5;color:#fff; }
.cr-cam-btn.close   { background:var(--red);color:#fff; }
`,

      /* ═══════════════════ DEFAULT DATA ═══════════════════ */
      defaultData: () => ({
        cronogramas: [],
        // sem campos extras, tudo salvo aqui
      }),

      /* ═══════════════════ CARD ═══════════════════ */
      cardPreview(rec) {
        const list = rec.data.cronogramas || [];
        if (!list.length) return 'Nenhum cronograma ainda';
        const done = list.filter(c => c.steps.every(s => s.completed)).length;
        return list.length + ' cronograma' + (list.length !== 1 ? 's' : '') +
          (done ? ' · ' + done + ' concluído' + (done !== 1 ? 's' : '') : '');
      },

      cardBadge(rec) {
        const list = rec.data.cronogramas || [];
        if (!list.length) return '<span class="badge badge-p">Vazio</span>';
        const total = list.reduce((s, c) => s + c.steps.length, 0);
        const done = list.reduce((s, c) => s + c.steps.filter(st => st.completed).length, 0);
        const pct = total ? Math.round(done / total * 100) : 0;
        if (pct === 100) return '<span class="badge badge-g">✓ Tudo feito</span>';
        if (pct > 0) return '<span class="badge badge-a">' + pct + '% feito</span>';
        return '<span class="badge badge-p">' + list.length + ' item' + (list.length !== 1 ? 's' : '') + '</span>';
      },

      navActions: [
        {
          id: 'novo', icon: '＋', title: 'Novo cronograma',
          handler() { App.activePlugin._openForm(); }
        },
      ],

      /* ═══════════════════ ESTADO INTERNO ═══════════════════ */
      _el: null, _rec: null,
      _form: null,          // { mode:'new'|'edit', id, title, stepsText, images[], audioNotes{}, pendingAudio{} }
      _expandedIds: new Set(),
      _searchQuery: '',
      _stepSearches: {},    // { cronoId: { query, matches[], matchIdx } }
      _activeAudios: {},    // { noteId: HTMLAudioElement }
      _ttsActive: null,     // { cronoId, queue[], idx, utterance }
      _execActive: null,
      _voiceRec: null,
      _voiceTarget: null,   // 'title'|'steps'
      _isRecordingVoice: false,
      _isRecordingNote: false,
      _noteRecorder: null,
      _noteChunks: [],
      _noteTargetForm: null,
      _imgModalImages: [],
      _imgModalIdx: 0,
      _camStream: null,
      _camFacing: 'environment',
      _camForEdit: false,

      /* ═══════════════════ MOUNT / UNMOUNT ═══════════════════ */
      mount(container, rec) {
        this._el = container;
        this._rec = rec;
        this._render();
      },
      unmount() {
        this._stopTTS();
        this._stopVoice();
        this._closeCam();
        this._el = null; this._rec = null;
      },
      async _save() { await App.saveRecord(this._rec); },

      /* ═══════════════════════════════════════════════════════
         RENDER PRINCIPAL
      ═══════════════════════════════════════════════════════ */
      _render() {
        if (!this._el) return;
        const list = this._rec.data.cronogramas || [];

        // Filtra por busca global
        const q = this._searchQuery.toLowerCase().trim();
        const filtered = q
          ? list.filter(c => c.title.toLowerCase().includes(q) ||
            c.steps.some(s => s.text.toLowerCase().includes(q)))
          : list;

        document.getElementById('pluginNavSub').textContent =
          list.length + ' cronograma' + (list.length !== 1 ? 's' : '');

        let html = '<div class="cr-wrap">';

        // Toolbar
        html += '<div class="cr-toolbar">' +
          '<div class="cr-search-wrap">' +
          '<input class="cr-search" id="cr_gsearch" type="text" placeholder="Buscar cronogramas…" value="' + esc(this._searchQuery) + '" ' +
          'oninput="App.activePlugin._onGlobalSearch(this.value)">' +
          '<span class="cr-search-ico">🔍</span>' +
          '</div>' +
          '<button class="cr-toolbar-btn accent" onclick="App.activePlugin._openForm()">＋ Novo</button>' +
          '</div>';

        // Formulário (se aberto)
        if (this._form) html += this._renderForm();

        // Lista
        html += '<div class="cr-list">';
        if (!filtered.length) {
          html += '<div class="cr-empty"><span class="cr-empty-ico">📋</span>' +
            (q ? 'Nenhum resultado para "' + esc(q) + '"' : 'Nenhum cronograma ainda.<br>Toque em + Novo para criar.') +
            '</div>';
        } else {
          filtered.forEach(c => { html += this._renderCard(c); });
        }
        html += '</div></div>';

        // Modais
        html += this._renderImgModal();
        html += this._renderCamModal();

        this._el.innerHTML = html;
        this._bindEvents();
      },

      /* ═══════════════════════════════════════════════════════
         FORMULÁRIO CRIAR / EDITAR
      ═══════════════════════════════════════════════════════ */
      _openForm(crono) {
        this._form = crono
          ? {
            mode: 'edit', id: crono.id, title: crono.title,
            stepsText: this._stepsToText(crono.steps),
            images: [...(crono.images || [])],
            audioNotes: { ...(crono.audioNotes || {}) },
            pendingAudio: {}
          }
          : {
            mode: 'new', id: null, title: '', stepsText: '',
            images: [], audioNotes: {}, pendingAudio: {}
          };
        this._render();
        setTimeout(() => {
          const inp = document.getElementById('cr_form_steps');
          if (inp) { inp.focus(); inp.scrollTop = inp.scrollHeight; }
        }, 80);
      },

      _closeForm() { this._form = null; this._render(); },

      _renderForm() {
        const f = this._form;
        const COLORS = ['#f05f5f', '#f5bb45', '#3ecf7a', '#6e5cf5', '#22d3ee', '#a78bfa', '#fb923c', '#e879f9'];
        const imgPreviews = f.images.map((src, i) =>
          '<div class="cr-img-thumb">' +
          '<img src="' + src + '">' +
          '<button class="cr-img-rm" onclick="App.activePlugin._removeFormImg(' + i + ')">✕</button>' +
          '</div>'
        ).join('');

        return '<div class="cr-form">' +
          '<div class="cr-form-head">' +
          '<span class="cr-form-title">' + (f.mode === 'new' ? '＋ Novo Cronograma' : '✏️ Editar') + '</span>' +
          '<button class="cr-form-close" onclick="App.activePlugin._closeForm()">✕</button>' +
          '</div>' +
          '<div class="cr-form-body">' +

          // Voz
          '<div class="cr-voice-row">' +
          '<button class="cr-mic-btn' + (this._isRecordingVoice ? ' rec' : '') + '" id="cr_mic_btn" onclick="App.activePlugin._toggleVoice()">' +
          (this._isRecordingVoice ? '⏹ Parar' : '🎤 Voz') +
          '</button>' +
          '<span class="cr-mic-status" id="cr_mic_status"></span>' +
          '</div>' +

          // Título
          '<div class="cr-field"><label>Título</label>' +
          '<input class="cr-inp" id="cr_form_title" type="text" placeholder="Nome do cronograma…" value="' + esc(f.title) + '"></div>' +

          // Passos
          '<div class="cr-field"><label>Passos (2 espaços = 1 nível de indentação)</label>' +
          '<div class="cr-indent-row">' +
          '<button class="cr-indent-btn" onclick="App.activePlugin._indent(\'cr_form_steps\',1)">→ Indentar</button>' +
          '<button class="cr-indent-btn" onclick="App.activePlugin._indent(\'cr_form_steps\',-1)">← Remover</button>' +
          '<button class="cr-indent-btn" onclick="App.activePlugin._indent(\'cr_form_steps\',0)">⌫ Raiz</button>' +
          '<span class="cr-level-badge" id="cr_level_badge">Raiz (0)</span>' +
          '</div>' +
          '<textarea class="cr-inp cr-steps-inp" id="cr_form_steps" rows="8" ' +
          'oninput="App.activePlugin._onStepsInput()" ' +
          'onclick="App.activePlugin._updateLevelBadge()" ' +
          'onkeydown="App.activePlugin._onStepsKeydown(event)">' +
          esc(f.stepsText) +
          '</textarea>' +
          '</div>' +

          // Nota de áudio
          '<div class="cr-voice-row">' +
          '<button class="cr-audio-note-btn' + (this._isRecordingNote ? ' rec' : '') + '" onclick="App.activePlugin._toggleAudioNote()">' +
          (this._isRecordingNote ? '⏹ Parar Gravação' : '🎵 Nota de Áudio') +
          '</button>' +
          '<span class="cr-mic-status" id="cr_note_status"></span>' +
          '</div>' +

          // Imagens
          '<div class="cr-field"><label>Imagens</label>' +
          '<div class="cr-img-row">' +
          '<button class="cr-img-btn" onclick="App.activePlugin._openCam()">📷 Câmera</button>' +
          '<button class="cr-img-btn" onclick="document.getElementById(\'cr_file_inp\').click()">🖼️ Galeria</button>' +
          '</div>' +
          '<input type="file" id="cr_file_inp" accept="image/*" multiple style="display:none" onchange="App.activePlugin._onFileSelect(event)">' +
          (imgPreviews ? '<div class="cr-img-previews">' + imgPreviews + '</div>' : '') +
          '</div>' +

          '<div class="cr-form-actions">' +
          '<button class="cr-save-btn" onclick="App.activePlugin._saveForm()">💾 Salvar</button>' +
          '<button class="cr-cancel-btn" onclick="App.activePlugin._closeForm()">Cancelar</button>' +
          '</div>' +
          '</div>' +
          '</div>';
      },

      _onStepsInput() {
        const inp = document.getElementById('cr_form_steps');
        if (inp && this._form) this._form.stepsText = inp.value;
        this._updateLevelBadge();
      },

      _onStepsKeydown(e) {
        const ta = document.getElementById('cr_form_steps');
        if (!ta) return;
        if (e.key === 'Tab') {
          e.preventDefault();
          const s = ta.selectionStart;
          ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
          ta.selectionStart = ta.selectionEnd = s + 2;
          this._updateLevelBadge();
        }
      },

      _updateLevelBadge() {
        const ta = document.getElementById('cr_form_steps');
        const badge = document.getElementById('cr_level_badge');
        if (!ta || !badge) return;
        const val = ta.value;
        const lineStart = val.lastIndexOf('\n', ta.selectionStart - 1) + 1;
        const lineEnd = val.indexOf('\n', ta.selectionStart);
        const line = val.substring(lineStart, lineEnd === -1 ? val.length : lineEnd);
        const spaces = (line.match(/^ */)[0] || '').length;
        const level = Math.floor(spaces / 2);
        const labels = ['Raiz', 'Sub', 'Sub-sub', 'Detalhe', 'Nível 4', 'Nível 5'];
        const colors = ['#4caf50', '#2196f3', '#ff9800', '#9c27b0', '#607d8b', '#795548'];
        badge.textContent = (labels[level] || 'Nível ' + level) + ' (' + level + ')';
        badge.style.background = (colors[level] || '#607d8b') + '33';
        badge.style.color = colors[level] || '#607d8b';
      },

      _indent(taId, dir) {
        const ta = document.getElementById(taId);
        if (!ta) return;
        const val = ta.value;
        const s = ta.selectionStart;
        const lineStart = val.lastIndexOf('\n', s - 1) + 1;
        const lineEnd = val.indexOf('\n', s);
        const end = lineEnd === -1 ? val.length : lineEnd;
        const line = val.substring(lineStart, end);
        let newLine;
        if (dir === 1) newLine = '  ' + line;
        else if (dir === -1) newLine = line.replace(/^ {1,2}/, '');
        else newLine = line.trimStart();
        ta.value = val.substring(0, lineStart) + newLine + val.substring(end);
        ta.selectionStart = ta.selectionEnd = lineStart + newLine.length;
        ta.focus();
        if (this._form) this._form.stepsText = ta.value;
        this._updateLevelBadge();
      },

      async _saveForm() {
        const f = this._form;
        if (!f) return;
        const titleEl = document.getElementById('cr_form_title');
        const stepsEl = document.getElementById('cr_form_steps');
        const title = (titleEl ? titleEl.value : f.title).trim();
        const stepsText = (stepsEl ? stepsEl.value : f.stepsText).trim();
        if (!title) { toast('Insira um título'); return; }
        if (!stepsText) { toast('Insira pelo menos um passo'); return; }

        // Merge audioNotes pendentes
        const audioNotes = { ...f.audioNotes, ...f.pendingAudio };
        const steps = this._textToSteps(stepsText);

        const list = this._rec.data.cronogramas;
        if (f.mode === 'new') {
          list.unshift({
            id: 'c' + Date.now(), title, steps,
            images: f.images, audioNotes, createdAt: Date.now()
          });
        } else {
          const existing = list.find(c => c.id === f.id);
          if (existing) {
            // Preserva completed dos steps existentes
            steps.forEach((s, i) => {
              const old = existing.steps[i];
              s.completed = old ? old.completed : false;
            });
            existing.title = title;
            existing.steps = steps;
            existing.images = f.images;
            existing.audioNotes = audioNotes;
            // Limpa audioNotes órfãs
            const allText = steps.map(s => s.text).join('\n');
            Object.keys(existing.audioNotes).forEach(id => {
              if (!allText.includes(id)) delete existing.audioNotes[id];
            });
          }
        }
        this._form = null;
        await this._save();
        this._render();
        toast(f.mode === 'new' ? '📋 Cronograma criado!' : '✅ Salvo!');
      },

      _removeFormImg(i) {
        if (this._form) this._form.images.splice(i, 1);
        this._render();
      },

      /* ═══════════════════════════════════════════════════════
         PASSOS — CONVERSÃO TEXTO ↔ ARRAY
      ═══════════════════════════════════════════════════════ */
      _textToSteps(text) {
        return text.split('\n').filter(l => l.trim()).map(line => {
          const spaces = (line.match(/^ */)[0] || '').length;
          return { text: line.trim(), level: Math.floor(spaces / 2), completed: false };
        });
      },

      _stepsToText(steps) {
        return (steps || []).map(s => '  '.repeat(s.level || 0) + s.text).join('\n');
      },

      /* ═══════════════════════════════════════════════════════
         RENDER CARD
      ═══════════════════════════════════════════════════════ */
      _renderCard(crono) {
        const steps = crono.steps || [];
        const total = steps.length;
        const done = steps.filter(s => s.completed).length;
        const pct = total ? Math.round(done / total * 100) : 0;
        const isExpanded = this._expandedIds.has(crono.id);
        const isDone = pct === 100;
        const ss = this._stepSearches[crono.id] || { query: '', matches: [], matchIdx: 0 };
        const tts = this._ttsActive;
        const isReading = tts && tts.cronoId === crono.id;

        let html = '<div class="cr-card' + (isDone ? ' done' : '') + '" id="crcard_' + crono.id + '">' +
          '<div class="cr-card-head">' +
          '<div class="cr-card-title-row">' +
          '<div class="cr-card-stripe" style="background:#6e5cf5"></div>' +
          '<div class="cr-card-name">' + this._highlightText(crono.title, this._searchQuery) + '</div>' +
          '</div>' +
          '<div class="cr-prog-row">' +
          '<div class="cr-prog-bar-bg"><div class="cr-prog-bar" style="width:' + pct + '%"></div></div>' +
          '<span class="cr-prog-txt">' + done + '/' + total + ' · ' + pct + '%</span>' +
          '</div>' +
          '</div>' +

          // Ações
          '<div class="cr-card-actions">' +
          '<button class="cr-act-btn accent" onclick="App.activePlugin._toggleExpand(\'' + crono.id + '\')">' +
          (isExpanded ? '▲ Recolher' : '▼ Expandir (' + total + ' passos)') + '</button>' +
          (crono.images && crono.images.length ?
            '<button class="cr-act-btn" onclick="App.activePlugin._toggleImgs(\'' + crono.id + '\')">' +
            '🖼️ Imagens</button>' : '') +
          '<button class="cr-act-btn green" onclick="App.activePlugin._execNext(\'' + crono.id + '\')" title="Ler e marcar próximo passo">▶️ Executar</button>' +
          '<button class="cr-act-btn' + (isReading ? ' reading' : '') + '" onclick="App.activePlugin._toggleTTS(\'' + crono.id + '\')">' +
          (isReading ? '⏹ Parar' : '🔊 Ler') + '</button>' +
          '<button class="cr-act-btn" onclick="App.activePlugin._openForm(App.activePlugin._rec.data.cronogramas.find(c=>c.id===\'' + crono.id + '\'))">✏️ Editar</button>' +
          '<button class="cr-act-btn" onclick="App.activePlugin._resetCrono(\'' + crono.id + '\')">🔄 Reset</button>' +
          '<button class="cr-act-btn red" onclick="App.activePlugin._deleteCrono(\'' + crono.id + '\')">🗑</button>' +
          '</div>' +

          // Imagens
          '<div class="cr-imgs-scroll" id="crim_' + crono.id + '">' +
          (crono.images || []).map((src, i) =>
            '<div class="cr-img-card" onclick="App.activePlugin._openImgModal(\'' + crono.id + '\',' + i + ')">' +
            '<img src="' + src + '" loading="lazy">' +
            '</div>'
          ).join('') +
          '</div>';

        // Passos expandidos
        if (isExpanded) {
          html += '<div class="cr-steps-section">' +
            '<div class="cr-steps-controls">' +
            '<button class="cr-step-ctrl-btn" onclick="App.activePlugin._expandAll(\'' + crono.id + '\')">▼ Expandir tudo</button>' +
            '<button class="cr-step-ctrl-btn" onclick="App.activePlugin._collapseAll(\'' + crono.id + '\')">▶ Recolher tudo</button>' +
            '</div>' +
            '<div class="cr-steps-search">' +
            '<input class="cr-step-search-inp" id="crss_' + crono.id + '" type="text" placeholder="Buscar nos passos…" value="' + esc(ss.query) + '" ' +
            'oninput="App.activePlugin._onStepSearch(\'' + crono.id + '\',this.value)">' +
            '<button class="cr-step-nav-btn" onclick="App.activePlugin._stepSearchNav(\'' + crono.id + '\',-1)">◀</button>' +
            '<button class="cr-step-nav-btn" onclick="App.activePlugin._stepSearchNav(\'' + crono.id + '\',1)">▶</button>' +
            (ss.matches.length ? '<span class="cr-search-count">' + (ss.matchIdx + 1) + '/' + ss.matches.length + '</span>' : '') +
            '<button class="cr-step-nav-btn" onclick="App.activePlugin._clearStepSearch(\'' + crono.id + '\')">✕</button>' +
            '<button class="cr-step-nav-btn" title="Buscar por voz" onclick="App.activePlugin._voiceStepSearch(\'' + crono.id + '\')">🎙️</button>' +
            '</div>' +
            '<div class="cr-steps-list" id="crsteps_' + crono.id + '">' +
            this._renderSteps(crono) +
            '</div>' +
            '</div>';
        }

        html += '</div>';
        return html;
      },

      /* ═══════════════════════════════════════════════════════
         RENDER PASSOS
      ═══════════════════════════════════════════════════════ */
      _renderSteps(crono) {
        const steps = crono.steps || [];
        const notes = crono.audioNotes || {};
        const ss = this._stepSearches[crono.id] || { query: '', matches: [], matchIdx: 0 };
        const colState = this._getColState(crono.id); // { [idx]: 'open'|'closed' }

        let html = '';
        steps.forEach((step, i) => {
          const level = step.level || 0;
          const hasChildren = i < steps.length - 1 && steps[i + 1].level > level;
          const colKey = crono.id + '_' + i;
          const isCollapsed = colState[i] === 'closed';
          // Se algum pai está fechado, este step é oculto
          const isHidden = this._isStepHidden(steps, i, colState);

          const isMatch = ss.matches.includes(i);
          const isFocused = ss.matches.length && ss.matches[ss.matchIdx] === i;

          let textHtml = this._renderStepText(step.text, notes, ss.query);
          if (isMatch && ss.query) textHtml = this._highlightText(step.text, ss.query);

          const colIco = hasChildren
            ? '<span class="cr-collapse-ico" onclick="App.activePlugin._toggleStepCollapse(\'' + crono.id + '\',' + i + ',event)">' +
            (isCollapsed ? '▶' : '▼') + '</span>'
            : '<span class="cr-collapse-ico" style="opacity:0;pointer-events:none">▶</span>';

          html += '<div class="cr-step' +
            (step.completed ? ' completed' : '') +
            (isFocused ? ' focused' : '') +
            '" data-idx="' + i + '" data-level="' + level + '" ' +
            'style="' + (isHidden ? 'display:none;' : '') + '"' +
            ' onclick="App.activePlugin._onStepClick(\'' + crono.id + '\',' + i + ',event)">' +
            colIco +
            '<div class="cr-step-check' + (step.completed ? ' on' : '') + '" ' +
            'onclick="App.activePlugin._toggleStep(\'' + crono.id + '\',' + i + ',event)">' +
            (step.completed ? '✓' : '') + '</div>' +
            '<div class="cr-step-text">' + textHtml + '</div>' +
            '</div>';
        });

        return html || '<div style="padding:12px 14px;color:var(--text3);font-size:13px">Nenhum passo</div>';
      },

      _isStepHidden(steps, idx, colState) {
        const level = steps[idx].level || 0;
        if (level === 0) return false;
        // Procura pai mais próximo
        for (let i = idx - 1; i >= 0; i--) {
          const parentLevel = steps[i].level || 0;
          if (parentLevel < level) {
            if (colState[i] === 'closed') return true;
            return this._isStepHidden(steps, i, colState);
          }
        }
        return false;
      },

      _getColState(cronoId) {
        return this['_colState_' + cronoId] || (this['_colState_' + cronoId] = {});
      },

      _toggleStepCollapse(cronoId, idx, e) {
        if (e) { e.stopPropagation(); e.preventDefault(); }
        const state = this._getColState(cronoId);
        state[idx] = state[idx] === 'closed' ? 'open' : 'closed';
        const cont = document.getElementById('crsteps_' + cronoId);
        if (!cont) return;
        const crono = this._rec.data.cronogramas.find(c => c.id === cronoId);
        if (crono) cont.innerHTML = this._renderSteps(crono);
      },

      _expandAll(cronoId) {
        this['_colState_' + cronoId] = {};
        const cont = document.getElementById('crsteps_' + cronoId);
        const crono = this._rec.data.cronogramas.find(c => c.id === cronoId);
        if (cont && crono) cont.innerHTML = this._renderSteps(crono);
      },

      _collapseAll(cronoId) {
        const crono = this._rec.data.cronogramas.find(c => c.id === cronoId);
        if (!crono) return;
        const state = {};
        crono.steps.forEach((s, i) => {
          const hasChildren = i < crono.steps.length - 1 && crono.steps[i + 1].level > (s.level || 0);
          if (hasChildren) state[i] = 'closed';
        });
        this['_colState_' + cronoId] = state;
        const cont = document.getElementById('crsteps_' + cronoId);
        if (cont) cont.innerHTML = this._renderSteps(crono);
      },

      /* ═══════════════════════════════════════════════════════
         TEXTO DO PASSO — áudio inline
      ═══════════════════════════════════════════════════════ */
      _renderStepText(text, notes, searchQ) {
        const base = searchQ ? this._highlightText(text, searchQ) : esc(text);
        // substitui marcadores de áudio
        return base.replace(/\[AUDIO_NOTE:(an_[\w]+)\]/g, (match, noteId) => {
          const hasSrc = !!(notes && notes[noteId]);
          if (!hasSrc) return '<span style="color:var(--text3);font-size:11px">[áudio]</span>';
          return '<span class="cr-audio-player" data-note="' + noteId + '" ' +
            'onclick="App.activePlugin._toggleAudioPlay(\'' + noteId + '\',event)">' +
            '<span class="cr-audio-play-ico">▶</span>' +
            '<span class="cr-audio-waves">' +
            '<span style="height:4px"></span><span style="height:10px"></span>' +
            '<span style="height:14px"></span><span style="height:10px"></span>' +
            '<span style="height:4px"></span>' +
            '</span>' +
            '<span class="cr-audio-dur" id="crdur_' + noteId + '">♪</span>' +
            '</span>';
        });
      },

      _highlightText(text, query) {
        if (!query) return esc(text);
        const norm = t => t.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        const nq = norm(query);
        const ne = esc(text);
        // Destaque simples
        try {
          return ne.replace(new RegExp('(' + nq.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
        } catch { return ne; }
      },

      /* ═══════════════════════════════════════════════════════
         AÇÕES DOS PASSOS
      ═══════════════════════════════════════════════════════ */
      _onStepClick(cronoId, idx, e) {
        if (e.target.classList.contains('cr-collapse-ico') ||
          e.target.classList.contains('cr-step-check') ||
          e.target.closest('.cr-audio-player')) return;
        this._toggleStep(cronoId, idx, e);
      },

      async _toggleStep(cronoId, idx, e) {
        if (e) e.stopPropagation();
        const crono = this._rec.data.cronogramas.find(c => c.id === cronoId);
        if (!crono || !crono.steps[idx]) return;
        crono.steps[idx].completed = !crono.steps[idx].completed;
        await this._save();
        // Atualiza só o card sem re-renderizar tudo
        this._refreshCard(cronoId);
      },

      async _resetCrono(id) {
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        crono.steps.forEach(s => s.completed = false);
        await this._save();
        this._refreshCard(id);
        toast('🔄 Progresso resetado');
      },

      async _deleteCrono(id) {
        this._rec.data.cronogramas = this._rec.data.cronogramas.filter(c => c.id !== id);
        this._expandedIds.delete(id);
        await this._save();
        this._render();
        toast('Cronograma removido');
      },

      /* ═══════════════════════════════════════════════════════
         EXPAND / COLLAPSE CARD
      ═══════════════════════════════════════════════════════ */
      _toggleExpand(id) {
        if (this._expandedIds.has(id)) {
          this._expandedIds.delete(id);
        } else {
          this._expandedIds.add(id);
        }
        this._render();
        setTimeout(() => {
          const el = document.getElementById('crcard_' + id);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 80);
      },

      /* ═══════════════════════════════════════════════════════
         BUSCA NOS PASSOS
      ═══════════════════════════════════════════════════════ */
      _onStepSearch(id, q) {
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        const norm = t => t.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        const nq = norm(q.trim());
        const matches = nq
          ? crono.steps.map((s, i) => norm(s.text).includes(nq) ? i : -1).filter(i => i >= 0)
          : [];
        this._stepSearches[id] = { query: q, matches, matchIdx: 0 };
        const cont = document.getElementById('crsteps_' + id);
        if (cont) cont.innerHTML = this._renderSteps(crono);
        if (matches.length) this._scrollToStep(id, matches[0]);
        // Atualiza contador
        this._refreshStepSearchUI(id);
      },

      _stepSearchNav(id, dir) {
        const ss = this._stepSearches[id];
        if (!ss || !ss.matches.length) return;
        ss.matchIdx = (ss.matchIdx + dir + ss.matches.length) % ss.matches.length;
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        const cont = document.getElementById('crsteps_' + id);
        if (cont && crono) cont.innerHTML = this._renderSteps(crono);
        this._scrollToStep(id, ss.matches[ss.matchIdx]);
        this._refreshStepSearchUI(id);
      },

      _clearStepSearch(id) {
        this._stepSearches[id] = { query: '', matches: [], matchIdx: 0 };
        const inp = document.getElementById('crss_' + id);
        if (inp) inp.value = '';
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        const cont = document.getElementById('crsteps_' + id);
        if (cont && crono) cont.innerHTML = this._renderSteps(crono);
        this._refreshStepSearchUI(id);
      },

      _refreshStepSearchUI(id) {
        // Re-renderiza apenas o header de busca para atualizar contador
        const ss = this._stepSearches[id] || { query: '', matches: [], matchIdx: 0 };
        const countEl = document.querySelector('#crcard_' + id + ' .cr-search-count');
        if (countEl) countEl.textContent = ss.matches.length ? (ss.matchIdx + 1) + '/' + ss.matches.length : '';
      },

      _scrollToStep(id, idx) {
        setTimeout(() => {
          const cont = document.getElementById('crsteps_' + id);
          if (!cont) return;
          const el = cont.querySelector('[data-idx="' + idx + '"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 60);
      },

      _voiceStepSearch(id) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { toast('Voz não suportada'); return; }
        const r = new SR();
        r.lang = 'pt-BR'; r.interimResults = false;
        r.onresult = e => {
          const t = e.results[0][0].transcript;
          const inp = document.getElementById('crss_' + id);
          if (inp) { inp.value = t; this._onStepSearch(id, t); }
        };
        r.onerror = () => toast('Erro no microfone');
        r.start();
        toast('🎙️ Ouvindo…');
      },

      /* ═══════════════════════════════════════════════════════
         TTS — LER EM VOZ ALTA
      ═══════════════════════════════════════════════════════ */
      _toggleTTS(id) {
        if (this._ttsActive && this._ttsActive.cronoId === id) {
          this._stopTTS(); return;
        }
        this._stopTTS();
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        const queue = this._buildTTSQueue(crono);
        this._ttsActive = { cronoId: id, queue, idx: 0 };
        this._playTTSNext();
        this._refreshCard(id);
      },

      _buildTTSQueue(crono) {
        const queue = [{ type: 'speech', text: crono.title }, { type: 'pause', ms: 1000 }];
        const notes = crono.audioNotes || {};
        (crono.steps || []).forEach((step, i) => {
          const parts = step.text.split(/\[AUDIO_NOTE:(an_[\w]+)\]/g);
          for (let j = 0; j < parts.length; j++) {
            if (j % 2 === 0) { if (parts[j].trim()) queue.push({ type: 'speech', text: parts[j].trim() }); }
            else { const src = notes[parts[j]]; if (src) queue.push({ type: 'audio', src, noteId: parts[j] }); }
          }
          if (i < crono.steps.length - 1) queue.push({ type: 'pause', ms: 500 });
        });
        return queue;
      },

      _playTTSNext() {
        const state = this._ttsActive;
        if (!state || state.idx >= state.queue.length) { this._stopTTS(); return; }
        const item = state.queue[state.idx];
        if (item.type === 'pause') {
          state._timeout = setTimeout(() => { state.idx++; this._playTTSNext(); }, item.ms);
        } else if (item.type === 'audio') {
          const a = new Audio(item.src);
          a.onended = () => { state.idx++; this._playTTSNext(); };
          a.onerror = () => { state.idx++; this._playTTSNext(); };
          a.play().catch(() => { state.idx++; this._playTTSNext(); });
          state._audio = a;
        } else {
          const u = new SpeechSynthesisUtterance(item.text);
          u.lang = 'pt-BR'; u.rate = 0.9; u.pitch = 1;
          u.onend = () => { state.idx++; this._playTTSNext(); };
          u.onerror = () => { state.idx++; this._playTTSNext(); };
          speechSynthesis.speak(u);
          state._utt = u;
        }
      },

      _stopTTS() {
        if (!this._ttsActive) return;
        const s = this._ttsActive;
        speechSynthesis.cancel();
        if (s._timeout) clearTimeout(s._timeout);
        if (s._audio) { s._audio.pause(); }
        const cid = s.cronoId;
        this._ttsActive = null;
        this._refreshCard(cid);
      },

      /* ═══════════════════════════════════════════════════════
         EXECUTAR — passo a passo
      ═══════════════════════════════════════════════════════ */
      _execNext(id) {
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        const nextIdx = crono.steps.findIndex(s => !s.completed);
        if (nextIdx < 0) { toast('✅ Todos os passos concluídos!'); return; }

        const step = crono.steps[nextIdx];
        const notes = crono.audioNotes || {};
        const parts = step.text.split(/\[AUDIO_NOTE:(an_[\w]+)\]/g);
        const items = [];
        for (let j = 0; j < parts.length; j++) {
          if (j % 2 === 0) { if (parts[j].trim()) items.push({ type: 'speech', text: parts[j].trim() }); }
          else { const src = notes[parts[j]]; if (src) items.push({ type: 'audio', src }); }
        }

        const playItems = (i) => {
          if (i >= items.length) {
            crono.steps[nextIdx].completed = true;
            this._save().then(() => this._refreshCard(id));
            return;
          }
          const item = items[i];
          if (item.type === 'audio') {
            const a = new Audio(item.src);
            a.onended = () => playItems(i + 1);
            a.onerror = () => playItems(i + 1);
            a.play().catch(() => playItems(i + 1));
          } else {
            const u = new SpeechSynthesisUtterance(item.text);
            u.lang = 'pt-BR'; u.rate = 0.9;
            u.onend = () => playItems(i + 1);
            u.onerror = () => playItems(i + 1);
            speechSynthesis.cancel();
            speechSynthesis.speak(u);
          }
        };
        if (!items.length) {
          crono.steps[nextIdx].completed = true;
          this._save().then(() => this._refreshCard(id));
        } else {
          playItems(0);
        }
        // Abre o card e foca no passo
        if (!this._expandedIds.has(id)) {
          this._expandedIds.add(id);
          this._render();
        } else {
          this._scrollToStep(id, nextIdx);
        }
      },

      /* ═══════════════════════════════════════════════════════
         IMAGENS
      ═══════════════════════════════════════════════════════ */
      _toggleImgs(id) {
        const el = document.getElementById('crim_' + id);
        if (el) el.classList.toggle('on');
      },

      _openImgModal(id, idx) {
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        this._imgModalImages = crono.images || [];
        this._imgModalIdx = idx;
        this._showImgModal();
      },

      _showImgModal() {
        const modal = document.getElementById('cr_img_modal');
        const img = document.getElementById('cr_modal_img');
        if (!modal || !img) return;
        img.src = this._imgModalImages[this._imgModalIdx] || '';
        modal.classList.add('on');
      },

      _closeImgModal() {
        const modal = document.getElementById('cr_img_modal');
        if (modal) modal.classList.remove('on');
      },

      _navImg(dir) {
        const n = this._imgModalImages.length;
        if (!n) return;
        this._imgModalIdx = (this._imgModalIdx + dir + n) % n;
        const img = document.getElementById('cr_modal_img');
        if (img) img.src = this._imgModalImages[this._imgModalIdx];
      },

      _renderImgModal() {
        return '<div class="cr-img-modal" id="cr_img_modal">' +
          '<button class="cr-img-modal-close" onclick="App.activePlugin._closeImgModal()">✕</button>' +
          '<button class="cr-img-nav left" onclick="App.activePlugin._navImg(-1)">‹</button>' +
          '<img id="cr_modal_img" src="">' +
          '<button class="cr-img-nav right" onclick="App.activePlugin._navImg(1)">›</button>' +
          '</div>';
      },

      /* ═══════════════════════════════════════════════════════
         CÂMERA
      ═══════════════════════════════════════════════════════ */
      _openCam() {
        this._camForEdit = true;
        this._startCam();
      },

      async _startCam() {
        try {
          this._camStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: this._camFacing }
          });
          const modal = document.getElementById('cr_cam_modal');
          const video = document.getElementById('cr_cam_video');
          if (modal && video) {
            video.srcObject = this._camStream;
            modal.classList.add('on');
          }
        } catch (e) { toast('Erro ao acessar câmera'); }
      },

      async _switchCam() {
        this._closeCam();
        this._camFacing = this._camFacing === 'environment' ? 'user' : 'environment';
        await this._startCam();
      },

      _captureCam() {
        const video = document.getElementById('cr_cam_video');
        if (!video || !this._form) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        this._form.images.push(canvas.toDataURL('image/jpeg', 0.82));
        this._closeCam();
        this._render();
        toast('📷 Foto capturada!');
      },

      _closeCam() {
        if (this._camStream) {
          this._camStream.getTracks().forEach(t => t.stop());
          this._camStream = null;
        }
        const modal = document.getElementById('cr_cam_modal');
        if (modal) modal.classList.remove('on');
      },

      _renderCamModal() {
        return '<div class="cr-cam-modal" id="cr_cam_modal">' +
          '<video id="cr_cam_video" autoplay class="cr-cam-video"></video>' +
          '<div class="cr-cam-btns">' +
          '<button class="cr-cam-btn capture" onclick="App.activePlugin._captureCam()">📸 Capturar</button>' +
          '<button class="cr-cam-btn switch" onclick="App.activePlugin._switchCam()">🔄 Trocar</button>' +
          '<button class="cr-cam-btn close" onclick="App.activePlugin._closeCam()">✕ Fechar</button>' +
          '</div>' +
          '</div>';
      },

      _onFileSelect(e) {
        if (!this._form) return;
        Array.from(e.target.files).forEach(file => {
          const r = new FileReader();
          r.onload = ev => {
            this._form.images.push(ev.target.result);
            this._render();
          };
          r.readAsDataURL(file);
        });
        e.target.value = '';
      },

      /* ═══════════════════════════════════════════════════════
         VOZ — STT
      ═══════════════════════════════════════════════════════ */
      _toggleVoice() {
        if (this._isRecordingVoice) { this._stopVoice(); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { toast('Voz não suportada'); return; }
        if (!this._voiceRec) {
          this._voiceRec = new SR();
          this._voiceRec.lang = 'pt-BR';
          this._voiceRec.continuous = false;
          this._voiceRec.interimResults = false;
        }
        this._voiceRec.onresult = e => {
          const text = e.results[0][0].transcript.trim();
          this._handleVoiceResult(text);
        };
        this._voiceRec.onerror = () => { this._stopVoice(); toast('Erro no microfone'); };
        this._voiceRec.onend = () => this._stopVoice();
        this._voiceRec.start();
        this._isRecordingVoice = true;
        this._voiceTarget = !this._form?.title ? 'title' : 'steps';
        const btn = document.getElementById('cr_mic_btn');
        const st = document.getElementById('cr_mic_status');
        if (btn) { btn.classList.add('rec'); btn.textContent = '⏹ Parar'; }
        if (st) { st.className = 'cr-mic-status listening'; st.textContent = '🎤 Ouvindo…'; }
      },

      _stopVoice() {
        if (this._voiceRec && this._isRecordingVoice) {
          try { this._voiceRec.stop(); } catch (e) { }
        }
        this._isRecordingVoice = false;
        const btn = document.getElementById('cr_mic_btn');
        const st = document.getElementById('cr_mic_status');
        if (btn) { btn.classList.remove('rec'); btn.textContent = '🎤 Voz'; }
        if (st) { st.className = 'cr-mic-status'; st.textContent = ''; }
      },

      _handleVoiceResult(text) {
        const titleEl = document.getElementById('cr_form_title');
        const stepsEl = document.getElementById('cr_form_steps');
        if (!this._form) return;
        if (this._voiceTarget === 'title' || !this._form.title) {
          if (titleEl) { titleEl.value = text; this._form.title = text; }
          this._voiceTarget = 'steps';
          const st = document.getElementById('cr_mic_status');
          if (st) st.textContent = '✅ Título definido! Continue falando…';
        } else {
          if (stepsEl) {
            stepsEl.value += (stepsEl.value ? '\n' : '') + text;
            this._form.stepsText = stepsEl.value;
            stepsEl.scrollTop = stepsEl.scrollHeight;
          }
          const st = document.getElementById('cr_mic_status');
          if (st) st.textContent = '✅ Passo adicionado!';
        }
      },

      /* ═══════════════════════════════════════════════════════
         NOTA DE ÁUDIO INLINE
      ═══════════════════════════════════════════════════════ */
      async _toggleAudioNote() {
        if (this._isRecordingNote) {
          if (this._noteRecorder && this._noteRecorder.state !== 'inactive') this._noteRecorder.stop();
          return;
        }
        if (!navigator.mediaDevices) { toast('Microfone não disponível'); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          this._noteChunks = [];
          const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
          this._noteRecorder = new MediaRecorder(stream, { mimeType: mime });
          this._noteRecorder.ondataavailable = e => { if (e.data.size > 0) this._noteChunks.push(e.data); };
          this._noteRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            await this._insertAudioNote(mime);
            this._isRecordingNote = false;
            this._render();
          };
          this._noteRecorder.start(100);
          this._isRecordingNote = true;
          this._render();
        } catch (e) { toast('Não foi possível acessar o microfone'); }
      },

      async _insertAudioNote(mime) {
        if (!this._form) return;
        const blob = new Blob(this._noteChunks, { type: mime });
        const base64 = await new Promise(res => {
          const r = new FileReader();
          r.onload = e => res(e.target.result);
          r.readAsDataURL(blob);
        });
        const noteId = 'an_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        this._form.pendingAudio[noteId] = base64;
        // Insere marcador no textarea
        const ta = document.getElementById('cr_form_steps');
        if (ta) {
          const marker = '[AUDIO_NOTE:' + noteId + ']';
          const s = ta.selectionStart;
          ta.value = ta.value.substring(0, s) + marker + ta.value.substring(ta.selectionEnd);
          ta.selectionStart = ta.selectionEnd = s + marker.length;
          this._form.stepsText = ta.value;
        }
        toast('🎵 Nota de áudio inserida!');
      },

      /* ═══════════════════════════════════════════════════════
         PLAYER DE ÁUDIO INLINE
      ═══════════════════════════════════════════════════════ */
      _toggleAudioPlay(noteId, e) {
        if (e) e.stopPropagation();
        // Encontra o src nos cronogramas
        let src = null;
        for (const c of (this._rec.data.cronogramas || [])) {
          if (c.audioNotes && c.audioNotes[noteId]) { src = c.audioNotes[noteId]; break; }
        }
        if (!src) { toast('Áudio não encontrado'); return; }

        if (this._activeAudios[noteId]) {
          const a = this._activeAudios[noteId];
          if (!a.paused) { a.pause(); this._setAudioState(noteId, false); }
          else { a.play(); this._setAudioState(noteId, true); }
          return;
        }
        // Para todos os outros
        Object.entries(this._activeAudios).forEach(([id, a]) => {
          if (id !== noteId) { a.pause(); this._setAudioState(id, false); }
        });
        const audio = new Audio(src);
        this._activeAudios[noteId] = audio;
        // Duração
        audio.addEventListener('loadedmetadata', () => {
          const el = document.getElementById('crdur_' + noteId);
          if (el && isFinite(audio.duration)) {
            const s = Math.round(audio.duration);
            el.textContent = s < 60 ? s + 's' : Math.floor(s / 60) + 'm' + (s % 60) + 's';
          }
        });
        audio.onended = () => { this._setAudioState(noteId, false); delete this._activeAudios[noteId]; };
        audio.onerror = () => { delete this._activeAudios[noteId]; };
        audio.play();
        this._setAudioState(noteId, true);
      },

      _setAudioState(noteId, playing) {
        document.querySelectorAll('[data-note="' + noteId + '"]').forEach(el => {
          const ico = el.querySelector('.cr-audio-play-ico');
          if (playing) { el.classList.add('playing'); if (ico) ico.textContent = '⏸'; }
          else { el.classList.remove('playing'); if (ico) ico.textContent = '▶'; }
        });
      },

      /* ═══════════════════════════════════════════════════════
         REFRESH PARCIAL (sem re-renderizar tudo)
      ═══════════════════════════════════════════════════════ */
      _refreshCard(id) {
        const crono = this._rec.data.cronogramas.find(c => c.id === id);
        if (!crono) return;
        const el = document.getElementById('crcard_' + id);
        if (!el) { this._render(); return; }
        const tmp = document.createElement('div');
        tmp.innerHTML = this._renderCard(crono);
        el.replaceWith(tmp.firstElementChild);
        // Re-injeta durações de áudio
        const newEl = document.getElementById('crcard_' + id);
        if (newEl && crono.audioNotes) this._loadAudioDurations(newEl, crono.audioNotes);
      },

      _loadAudioDurations(container, notes) {
        container.querySelectorAll('[data-note]').forEach(el => {
          const noteId = el.getAttribute('data-note');
          const src = notes[noteId];
          if (!src) return;
          const tmp = new Audio(src);
          tmp.addEventListener('loadedmetadata', () => {
            const durEl = document.getElementById('crdur_' + noteId);
            if (durEl && isFinite(tmp.duration)) {
              const s = Math.round(tmp.duration);
              durEl.textContent = s < 60 ? s + 's' : Math.floor(s / 60) + 'm' + (s % 60) + 's';
            }
          });
        });
      },

      /* ═══════════════════════════════════════════════════════
         BUSCA GLOBAL
      ═══════════════════════════════════════════════════════ */
      _onGlobalSearch(q) {
        this._searchQuery = q;
        const list = document.querySelector('.cr-list');
        if (!list) { this._render(); return; }
        // Re-render apenas a lista
        this._render();
      },

      /* ═══════════════════════════════════════════════════════
         BIND EVENTS
      ═══════════════════════════════════════════════════════ */
      _bindEvents() {
        // Carrega durações de áudio nos players visíveis
        (this._rec.data.cronogramas || []).forEach(c => {
          if (!c.audioNotes) return;
          const el = document.getElementById('crcard_' + c.id);
          if (el) this._loadAudioDurations(el, c.audioNotes);
        });

        // Swipe no modal de imagem
        const modalImg = document.getElementById('cr_modal_img');
        if (modalImg) {
          let sx = 0;
          modalImg.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
          modalImg.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - sx;
            if (Math.abs(dx) > 50) this._navImg(dx < 0 ? 1 : -1);
          }, { passive: true });
        }

        // Fecha modal de imagem ao clicar no fundo
        const imgModal = document.getElementById('cr_img_modal');
        if (imgModal) imgModal.addEventListener('click', e => {
          if (e.target === imgModal) this._closeImgModal();
        });

        // Atualiza badge de nível no form
        const stepsEl = document.getElementById('cr_form_steps');
        if (stepsEl) {
          stepsEl.addEventListener('keyup', () => this._updateLevelBadge());
          stepsEl.addEventListener('click', () => this._updateLevelBadge());
        }
      },
    });
  </script>

  <!-- BOOT -->
  <script>
    (async () => {
      PWA.init();
      await App.loadAll();
      Home.render();
    })();
  </script>
