.ac-note-inp       { width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;color:var(--text2);font-family:var(--fb);font-size:12.5px;outline:none;resize:none;margin-top:8px; }
.ac-note-inp:focus { border-color:#f0516f; }

/* finish btn */
.ac-finish-btn     { width:100%;padding:15px;background:linear-gradient(135deg,#f0516f,#ff7043);border:none;border-radius:14px;color:#fff;font-family:var(--fd);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 5px 18px rgba(240,81,111,.35);margin:14px 0;transition:transform .13s; }
.ac-finish-btn:active { transform:scale(.98); }

/* ── FICHAS (aba Treinos) ── */
.ac-fichas-wrap    { display:flex;flex-direction:column;gap:10px; }
.ac-ficha-card     { background:var(--surf);border:1px solid var(--border2);border-radius:16px;overflow:hidden; }
.ac-ficha-head     { display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer; }

.ac-ficha-info     { flex:1;min-width:0; }
.ac-ficha-name     { font-family:var(--fd);font-size:16px;font-weight:700;color:var(--text); }

.ac-ficha-chev     { font-size:12px;color:var(--text3);transition:transform .2s; }
.ac-ficha-card.open .ac-ficha-chev { transform:rotate(180deg); }
.ac-ficha-body     { display:none;padding:0 16px 16px; }
.ac-ficha-card.open .ac-ficha-body { display:block; }
.ac-ficha-start-btn{ width:100%;padding:12px;background:#f0516f;border:none;border-radius:12px;color:#fff;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;transition:transform .13s; }
.ac-ficha-start-btn:active { transform:scale(.97); }
.ac-ficha-ex-list  { display:flex;flex-direction:column;gap:6px;margin-bottom:2px; }
.ac-ficha-ex-item  { display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:10px; }
.ac-ficha-ex-num   { width:22px;height:22px;border-radius:6px;background:rgba(240,81,111,.15);color:#f0516f;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.ac-ficha-ex-name  { flex:1;font-size:13px;color:var(--text);font-weight:500; }
.ac-ficha-ex-sets  { font-size:11.5px;color:var(--text3); }

/* add ficha */
.ac-add-ficha-form { background:var(--surf);border:1.5px dashed var(--border2);border-radius:16px;padding:16px;margin-top:4px; }
.ac-form-title     { font-family:var(--fd);font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px; }
.ac-field          { margin-bottom:10px; }
.ac-field label    { display:block;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px; }
.ac-field input,.ac-field select,.ac-field textarea {
  width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  padding:9px 12px;color:var(--text);font-family:var(--fb);font-size:13.5px;outline:none;
  transition:border-color .13s;resize:none;
}
.ac-field input:focus,.ac-field select:focus { border-color:#f0516f; }
.ac-ex-form-row    { background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:8px; }
.ac-ex-form-title  { font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center; }
.ac-ex-form-grid   { display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px; }
.ac-rm-btn         { background:var(--red-bg);border:none;color:var(--red);border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer; }
.ac-add-ex-form-btn{ display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;margin:8px 0;transition:all .13s; }
.ac-add-ex-form-btn:hover { border-color:#f0516f;color:#f0516f; }
.ac-save-ficha-btn { width:100%;padding:11px;background:#f0516f;border:none;border-radius:11px;color:#fff;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px; }
.ac-del-ficha-btn  { width:100%;padding:10px;background:var(--red-bg);border:1px solid var(--red);border-radius:11px;color:var(--red);font-family:var(--fd);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px; }
.ac-cancel-btn     { width:100%;padding:10px;background:var(--surf2);border:1px solid var(--border2);border-radius:11px;color:var(--text2);font-family:var(--fd);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px; }

/* ── HISTÓRICO ── */
.ac-hist-empty     { text-align:center;padding:36px 20px;color:var(--text3);font-size:14px; }
.ac-hist-card      { background:var(--surf);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:10px; }
.ac-hist-head      { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
.ac-hist-name      { font-family:var(--fd);font-size:15px;font-weight:700;color:var(--text); }
.ac-hist-date      { font-size:11.5px;color:var(--text3); }
.ac-hist-stats     { display:flex;gap:12px;flex-wrap:wrap; }
.ac-hist-stat      { display:flex;flex-direction:column;align-items:center;background:var(--bg2);border-radius:10px;padding:8px 14px; }
.ac-hist-stat-val  { font-family:var(--fd);font-size:18px;font-weight:800;color:var(--text); }
.ac-hist-stat-lbl  { font-size:10px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-top:2px; }
.ac-hist-exs       { margin-top:10px;display:flex;flex-direction:column;gap:4px; }
.ac-hist-ex-row    { display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2); }
.ac-hist-ex-row span { color:var(--text3);font-size:11px; }

/* ── EVOLUÇÃO ── */
.ac-evo-wrap       { display:flex;flex-direction:column;gap:14px; }
.ac-evo-card       { background:var(--surf);border:1px solid var(--border2);border-radius:14px;padding:14px 16px; }
.ac-evo-name       { font-family:var(--fd);font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px; }
.ac-evo-rows       { display:flex;flex-direction:column;gap:6px; }
.ac-evo-row        { display:flex;align-items:center;gap:10px; }
.ac-evo-date       { font-size:11px;color:var(--text3);width:80px;flex-shrink:0; }
.ac-evo-bar-wrap   { flex:1;height:22px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative; }
.ac-evo-bar        { height:100%;background:linear-gradient(90deg,rgba(240,81,111,.6),#f0516f);border-radius:6px;transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px; }
.ac-evo-bar-val    { font-family:var(--fd);font-size:11px;font-weight:700;color:#fff;white-space:nowrap; }
.ac-evo-empty      { font-size:12.5px;color:var(--text3);text-align:center;padding:10px 0; }

/* status pill */
.ac-status-pill    { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
.ac-status-pill.running { background:rgba(240,81,111,.15);color:#f0516f; }
.ac-status-pill.resting { background:var(--amber-bg);color:var(--amber); }
.ac-status-pill.done    { background:var(--green-bg);color:var(--green); }
`,

      /* ══════════════════════════════════════
         DEFAULT DATA
      ══════════════════════════════════════ */
      defaultData: () => ({
        fichas: [
          {
            id: 'f1', name: 'Treino A — Peito e Tríceps', icon: '💪',
            exercises: [
              { id: 'e1', name: 'Supino Reto', muscle: 'Peito', sets: [{ reps: 12, weight: 60 }, { reps: 10, weight: 65 }, { reps: 8, weight: 70 }], restSeconds: 90 },
              { id: 'e2', name: 'Crucifixo Inclinado', muscle: 'Peito', sets: [{ reps: 12, weight: 16 }, { reps: 12, weight: 16 }, { reps: 10, weight: 18 }], restSeconds: 60 },
              { id: 'e3', name: 'Tríceps Pulley', muscle: 'Tríceps', sets: [{ reps: 15, weight: 25 }, { reps: 12, weight: 30 }, { reps: 10, weight: 35 }], restSeconds: 60 },
              { id: 'e4', name: 'Mergulho', muscle: 'Tríceps', sets: [{ reps: 12, weight: 0 }, { reps: 10, weight: 0 }, { reps: 8, weight: 0 }], restSeconds: 60 },
            ]
          },
          {
            id: 'f2', name: 'Treino B — Costas e Bíceps', icon: '🦾',
            exercises: [
              { id: 'e5', name: 'Puxada Frontal', muscle: 'Costas', sets: [{ reps: 12, weight: 50 }, { reps: 10, weight: 55 }, { reps: 8, weight: 60 }], restSeconds: 90 },
              { id: 'e6', name: 'Remada Curvada', muscle: 'Costas', sets: [{ reps: 12, weight: 50 }, { reps: 10, weight: 55 }, { reps: 10, weight: 55 }], restSeconds: 90 },
              { id: 'e7', name: 'Rosca Direta', muscle: 'Bíceps', sets: [{ reps: 12, weight: 20 }, { reps: 10, weight: 22 }, { reps: 8, weight: 24 }], restSeconds: 60 },
            ]
          },
          {
            id: 'f3', name: 'Treino C — Pernas', icon: '🦵',
            exercises: [
              { id: 'e8', name: 'Agachamento', muscle: 'Quad/Glúteo', sets: [{ reps: 12, weight: 80 }, { reps: 10, weight: 90 }, { reps: 8, weight: 100 }], restSeconds: 120 },
              { id: 'e9', name: 'Leg Press', muscle: 'Quad', sets: [{ reps: 15, weight: 120 }, { reps: 12, weight: 140 }, { reps: 10, weight: 160 }], restSeconds: 90 },
              { id: 'e10', name: 'Cadeira Extensora', muscle: 'Quad', sets: [{ reps: 15, weight: 40 }, { reps: 12, weight: 45 }, { reps: 12, weight: 45 }], restSeconds: 60 },
              { id: 'e11', name: 'Mesa Flexora', muscle: 'Posterior', sets: [{ reps: 12, weight: 35 }, { reps: 10, weight: 40 }, { reps: 10, weight: 40 }], restSeconds: 60 },
              { id: 'e12', name: 'Panturrilha em Pé', muscle: 'Panturrilha', sets: [{ reps: 20, weight: 40 }, { reps: 18, weight: 45 }, { reps: 15, weight: 50 }], restSeconds: 45 },
            ]
          },
        ],
        history: [],
        activeWorkout: null,
      }),

      /* ══════════════════════════════════════
         CARD
      ══════════════════════════════════════ */
      cardPreview(rec) {
        const fichas = rec.data.fichas || [];
        const hist = rec.data.history || [];
        const last = hist[hist.length - 1];
        const parts = [fichas.length + ' ficha' + (fichas.length !== 1 ? 's' : '')];
        if (last) parts.push('Último: ' + new Date(last.date).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' }));
        return parts.join(' · ');
      },
      cardBadge(rec) {
        if (rec.data.activeWorkout) return '<span class="badge badge-a">🔥 Em andamento</span>';
        const hist = rec.data.history || [];
        if (hist.length) return '<span class="badge badge-g">' + hist.length + ' treino' + (hist.length !== 1 ? 's' : '') + '</span>';
        return '<span class="badge badge-p">Novo</span>';
      },

      navActions: [
        { id: 'hist', icon: '📋', title: 'Histórico', handler() { App.activePlugin._setTab('hist'); } },
        { id: 'evo', icon: '📈', title: 'Evolução', handler() { App.activePlugin._setTab('evo'); } },
      ],

      /* ══════════════════════════════════════
         ESTADO INTERNO
      ══════════════════════════════════════ */
      _el: null, _rec: null, _tab: 'treinos',
      _chronoInterval: null,   // intervalo do cronômetro de treino
      _restInterval: null,     // intervalo do descanso
      _restTotal: 0,           // segundos totais do descanso atual
      _restLeft: 0,            // segundos restantes
      _formFicha: null,        // ficha sendo editada/criada no form
      _wStart: 0,              // timestamp início do treino

      /* ══════════════════════════════════════
         MOUNT / UNMOUNT
      ══════════════════════════════════════ */
      mount(container, rec) {
        this._el = container;
        this._rec = rec;
        // retoma treino ativo se houver
        if (rec.data.activeWorkout) {
          this._tab = 'active';
          this._wStart = rec.data.activeWorkout.startedAt || Date.now();
          this._startChronoInterval();
        } else {
          this._tab = 'treinos';
        }
        this._render();
      },

      unmount() {
        this._stopChronoInterval();
        this._stopRestInterval();
        this._el = null; this._rec = null;
      },

      async _save() { await App.saveRecord(this._rec); },

      /* ══════════════════════════════════════
         RENDER PRINCIPAL
      ══════════════════════════════════════ */
      _render() {
        if (!this._el) return;
        const aw = this._rec.data.activeWorkout;
        document.getElementById('pluginNavSub').textContent =
          aw ? '🔥 Treino em andamento' :
            this._tab === 'treinos' ? 'Fichas de treino' :
              this._tab === 'hist' ? 'Histórico' : 'Evolução de carga';

        this._el.innerHTML =
          '<div class="ac-wrap">' +
          '<div class="ac-tabs">' +
          (aw ? '<button class="ac-tab ' + (this._tab === 'active' ? 'on' : '') + '" onclick="App.activePlugin._setTab(\'active\')">🔥 Ativo</button>' : '') +
          '<button class="ac-tab ' + (this._tab === 'treinos' ? 'on' : '') + '" onclick="App.activePlugin._setTab(\'treinos\')">📋 Fichas</button>' +
          '<button class="ac-tab ' + (this._tab === 'hist' ? 'on' : '') + '"    onclick="App.activePlugin._setTab(\'hist\')">🕐 Histórico</button>' +
          '<button class="ac-tab ' + (this._tab === 'evo' ? 'on' : '') + '"     onclick="App.activePlugin._setTab(\'evo\')">📈 Evolução</button>' +
          '</div>' +
          '<div id="ac_content"></div>' +
          '<div style="height:20px"></div>' +
          '</div>';

        if (this._tab === 'active') this._renderActive();
        else if (this._tab === 'treinos') this._renderFichas();
        else if (this._tab === 'hist') this._renderHistory();
        else this._renderEvo();
      },

      _setTab(t) { this._tab = t; this._render(); },

      /* ══════════════════════════════════════
         ABA: TREINO ATIVO
      ══════════════════════════════════════ */
      _renderActive() {
        const cont = document.getElementById('ac_content');
        const aw = this._rec.data.activeWorkout;
        if (!aw) { this._setTab('treinos'); return; }

        const elapsed = this._elapsedStr(aw.startedAt);
        const totalSets = aw.exercises.reduce((s, e) => s + e.sets.length, 0);
        const doneSets = aw.exercises.reduce((s, e) => s + e.sets.filter(st => st.done).length, 0);
        const pct = totalSets ? Math.round(doneSets / totalSets * 100) : 0;

        let html = '<div class="ac-workout-header">' +
          '<div class="ac-workout-name">' + esc(aw.name) + '</div>' +
          '<div class="ac-workout-meta">' +
          '<span class="ac-status-pill running">● Ativo</span>' +
          '<span class="ac-elapsed" id="ac_elapsed">' + elapsed + '</span>' +
          '<span>' + doneSets + '/' + totalSets + ' séries · ' + pct + '%</span>' +
          '</div>' +
          '</div>';

        // Barra de progresso
        html += '<div style="background:var(--border2);border-radius:4px;height:4px;margin-bottom:14px">' +
          '<div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,rgba(240,81,111,.7),#f0516f);border-radius:4px;transition:width .4s"></div>' +
          '</div>';

        // Descanso ativo
        if (this._restLeft > 0) {
          const pctRest = Math.round((1 - this._restLeft / this._restTotal) * 100);
          html += '<div class="ac-rest-bar-wrap">' +
            '<div class="ac-rest-title"><span>⏱ Descanso</span>' +
            '<button class="ac-rest-skip" onclick="App.activePlugin._skipRest()">Pular ›</button></div>' +
            '<div class="ac-rest-time" id="ac_rest_time">' + this._fmtSecs(this._restLeft) + '</div>' +
            '<div class="ac-rest-bar-bg"><div class="ac-rest-bar-fill" id="ac_rest_bar" style="width:' + pctRest + '%"></div></div>' +
            '<div class="ac-rest-presets">' +
            [30, 45, 60, 90, 120].map(s => '<button class="ac-rest-preset' + (this._restTotal === s ? ' on' : '') + '" onclick="App.activePlugin._setRest(' + s + ')">' + this._fmtSecs(s) + '</button>').join('') +
            '</div>' +
            '</div>';
        }

        // Exercícios
        aw.exercises.forEach((ex, ei) => {
          const allDone = ex.sets.every(s => s.done);
          const anyDone = ex.sets.some(s => s.done);
          const icoClass = allDone ? 'done' : anyDone ? 'prog' : 'idle';
          const icoEmoji = allDone ? '✓' : anyDone ? '◑' : '○';

          html += '<div class="ac-ex-card" id="ac_ex_' + ei + '">' +
            '<div class="ac-ex-head" onclick="App.activePlugin._toggleEx(' + ei + ')">' +
            '<div class="ac-ex-done-ico ' + icoClass + '">' + icoEmoji + '</div>' +
            '<div class="ac-ex-info">' +
            '<div class="ac-ex-name">' + esc(ex.name) + '</div>' +
            '<div class="ac-ex-meta">' + esc(ex.muscle || '') + ' · ' + ex.sets.length + ' séries · descanso ' + this._fmtSecs(ex.restSeconds || 60) + '</div>' +
            '</div>' +
            '<span class="ac-ex-chev">▾</span>' +
            '</div>' +
            '<div class="ac-ex-body">' +
            '<div class="ac-series-header"><span>Série</span><span>Reps</span><span>Kg</span><span>Ant.</span><span></span></div>';

          ex.sets.forEach((set, si) => {
            const prev = this._getPrev(ex.name, si);
            html += '<div class="ac-set-row">' +
              '<span class="ac-set-num">' + (si + 1) + '</span>' +
              '<input class="ac-set-input' + (set.done ? ' done' : '') + '" type="number" min="0" placeholder="reps" value="' + (set.reps || '') + '" ' +
              'oninput="App.activePlugin._setVal(' + ei + ',' + si + ',\'reps\',+this.value)">' +
              '<input class="ac-set-input' + (set.done ? ' done' : '') + '" type="number" min="0" step="0.5" placeholder="kg" value="' + (set.weight !== undefined && set.weight !== null ? set.weight : '') + '" ' +
              'oninput="App.activePlugin._setVal(' + ei + ',' + si + ',\'weight\',+this.value)">' +
              '<span style="font-size:11px;color:var(--text3);text-align:center">' + (prev || '—') + '</span>' +
              '<div class="ac-set-check' + (set.done ? ' on' : '') + '" onclick="App.activePlugin._toggleSet(' + ei + ',' + si + ')">' + (set.done ? '✓' : '') + '</div>' +
              '</div>';
          });

          html += '<button class="ac-add-set-btn" onclick="App.activePlugin._addSet(' + ei + ')">＋ Série</button>' +
            '<textarea class="ac-note-inp" rows="1" placeholder="Observação…" ' +
            'oninput="App.activePlugin._setNote(' + ei + ',this.value)">' + esc(ex.note || '') + '</textarea>' +
            '</div></div>';
        });

        html += '<button class="ac-finish-btn" onclick="App.activePlugin._finishWorkout()">🏁 Finalizar Treino</button>';

        cont.innerHTML = html;

        // Auto-abre primeiro exercício incompleto
        const firstIncomplete = aw.exercises.findIndex(e => !e.sets.every(s => s.done));
        if (firstIncomplete >= 0) this._toggleEx(firstIncomplete, true);
      },

      _toggleEx(idx, forceOpen) {
        const el = document.getElementById('ac_ex_' + idx);
        if (!el) return;
        if (forceOpen) el.classList.add('open');
        else el.classList.toggle('open');
      },

      /* ══════════════════════════════════════
         LÓGICA DO TREINO
      ══════════════════════════════════════ */
      _startWorkout(fichaId) {
        const ficha = this._rec.data.fichas.find(f => f.id === fichaId);
        if (!ficha) return;

        // Cria cópia dos exercícios com estado zerado
        const exercises = ficha.exercises.map(ex => ({
          id: ex.id,
          name: ex.name,
          muscle: ex.muscle,
          restSeconds: ex.restSeconds || 60,
          note: '',
          sets: ex.sets.map(s => ({
            reps: s.reps,
            weight: s.weight,
            done: false,
          })),
        }));

        this._rec.data.activeWorkout = {
          fichaId: fichaId,
          name: ficha.name,
          startedAt: Date.now(),
          exercises,
        };

        this._wStart = this._rec.data.activeWorkout.startedAt;
        this._save().then(() => {
          this._tab = 'active';
          this._startChronoInterval();
          this._render();
          toast('🔥 Treino iniciado!');
        });
      },

      async _toggleSet(ei, si) {
        const aw = this._rec.data.activeWorkout;
        const set = aw.exercises[ei].sets[si];
        set.done = !set.done;

        if (set.done) {
          // Inicia descanso
          const restSecs = aw.exercises[ei].restSeconds || 60;
          this._startRest(restSecs);
          // Beep
          this._beep(440, 80);
        }

        await this._save();
        this._renderActive();
        // Re-abre o exercício
        this._toggleEx(ei, true);
      },

      _setVal(ei, si, field, val) {
        const aw = this._rec.data.activeWorkout;
        if (aw && aw.exercises[ei] && aw.exercises[ei].sets[si]) {
          aw.exercises[ei].sets[si][field] = val;
        }
      },

      _setNote(ei, val) {
        const aw = this._rec.data.activeWorkout;
        if (aw && aw.exercises[ei]) aw.exercises[ei].note = val;
      },

      async _addSet(ei) {
        const aw = this._rec.data.activeWorkout;
        const ex = aw.exercises[ei];
        const last = ex.sets[ex.sets.length - 1] || { reps: 10, weight: 0 };
        ex.sets.push({ reps: last.reps, weight: last.weight, done: false });
        await this._save();
        this._renderActive();
        this._toggleEx(ei, true);
      },

      async _finishWorkout() {
        const aw = this._rec.data.activeWorkout;
        if (!aw) return;

        const duration = Math.round((Date.now() - aw.startedAt) / 1000);
        const totalSets = aw.exercises.reduce((s, e) => s + e.sets.filter(st => st.done).length, 0);
        const totalVol = aw.exercises.reduce((s, e) => s + e.sets.filter(st => st.done).reduce((a, st) => a + (st.weight || 0) * (st.reps || 0), 0), 0);

        const entry = {
          id: 'h' + Date.now(),
          fichaId: aw.fichaId,
          name: aw.name,
          date: Date.now(),
          duration,
          totalSets,
          totalVolume: totalVol,
          exercises: aw.exercises.map(ex => ({
            name: ex.name,
            muscle: ex.muscle,
            sets: ex.sets.filter(s => s.done).map(s => ({ reps: s.reps, weight: s.weight })),
            note: ex.note,
          })),
        };

        this._rec.data.history = this._rec.data.history || [];
        this._rec.data.history.push(entry);
        this._rec.data.activeWorkout = null;

        this._stopChronoInterval();
        this._stopRestInterval();
        this._restLeft = 0;

        await this._save();
        this._tab = 'hist';
        this._render();
        this._beep(523, 150);
        setTimeout(() => this._beep(659, 200), 180);
        toast('🏁 Treino finalizado! ' + totalSets + ' séries · ' + Math.round(duration / 60) + 'min');
      },

      /* ══════════════════════════════════════
         EVOLUÇÃO DE CARGA
      ══════════════════════════════════════ */
      _getPrev(exName, setIdx) {
        const hist = [...(this._rec.data.history || [])].reverse();
        for (const h of hist) {
          const ex = h.exercises.find(e => e.name === exName);
          if (ex && ex.sets[setIdx]) {
            const s = ex.sets[setIdx];
            return s.weight ? s.weight + 'kg×' + s.reps : s.reps + ' reps';
          }
        }
        return null;
      },

      /* ══════════════════════════════════════
         CRONÔMETRO
      ══════════════════════════════════════ */
      _elapsedStr(startedAt) {
        const s = Math.floor((Date.now() - startedAt) / 1000);
        const m = Math.floor(s / 60), sec = s % 60;
        return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
      },

      _startChronoInterval() {
        this._stopChronoInterval();
        this._chronoInterval = setInterval(() => {
          const el = document.getElementById('ac_elapsed');
          if (el && this._rec.data.activeWorkout) {
            el.textContent = this._elapsedStr(this._rec.data.activeWorkout.startedAt);
          }
        }, 1000);
      },

      _stopChronoInterval() {
        if (this._chronoInterval) { clearInterval(this._chronoInterval); this._chronoInterval = null; }
      },

      /* ══════════════════════════════════════
         TIMER DE DESCANSO
      ══════════════════════════════════════ */
      _startRest(seconds) {
        this._stopRestInterval();
        this._restTotal = seconds;
        this._restLeft = seconds;
        this._restInterval = setInterval(() => {
          this._restLeft--;
          if (this._restLeft <= 0) {
            this._restLeft = 0;
            this._stopRestInterval();
            this._beep(880, 300);
            setTimeout(() => this._beep(1100, 300), 350);
            toast('✅ Descanse terminado — próxima série!');
            this._renderActive();
            return;
          }
          // Atualiza só os elementos do descanso sem re-renderizar tudo
          const tEl = document.getElementById('ac_rest_time');
          const bEl = document.getElementById('ac_rest_bar');
          if (tEl) tEl.textContent = this._fmtSecs(this._restLeft);
          if (bEl) bEl.style.width = Math.round((1 - this._restLeft / this._restTotal) * 100) + '%';
        }, 1000);
      },

      _stopRestInterval() {
        if (this._restInterval) { clearInterval(this._restInterval); this._restInterval = null; }
      },

      _setRest(s) {
        this._startRest(s);
        const tEl = document.getElementById('ac_rest_time');
        const bEl = document.getElementById('ac_rest_bar');
        if (tEl) tEl.textContent = this._fmtSecs(s);
        if (bEl) bEl.style.width = '0%';
        // Rerender para atualizar presets
        this._renderActive();
      },

      _skipRest() {
        this._stopRestInterval();
        this._restLeft = 0;
        this._renderActive();
      },

      _fmtSecs(s) {
        const m = Math.floor(s / 60), sec = s % 60;
        return m > 0 ? m + 'm ' + (sec < 10 ? '0' : '') + sec + 's' : sec + 's';
      },

      /* ══════════════════════════════════════
         SOM (beep via AudioContext)
      ══════════════════════════════════════ */
      _beep(freq, dur) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = freq;
          o.type = 'sine';
          g.gain.setValueAtTime(0.3, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur / 1000);
          o.start(ctx.currentTime);
          o.stop(ctx.currentTime + dur / 1000);
        } catch (e) { }
      },

      /* ══════════════════════════════════════
         ABA: FICHAS
      ══════════════════════════════════════ */
      _renderFichas() {
        const cont = document.getElementById('ac_content');
        const fichas = this._rec.data.fichas || [];
        const aw = this._rec.data.activeWorkout;

        let html = '<div class="ac-fichas-wrap">';

        fichas.forEach((f, fi) => {
          const totalExs = f.exercises.length;
          const totalSets = f.exercises.reduce((s, e) => s + e.sets.length, 0);
          const isActive = aw && aw.fichaId === f.id;

          html += '<div class="ac-ficha-card" id="acf_' + fi + '">' +
            '<div class="ac-ficha-head" onclick="App.activePlugin._toggleFicha(' + fi + ')">' +
            '<div class="ac-ficha-ico">' + esc(f.icon || '💪') + '</div>' +
            '<div class="ac-ficha-info">' +
            '<div class="ac-ficha-name">' + esc(f.name) + '</div>' +
            '<div class="ac-ficha-meta">' + totalExs + ' exerc. · ' + totalSets + ' séries totais</div>' +
            '</div>' +
            (isActive ? '<span class="ac-status-pill running">Ativo</span>' : '') +
            '<span class="ac-ficha-chev">▾</span>' +
            '</div>' +
            '<div class="ac-ficha-body">' +
            '<div class="ac-ficha-ex-list">';

          f.exercises.forEach((ex, ei) => {
            html += '<div class="ac-ficha-ex-item">' +
              '<span class="ac-ficha-ex-num">' + (ei + 1) + '</span>' +
              '<span class="ac-ficha-ex-name">' + esc(ex.name) + '</span>' +
              '<span class="ac-ficha-ex-sets">' + ex.sets.length + '×' + ex.sets[0].reps + ' · ' + ex.sets[0].weight + 'kg</span>' +
              '</div>';
          });

          html += '</div>';

          if (!aw) {
            html += '<button class="ac-ficha-start-btn" onclick="App.activePlugin._startWorkout(\'' + f.id + '\')">▶ Iniciar Treino</button>';
          } else if (isActive) {
            html += '<button class="ac-ficha-start-btn" onclick="App.activePlugin._setTab(\'active\')" style="background:var(--amber)">🔥 Ver Treino Ativo</button>';
          }

          html += '<button class="ac-del-ficha-btn" onclick="App.activePlugin._deleteFicha(\'' + f.id + '\')">🗑 Excluir ficha</button>';
          html += '</div></div>';
        });

        // Botão + formulário de nova ficha
        if (this._formFicha !== null) {
          html += this._renderFichaForm();
        } else {
          html += '<button class="ac-add-set-btn" style="padding:14px;font-size:13px;border-radius:14px" onclick="App.activePlugin._openFichaForm()">＋ Nova ficha de treino</button>';
        }

        html += '</div>';
        cont.innerHTML = html;
      },

      _toggleFicha(idx) {
        document.getElementById('acf_' + idx)?.classList.toggle('open');
      },

      _openFichaForm() {
        this._formFicha = {
          id: 'f' + Date.now(),
          name: '',
          icon: '💪',
          exercises: [
            { id: 'ef' + Date.now(), name: '', muscle: '', restSeconds: 60, sets: [{ reps: 12, weight: 0 }] }
          ],
        };
        this._renderFichas();
      },

      _renderFichaForm() {
        const f = this._formFicha;
        if (!f) return '';
        let html = '<div class="ac-add-ficha-form">' +
          '<div class="ac-form-title">Nova Ficha de Treino</div>' +
          '<div class="ac-field"><label>Nome da ficha</label>' +
          '<input type="text" value="' + esc(f.name || '') + '" placeholder="Ex: Treino A — Peito" oninput="App.activePlugin._formFicha.name=this.value"></div>' +
          '<div class="ac-field"><label>Ícone (emoji)</label>' +
          '<input type="text" value="' + esc(f.icon || '💪') + '" placeholder="💪" style="width:70px" oninput="App.activePlugin._formFicha.icon=this.value"></div>';

        f.exercises.forEach((ex, ei) => {
          html += '<div class="ac-ex-form-row">' +
            '<div class="ac-ex-form-title"><span>Exercício ' + (ei + 1) + '</span>' +
            '<button class="ac-rm-btn" onclick="App.activePlugin._removeFormEx(' + ei + ')">✕ Remover</button></div>' +
            '<div class="ac-field"><label>Nome</label>' +
            '<input type="text" value="' + esc(ex.name || '') + '" placeholder="Ex: Supino Reto" oninput="App.activePlugin._formFicha.exercises[' + ei + '].name=this.value"></div>' +
            '<div class="ac-field"><label>Músculo</label>' +
            '<input type="text" value="' + esc(ex.muscle || '') + '" placeholder="Ex: Peito, Bíceps…" oninput="App.activePlugin._formFicha.exercises[' + ei + '].muscle=this.value"></div>' +
            '<div class="ac-ex-form-grid">' +
            '<div class="ac-field"><label>Séries</label>' +
            '<input type="number" min="1" max="20" value="' + (ex.sets.length || 3) + '" oninput="App.activePlugin._setFormSets(' + ei + ',+this.value)"></div>' +
            '<div class="ac-field"><label>Reps</label>' +
            '<input type="number" min="1" value="' + (ex.sets[0]?.reps || 12) + '" oninput="App.activePlugin._setFormReps(' + ei + ',+this.value)"></div>' +
            '<div class="ac-field"><label>Kg</label>' +
            '<input type="number" min="0" step="0.5" value="' + (ex.sets[0]?.weight || 0) + '" oninput="App.activePlugin._setFormWeight(' + ei + ',+this.value)"></div>' +
            '</div>' +
            '<div class="ac-field"><label>Descanso (seg)</label>' +
            '<select oninput="App.activePlugin._formFicha.exercises[' + ei + '].restSeconds=+this.value">' +
            [30, 45, 60, 90, 120, 180].map(s => '<option value="' + s + '" ' + (ex.restSeconds === s ? 'selected' : '') + '>' + this._fmtSecs(s) + '</option>').join('') +
            '</select></div>' +
            '</div>';
        });

        html +=
          '<button class="ac-add-ex-form-btn" onclick="App.activePlugin._addFormEx()">＋ Adicionar exercício</button>' +
          '<button class="ac-save-ficha-btn" onclick="App.activePlugin._saveFicha()">💾 Salvar ficha</button>' +
          '<button class="ac-cancel-btn" onclick="App.activePlugin._formFicha=null;App.activePlugin._renderFichas()">Cancelar</button>' +
          '</div>';

        return html;
      },

      _addFormEx() {
        if (!this._formFicha) return;
        this._formFicha.exercises.push({
          id: 'ef' + Date.now(), name: '', muscle: '', restSeconds: 60,
          sets: [{ reps: 12, weight: 0 }]
        });
        this._renderFichas();
      },

      _removeFormEx(idx) {
        if (!this._formFicha || this._formFicha.exercises.length <= 1) return;
        this._formFicha.exercises.splice(idx, 1);
        this._renderFichas();
      },

      _setFormSets(ei, n) {
        const ex = this._formFicha?.exercises[ei]; if (!ex) return;
        const prev = ex.sets[0] || { reps: 12, weight: 0 };
        ex.sets = Array.from({ length: Math.max(1, n) }, () => ({ reps: prev.reps, weight: prev.weight }));
      },

      _setFormReps(ei, n) {
        const ex = this._formFicha?.exercises[ei]; if (!ex) return;
        ex.sets.forEach(s => s.reps = n);
      },

      _setFormWeight(ei, n) {
        const ex = this._formFicha?.exercises[ei]; if (!ex) return;
        ex.sets.forEach(s => s.weight = n);
      },

      async _saveFicha() {
        const f = this._formFicha;
        if (!f || !f.name.trim()) { toast('Dê um nome à ficha'); return; }
        if (f.exercises.some(e => !e.name.trim())) { toast('Preencha o nome de todos os exercícios'); return; }
        this._rec.data.fichas = this._rec.data.fichas || [];
        this._rec.data.fichas.push(f);
        this._formFicha = null;
        await this._save();
        this._renderFichas();
        toast('💾 Ficha salva!');
      },

      async _deleteFicha(id) {
        this._rec.data.fichas = this._rec.data.fichas.filter(f => f.id !== id);
        await this._save();
        this._renderFichas();
        toast('Ficha removida');
      },

      /* ══════════════════════════════════════
         ABA: HISTÓRICO
      ══════════════════════════════════════ */
      _renderHistory() {
        const cont = document.getElementById('ac_content');
        const hist = [...(this._rec.data.history || [])].reverse();

        if (!hist.length) {
          cont.innerHTML = '<div class="ac-hist-empty"><span style="font-size:40px;display:block;margin-bottom:10px">📋</span>Nenhum treino registrado ainda.<br>Inicie uma ficha para começar.</div>';
          return;
        }

        let html = '';
        hist.forEach(h => {
          const date = new Date(h.date).toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
          const time = new Date(h.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          const dur = Math.round((h.duration || 0) / 60);
          const vol = (h.totalVolume || 0);

          html += '<div class="ac-hist-card">' +
            '<div class="ac-hist-head">' +
            '<div class="ac-hist-name">' + esc(h.name) + '</div>' +
            '<div class="ac-hist-date">' + date + ' ' + time + '</div>' +
            '</div>' +
            '<div class="ac-hist-stats">' +
            '<div class="ac-hist-stat"><span class="ac-hist-stat-val">' + dur + '</span><span class="ac-hist-stat-lbl">min</span></div>' +
            '<div class="ac-hist-stat"><span class="ac-hist-stat-val">' + (h.totalSets || 0) + '</span><span class="ac-hist-stat-lbl">séries</span></div>' +
            (vol > 0 ? '<div class="ac-hist-stat"><span class="ac-hist-stat-val">' + vol.toLocaleString('pt-BR') + '</span><span class="ac-hist-stat-lbl">kg vol.</span></div>' : '') +
            '</div>' +
            '<div class="ac-hist-exs">';

          (h.exercises || []).forEach(ex => {
            const bestSet = ex.sets.reduce((best, s) => (!best || s.weight > best.weight) ? s : best, null);
            html += '<div class="ac-hist-ex-row">' + esc(ex.name) +
              (bestSet ? '<span>' + ex.sets.length + '×' + bestSet.reps + ' reps' + (bestSet.weight ? ' @ ' + bestSet.weight + 'kg' : '') + '</span>' : '') + '</div>';
          });

          html += '</div></div>';
        });

        cont.innerHTML = html;
      },

      /* ══════════════════════════════════════
         ABA: EVOLUÇÃO
      ══════════════════════════════════════ */
      _renderEvo() {
        const cont = document.getElementById('ac_content');
        const hist = this._rec.data.history || [];

        if (!hist.length) {
          cont.innerHTML = '<div class="ac-hist-empty"><span style="font-size:40px;display:block;margin-bottom:10px">📈</span>Nenhum dado de evolução ainda.<br>Complete treinos para ver seu progresso.</div>';
          return;
        }

        // Monta mapa: exercício → array de { date, maxWeight, maxReps }
        const map = {};
        hist.forEach(h => {
          (h.exercises || []).forEach(ex => {
            if (!map[ex.name]) map[ex.name] = [];
            const best = ex.sets.reduce((b, s) => (!b || s.weight > b.weight || (!s.weight && s.reps > b.reps)) ? s : b, null);
            if (best) map[ex.name].push({
              date: h.date,
              weight: best.weight || 0,
              reps: best.reps || 0,
            });
          });
        });

        let html = '<div class="ac-evo-wrap">';

        Object.entries(map).forEach(([name, entries]) => {
          if (entries.length < 2) return; // mostra só quem tem 2+ registros
          const maxW = Math.max(...entries.map(e => e.weight || e.reps));
          html += '<div class="ac-evo-card">' +
            '<div class="ac-evo-name">' + esc(name) + '</div>' +
            '<div class="ac-evo-rows">';

          entries.slice(-6).forEach(e => {
            const val = e.weight || e.reps;
            const label = e.weight ? e.weight + 'kg' : e.reps + ' reps';
            const pct = maxW ? Math.round(val / maxW * 100) : 100;
            const date = new Date(e.date).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
            html += '<div class="ac-evo-row">' +
              '<span class="ac-evo-date">' + date + '</span>' +
              '<div class="ac-evo-bar-wrap"><div class="ac-evo-bar" style="width:' + pct + '%"><span class="ac-evo-bar-val">' + label + '</span></div></div>' +
              '</div>';
          });

          html += '</div></div>';
        });

        if (html === '<div class="ac-evo-wrap">') {
          html += '<div class="ac-hist-empty">Complete pelo menos 2 treinos com os mesmos exercícios para ver a evolução.</div>';
        }

        html += '</div>';
        cont.innerHTML = html;
      },
    });
  </script>

  <!-- pluguin lista poderosa -->
  <script>
    registerPlugin({
      id: 'lista',
      name: 'Lista',
      icon: '✅',
      color: '#3ecf7a',

      css: `
/* ═══════════════════════════════════════
   PLUGIN LISTA AVANÇADA
═══════════════════════════════════════ */
.ls-wrap          { padding:14px 16px 0; }
.ls-tabs          { display:flex;gap:6px;margin-bottom:14px; }
.ls-tab           { flex:1;padding:9px 0;border-radius:11px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-family:var(--fd);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center; }
.ls-tab.on        { background:#3ecf7a;border-color:#3ecf7a;color:#fff;box-shadow:0 4px 14px rgba(62,207,122,.35); }

/* barra de progresso */
.ls-progress-wrap { background:var(--surf);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:14px; }
.ls-progress-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
.ls-progress-lbl  { font-size:12px;color:var(--text2); }
.ls-progress-pct  { font-family:var(--fd);font-size:18px;font-weight:800;color:#3ecf7a; }
.ls-progress-bar  { width:100%;height:7px;background:var(--border2);border-radius:4px;overflow:hidden; }
.ls-progress-fill { height:100%;background:linear-gradient(90deg,#3ecf7a,#22d3ee);border-radius:4px;transition:width .4s ease; }
.ls-progress-sub  { font-size:11px;color:var(--text3);margin-top:6px; }

/* filtros rápidos */
.ls-filters       { display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px; }
.ls-filters::-webkit-scrollbar { display:none; }
.ls-filter-btn    { flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .13s; }
.ls-filter-btn.on { background:#3ecf7a;border-color:#3ecf7a;color:#fff; }

/* add item */
.ls-add-row       { display:flex;gap:8px;align-items:center;margin-bottom:14px; }
.ls-add-inp       { flex:1;background:var(--surf);border:1.5px solid var(--border2);border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .15s; }
.ls-add-inp:focus { border-color:#3ecf7a;box-shadow:0 0 0 3px rgba(62,207,122,.15); }
.ls-add-btn       { width:44px;height:44px;border-radius:12px;background:#3ecf7a;border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .13s; }
.ls-add-btn:active { transform:scale(.9); }

/* grupos / categorias */
.ls-group         { margin-bottom:16px; }
.ls-group-head    { display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer; }
.ls-group-label   { font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3); }
.ls-group-count   { background:var(--surf2);color:var(--text3);border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700; }
.ls-group-chev    { font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s; }
.ls-group.collapsed .ls-group-chev { transform:rotate(-90deg); }
.ls-group.collapsed .ls-group-items { display:none; }
.ls-group-items   { display:flex;flex-direction:column;gap:6px; }

/* item */
.ls-item          { background:var(--surf);border:1px solid var(--border2);border-radius:13px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;transition:all .15s;position:relative;cursor:pointer; }
.ls-item:active   { transform:scale(.99); }
.ls-item.done     { opacity:.5; }
.ls-item.done .ls-item-text { text-decoration:line-through;color:var(--text3); }
.ls-item.overdue  { border-color:rgba(240,95,95,.4);background:rgba(240,95,95,.05); }
.ls-item.today    { border-color:rgba(245,187,69,.4);background:rgba(245,187,69,.04); }

/* prioridade */
.ls-prio          { width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;margin:-1px 0; }
.ls-prio.alta     { background:#f05f5f; }
.ls-prio.media    { background:var(--amber); }
.ls-prio.baixa    { background:#3ecf7a; }
.ls-prio.none     { background:transparent; }

/* checkbox */
.ls-check         { width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;cursor:pointer; }
.ls-check.on      { background:#3ecf7a;border-color:#3ecf7a;color:#fff;font-size:13px; }

/* conteúdo */
.ls-item-content  { flex:1;min-width:0; }
.ls-item-text     { font-size:14px;color:var(--text);line-height:1.45;word-break:break-word; }
.ls-item-meta     { display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap; }
.ls-item-tag      { display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600; }
.ls-item-due      { font-size:11px;display:flex;align-items:center;gap:3px; }
.ls-item-due.ok     { color:var(--text3); }
.ls-item-due.today  { color:var(--amber); }
.ls-item-due.overdue{ color:var(--red); }
.ls-item-note-ico { font-size:11px;color:var(--text3); }
.ls-item-sub-count{ font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px; }

/* subtarefas mini */
.ls-sub-mini      { margin-top:6px;display:flex;flex-direction:column;gap:3px; }
.ls-sub-mini-row  { display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2); }
.ls-sub-mini-check{ width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:9px;transition:all .13s; }
.ls-sub-mini-check.on { background:#3ecf7a;border-color:#3ecf7a;color:#fff; }
.ls-sub-mini-text.done { text-decoration:line-through;color:var(--text3); }

/* ações rápidas */
.ls-item-actions  { display:flex;flex-direction:column;gap:4px;flex-shrink:0; }
.ls-item-act-btn  { width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .13s; }
.ls-item-act-btn:hover { background:var(--surf2);color:var(--text); }

/* ── PAINEL DETALHES / EDIÇÃO ── */
.ls-detail-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:5000;display:flex;align-items:flex-end; }
.ls-detail-sheet  { width:100%;max-width:520px;margin:0 auto;background:var(--bg1);border-radius:24px 24px 0 0;border:1px solid var(--border2);border-bottom:none;padding:0 0 env(safe-area-inset-bottom,20px);max-height:92dvh;overflow-y:auto;animation:slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.ls-detail-handle { width:34px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px; }
.ls-detail-head   { display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px; }
.ls-detail-title  { font-family:var(--fd);font-size:17px;font-weight:700;color:var(--text); }
.ls-detail-close  { width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer; }
.ls-detail-body   { padding:0 18px 16px; }
.ls-dfield        { margin-bottom:12px; }
.ls-dfield label  { display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px; }
.ls-dfield input,.ls-dfield textarea,.ls-dfield select {
  width:100%;background:var(--surf);border:1px solid var(--border2);border-radius:10px;
  padding:9px 12px;color:var(--text);font-family:var(--fb);font-size:13.5px;outline:none;
  transition:border-color .13s;resize:none;
}
.ls-dfield input:focus,.ls-dfield textarea:focus,.ls-dfield select:focus { border-color:#3ecf7a; }
.ls-prio-row      { display:flex;gap:6px; }
.ls-prio-btn      { flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .13s; }
.ls-prio-btn.alta.on  { background:rgba(240,95,95,.15);border-color:var(--red);color:var(--red); }
.ls-prio-btn.media.on { background:var(--amber-bg);border-color:var(--amber);color:var(--amber); }
.ls-prio-btn.baixa.on { background:var(--green-bg);border-color:var(--green);color:var(--green); }
.ls-prio-btn.none.on  { background:var(--surf);border-color:var(--border2);color:var(--text2); }

/* tags */
.ls-tags-row      { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px; }
.ls-tag-chip      { display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .13s; }
.ls-tag-chip.on   { border-color:currentColor;opacity:1; }
.ls-tag-chip:not(.on) { opacity:.45; }
.ls-tag-add-inp   { background:var(--surf);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;color:var(--text);font-family:var(--fb);font-size:12px;outline:none;width:100px;transition:border-color .13s; }
.ls-tag-add-inp:focus { border-color:#3ecf7a; }

/* subtarefas no detalhe */
.ls-sub-list      { display:flex;flex-direction:column;gap:5px;margin-bottom:8px; }
.ls-sub-row       { display:flex;align-items:center;gap:8px;background:var(--surf);border-radius:9px;padding:8px 10px; }
.ls-sub-check2    { width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:10px;transition:all .13s; }
.ls-sub-check2.on { background:#3ecf7a;border-color:#3ecf7a;color:#fff; }
.ls-sub-inp       { flex:1;background:transparent;border:none;color:var(--text);font-family:var(--fb);font-size:13px;outline:none; }
.ls-sub-del       { width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.ls-sub-del:hover { background:var(--red-bg);color:var(--red); }
.ls-add-sub-btn   { display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:9px;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:all .13s; }
.ls-add-sub-btn:hover { border-color:#3ecf7a;color:#3ecf7a; }

/* botões de ação do detalhe */
.ls-detail-btns   { display:flex;gap:8px;margin-top:14px; }
.ls-dsave-btn     { flex:1;padding:12px;background:#3ecf7a;border:none;border-radius:11px;color:#fff;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer; }
.ls-ddel-btn      { width:44px;height:44px;border-radius:11px;border:none;background:var(--red-bg);color:var(--red);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }

/* ── MODO FOCO ── */
.ls-focus-wrap    { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:20px; }
.ls-focus-pct     { font-family:var(--fd);font-size:13px;font-weight:700;color:#3ecf7a;margin-bottom:20px;letter-spacing:1px; }
.ls-focus-card    { background:var(--surf);border:2px solid rgba(62,207,122,.3);border-radius:20px;padding:28px 24px;text-align:center;width:100%;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,.4); }
.ls-focus-tag     { display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;margin-bottom:12px; }
.ls-focus-text    { font-family:var(--fd);font-size:22px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:14px; }
.ls-focus-note    { font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:16px; }
.ls-focus-due     { font-size:12px;color:var(--text3);margin-bottom:20px; }
.ls-focus-done-btn{ width:64px;height:64px;border-radius:20px;background:#3ecf7a;border:none;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 16px;box-shadow:0 6px 20px rgba(62,207,122,.4);transition:transform .13s; }
.ls-focus-done-btn:active { transform:scale(.9); }
.ls-focus-skip    { background:transparent;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:8px; }
.ls-focus-nav     { display:flex;gap:8px;justify-content:center;margin-top:16px; }
.ls-focus-nav-btn { padding:8px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer; }
.ls-focus-empty   { text-align:center;color:var(--text3);font-size:15px;padding:40px 20px; }

/* ── ESTATÍSTICAS ── */
.ls-stats-grid    { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px; }
.ls-stat-card     { background:var(--surf);border:1px solid var(--border2);border-radius:14px;padding:14px 16px; }
.ls-stat-val      { font-family:var(--fd);font-size:28px;font-weight:800;color:var(--text); }
.ls-stat-lbl      { font-size:11px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-top:2px; }
.ls-stat-sub      { font-size:12px;color:#3ecf7a;margin-top:4px;font-weight:600; }
.ls-prio-stat-row { display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border); }
.ls-prio-stat-row:last-child { border:none; }
.ls-prio-dot      { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
.ls-prio-stat-lbl { flex:1;font-size:13px;color:var(--text2); }
.ls-prio-stat-val { font-family:var(--fd);font-size:14px;font-weight:700;color:var(--text); }

/* drag handle */
.ls-drag-handle   { font-size:14px;color:var(--text3);cursor:grab;padding:0 2px;touch-action:none;user-select:none; }
.ls-drag-handle:active { cursor:grabbing; }
.ls-item.dragging { opacity:.4;border-style:dashed; }
.ls-item.drag-over { border-color:#3ecf7a;background:rgba(62,207,122,.06); }
`,

      defaultData: () => ({
        items: [
          {
            id: 'i1', text: 'Bem-vindo ao Plugin de Lista!', done: false,
            priority: 'baixa', category: 'Geral', tags: ['hub'],
            note: 'Toque em qualquer item para editar. Use o + para adicionar novos.',
            subtasks: [], createdAt: Date.now(), dueDate: null,
          },
          {
            id: 'i2', text: 'Explorar o modo Foco', done: false,
            priority: 'media', category: 'Geral', tags: ['hub'],
            note: 'O modo Foco mostra um item por vez para máxima concentração.',
            subtasks: [
              { id: 's1', text: 'Abrir a aba Foco', done: false },
              { id: 's2', text: 'Marcar como feito', done: false },
            ], createdAt: Date.now() - 3600000, dueDate: null,
          },
        ],
        categories: ['Geral', 'Trabalho', 'Pessoal', 'Compras'],
        tags: [
          { id: 't1', label: 'hub', color: '#6e5cf5' },
          { id: 't2', label: 'urgente', color: '#f05f5f' },
          { id: 't3', label: 'ideia', color: '#f5bb45' },
          { id: 't4', label: 'pessoal', color: '#3ecf7a' },
        ],
      }),

      cardPreview(rec) {
        const items = rec.data.items || [];
        const total = items.length;
        const done = items.filter(i => i.done).length;
        const overdue = items.filter(i => !i.done && i.dueDate && i.dueDate < Date.now()).length;
        const parts = [done + '/' + total + ' concluído' + (done !== 1 ? 's' : '')];
        if (overdue) parts.push(overdue + ' atrasado' + (overdue !== 1 ? 's' : ''));
        return parts.join(' · ');
      },

      cardBadge(rec) {
        const items = rec.data.items || [];
        const total = items.length;
        const done = items.filter(i => i.done).length;
        const overdue = items.filter(i => !i.done && i.dueDate && i.dueDate < Date.now()).length;
        if (overdue) return '<span class="badge badge-a">⚠ ' + overdue + ' atrasado' + (overdue !== 1 ? 's' : '') + '</span>';
        if (total === 0) return '<span class="badge badge-p">Vazia</span>';
        if (done === total) return '<span class="badge badge-g">✓ Tudo feito!</span>';
        const pct = Math.round(done / total * 100);
        return '<span class="badge badge-p">' + pct + '%</span>';
      },

      navActions: [
        { id: 'foco', icon: '🎯', title: 'Modo Foco', handler() { App.activePlugin._setTab('foco'); } },
        { id: 'stat', icon: '📊', title: 'Estatísticas', handler() { App.activePlugin._setTab('stat'); } },
      ],

      /* estado */
      _el: null, _rec: null, _tab: 'lista',
      _filter: 'todas', _groupBy: 'categoria',
      _detail: null,     /* item sendo editado */
      _focusIdx: 0,
      _dragSrc: null,

      mount(container, rec) {
        this._el = container;
        this._rec = rec;
        this._tab = 'lista';
        this._render();
      },
      unmount() { this._closeDetail(); this._el = null; this._rec = null; },
      async _save() { await App.saveRecord(this._rec); },

      /* ══════════════════════════════════════
         RENDER PRINCIPAL
      ══════════════════════════════════════ */
      _render() {
        if (!this._el) return;
        const items = this._rec.data.items || [];
        const total = items.length;
        const done = items.filter(i => i.done).length;
        const pct = total ? Math.round(done / total * 100) : 0;
        const overdue = items.filter(i => !i.done && i.dueDate && i.dueDate < Date.now()).length;

        document.getElementById('pluginNavSub').textContent =
          this._tab === 'foco' ? 'Modo Foco' :
            this._tab === 'stat' ? 'Estatísticas' :
              done + '/' + total + ' · ' + pct + '%';

        this._el.innerHTML =
          '<div class="ls-wrap">' +
          '<div class="ls-tabs">' +
          '<button class="ls-tab ' + (this._tab === 'lista' ? 'on' : '') + '" onclick="App.activePlugin._setTab(\'lista\')">📋 Lista</button>' +
          '<button class="ls-tab ' + (this._tab === 'foco' ? 'on' : '') + '"  onclick="App.activePlugin._setTab(\'foco\')">🎯 Foco</button>' +
          '<button class="ls-tab ' + (this._tab === 'stat' ? 'on' : '') + '"  onclick="App.activePlugin._setTab(\'stat\')">📊 Stats</button>' +
          '</div>' +
          '<div id="ls_content"></div>' +
          '<div style="height:20px"></div>' +
          '</div>';

        if (this._tab === 'lista') this._renderLista();
        else if (this._tab === 'foco') this._renderFoco();
        else this._renderStats();
      },

      _setTab(t) { this._tab = t; this._render(); },

      /* ══════════════════════════════════════
         ABA: LISTA
      ══════════════════════════════════════ */
      _renderLista() {
        const cont = document.getElementById('ls_content');
        const items = this._rec.data.items || [];
        const total = items.length;
        const done = items.filter(i => i.done).length;
        const pct = total ? Math.round(done / total * 100) : 0;

        /* barra de progresso */
        let html =
          '<div class="ls-progress-wrap">' +
          '<div class="ls-progress-head">' +
          '<span class="ls-progress-lbl">Progresso geral</span>' +
          '<span class="ls-progress-pct">' + pct + '%</span>' +
          '</div>' +
          '<div class="ls-progress-bar"><div class="ls-progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="ls-progress-sub">' + done + ' de ' + total + ' item' + (total !== 1 ? 's' : '') + ' concluído' + (done !== 1 ? 's' : '') + '</div>' +
          '</div>';

        /* filtros */
        const filters = [
          { id: 'todas', label: 'Todas' },
          { id: 'pendente', label: 'Pendentes' },
          { id: 'hoje', label: 'Hoje' },
          { id: 'atrasado', label: 'Atrasadas' },
          { id: 'alta', label: '🔴 Alta' },
          { id: 'feito', label: '✓ Feitas' },
        ];
        html += '<div class="ls-filters">' +
          filters.map(f => '<button class="ls-filter-btn ' + (this._filter === f.id ? 'on' : '') + '" onclick="App.activePlugin._filter=\'' + f.id + '\';App.activePlugin._renderLista()">' + f.label + '</button>').join('') +
          '</div>';

        /* add item */
        html +=
          '<div class="ls-add-row">' +
          '<input class="ls-add-inp" id="ls_add_inp" type="text" placeholder="Adicionar item…" ' +
          'onkeydown="if(event.key===\'Enter\')App.activePlugin._addItem()">' +
          '<button class="ls-add-btn" onclick="App.activePlugin._addItem()">+</button>' +
          '</div>';

        /* agrupar e filtrar */
        let visible = this._applyFilter(items);

        if (!visible.length) {
          html += '<div style="text-align:center;padding:32px 20px;color:var(--text3);font-size:14px">' +
            (this._filter === 'todas' ? '✨ Nenhum item ainda. Adicione algo!' : 'Nenhum item nesta categoria.') +
            '</div>';
          cont.innerHTML = html;
          return;
        }

        /* agrupar por categoria */
        const groups = {};
        visible.forEach(item => {
          const g = item.category || 'Sem categoria';
          if (!groups[g]) groups[g] = [];
          groups[g].push(item);
        });

        Object.entries(groups).forEach(([grpName, grpItems]) => {
          const allDone = grpItems.every(i => i.done);
          html +=
            '<div class="ls-group" id="ls_grp_' + this._slugify(grpName) + '">' +
            '<div class="ls-group-head" onclick="App.activePlugin._toggleGroup(\'' + this._slugify(grpName) + '\')">' +
            '<span class="ls-group-label">' + esc(grpName) + '</span>' +
            '<span class="ls-group-count">' + grpItems.filter(i => !i.done).length + ' pendente' + (grpItems.filter(i => !i.done).length !== 1 ? 's' : '') + '</span>' +
            (allDone ? '<span style="font-size:11px;color:var(--green);margin-left:4px">✓ tudo feito</span>' : '') +
            '<span class="ls-group-chev">▾</span>' +
            '</div>' +
            '<div class="ls-group-items">' +
            grpItems.map(item => this._itemHtml(item)).join('') +
            '</div>' +
            '</div>';
        });

        cont.innerHTML = html;

        /* ativa drag-and-drop */
        this._initDrag();
      },

      _applyFilter(items) {
        const now = Date.now();
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const todayEnd = new Date(today); todayEnd.setHours(23, 59, 59, 999);
        switch (this._filter) {
          case 'pendente': return items.filter(i => !i.done);
          case 'feito': return items.filter(i => i.done);
          case 'alta': return items.filter(i => i.priority === 'alta' && !i.done);
          case 'hoje': return items.filter(i => !i.done && i.dueDate && i.dueDate >= today.getTime() && i.dueDate <= todayEnd.getTime());
          case 'atrasado': return items.filter(i => !i.done && i.dueDate && i.dueDate < today.getTime());
          default: return items;
        }
      },

      _itemHtml(item) {
        const tags = this._rec.data.tags || [];
        const due = item.dueDate ? this._dueTxt(item.dueDate) : null;
        const dueClass = item.dueDate ? (item.dueDate < Date.now() && !item.done ? 'overdue' : this._isToday(item.dueDate) ? 'today' : '') : '';
        const subDone = (item.subtasks || []).filter(s => s.done).length;
        const subTotal = (item.subtasks || []).length;

        let itemClass = 'ls-item';
        if (item.done) itemClass += ' done';
        if (!item.done && item.dueDate && item.dueDate < Date.now()) itemClass += ' overdue';
        else if (!item.done && item.dueDate && this._isToday(item.dueDate)) itemClass += ' today';

        let html =
          '<div class="' + itemClass + '" id="ls_item_' + item.id + '" draggable="true" ' +
          'ondragstart="App.activePlugin._onDragStart(event,\'' + item.id + '\')" ' +
          'ondragover="App.activePlugin._onDragOver(event,\'' + item.id + '\')" ' +
          'ondrop="App.activePlugin._onDrop(event,\'' + item.id + '\')" ' +
          'ondragend="App.activePlugin._onDragEnd()">' +
          '<span class="ls-drag-handle" title="Arrastar">⠿</span>' +
          '<div class="ls-prio ' + (item.priority || 'none') + '"></div>' +
          '<div class="ls-check ' + (item.done ? 'on' : '') + '" onclick="event.stopPropagation();App.activePlugin._toggleDone(\'' + item.id + '\')">' + (item.done ? '✓' : '') + '</div>' +
          '<div class="ls-item-content" onclick="App.activePlugin._openDetail(\'' + item.id + '\')">' +
          '<div class="ls-item-text">' + esc(item.text) + '</div>';

        /* meta row */
        const metaParts = [];
        if (item.tags && item.tags.length) {
          item.tags.forEach(tid => {
            const tag = tags.find(t => t.id === tid || t.label === tid);
            if (tag) metaParts.push('<span class="ls-item-tag" style="background:' + tag.color + '22;color:' + tag.color + '">' + esc(tag.label) + '</span>');
          });
        }
        if (due) metaParts.push('<span class="ls-item-due ' + dueClass + '">📅 ' + esc(due) + '</span>');
        if (item.note) metaParts.push('<span class="ls-item-note-ico">📝</span>');
        if (subTotal) metaParts.push('<span class="ls-item-sub-count">☑ ' + subDone + '/' + subTotal + '</span>');
        if (metaParts.length) html += '<div class="ls-item-meta">' + metaParts.join('') + '</div>';

        /* subtarefas mini */
        if (subTotal && !item.done) {
          html += '<div class="ls-sub-mini">';
          (item.subtasks || []).slice(0, 3).forEach(s => {
            html += '<div class="ls-sub-mini-row">' +
              '<div class="ls-sub-mini-check ' + (s.done ? 'on' : '') + '" onclick="event.stopPropagation();App.activePlugin._toggleSub(\'' + item.id + '\',\'' + s.id + '\')">' + (s.done ? '✓' : '') + '</div>' +
              '<span class="ls-sub-mini-text' + (s.done ? ' done' : '') + '">' + esc(s.text) + '</span>' +
              '</div>';
          });
          if (subTotal > 3) html += '<div style="font-size:11px;color:var(--text3);margin-top:2px">+' + (subTotal - 3) + ' mais…</div>';
          html += '</div>';
        }

        html += '</div>'; /* fecha content */

        /* botão deletar */
        html +=
          '<div class="ls-item-actions">' +
          '<button class="ls-item-act-btn" onclick="event.stopPropagation();App.activePlugin._deleteItem(\'' + item.id + '\')" title="Deletar">🗑</button>' +
          '</div>';

        html += '</div>';
        return html;
      },

      _toggleGroup(slug) {
        document.getElementById('ls_grp_' + slug)?.classList.toggle('collapsed');
      },

      /* ══════════════════════════════════════
         LÓGICA DE ITENS
      ══════════════════════════════════════ */
      async _addItem() {
        const inp = document.getElementById('ls_add_inp');
        if (!inp) return;
        const text = inp.value.trim();
        if (!text) return;
        const item = {
          id: 'i' + Date.now(),
          text,
          done: false,
          priority: 'none',
          category: 'Geral',
          tags: [],
          note: '',
          subtasks: [],
          createdAt: Date.now(),
          dueDate: null,
        };
        this._rec.data.items.unshift(item);
        inp.value = '';
        await this._save();
        this._renderLista();
        toast('✅ Item adicionado');
      },

      async _toggleDone(id) {
        const item = this._rec.data.items.find(i => i.id === id);
        if (!item) return;
        item.done = !item.done;
        if (item.done) item.doneAt = Date.now();
        await this._save();
        this._renderLista();
        if (item.done) { this._beep(523, 80); setTimeout(() => this._beep(659, 120), 100); }
      },

      async _toggleSub(itemId, subId) {
        const item = this._rec.data.items.find(i => i.id === itemId);
        if (!item) return;
        const sub = (item.subtasks || []).find(s => s.id === subId);
        if (!sub) return;
        sub.done = !sub.done;
        await this._save();
        this._renderLista();
      },

      async _deleteItem(id) {
        this._rec.data.items = this._rec.data.items.filter(i => i.id !== id);
        await this._save();
        this._renderLista();
        toast('🗑 Removido');
      },

      /* ══════════════════════════════════════
         PAINEL DE DETALHES / EDIÇÃO
      ══════════════════════════════════════ */
      _openDetail(id) {
        const item = this._rec.data.items.find(i => i.id === id);
        if (!item) return;
        /* cópia profunda para edição */
        this._detail = JSON.parse(JSON.stringify(item));
        this._renderDetail();
      },

      _renderDetail() {
        document.getElementById('ls_detail_overlay')?.remove();
        const d = this._detail;
        if (!d) return;
        const tags = this._rec.data.tags || [];
        const cats = this._rec.data.categories || [];

        const overlay = document.createElement('div');
        overlay.className = 'ls-detail-overlay';
        overlay.id = 'ls_detail_overlay';
        overlay.onclick = e => { if (e.target === overlay) this._closeDetail(); };

        const prioOpts = [
          { id: 'alta', label: '🔴 Alta' },
          { id: 'media', label: '🟡 Média' },
          { id: 'baixa', label: '🟢 Baixa' },
          { id: 'none', label: '⊘ Nenhuma' },
        ];

        const dueFmt = d.dueDate ? new Date(d.dueDate).toISOString().slice(0, 16) : '';

        let subHtml = '<div class="ls-sub-list">';
        (d.subtasks || []).forEach((s, si) => {
          subHtml +=
            '<div class="ls-sub-row">' +
            '<div class="ls-sub-check2 ' + (s.done ? 'on' : '') + '" onclick="App.activePlugin._detailToggleSub(' + si + ')">' + (s.done ? '✓' : '') + '</div>' +
            '<input class="ls-sub-inp" value="' + esc(s.text) + '" placeholder="Subtarefa…" oninput="App.activePlugin._detail.subtasks[' + si + '].text=this.value">' +
            '<button class="ls-sub-del" onclick="App.activePlugin._detailRemoveSub(' + si + ')">✕</button>' +
            '</div>';
        });
        subHtml += '</div>';
        subHtml += '<button class="ls-add-sub-btn" onclick="App.activePlugin._detailAddSub()">＋ Subtarefa</button>';

        let tagsHtml = '<div class="ls-tags-row">' +
          tags.map(t => '<span class="ls-tag-chip ' + ((d.tags || []).includes(t.id) || (d.tags || []).includes(t.label) ? 'on' : '') + '" style="color:' + t.color + ';background:' + t.color + '22" onclick="App.activePlugin._detailToggleTag(\'' + t.id + '\')">' + esc(t.label) + '</span>').join('') +
          '</div>';

        overlay.innerHTML =
          '<div class="ls-detail-sheet">' +
          '<div class="ls-detail-handle"></div>' +
          '<div class="ls-detail-head">' +
          '<span class="ls-detail-title">Editar item</span>' +
          '<button class="ls-detail-close" onclick="App.activePlugin._closeDetail()">✕</button>' +
          '</div>' +
          '<div class="ls-detail-body">' +

          '<div class="ls-dfield"><label>Texto</label>' +
          '<textarea rows="2" oninput="App.activePlugin._detail.text=this.value">' + esc(d.text) + '</textarea></div>' +

          '<div class="ls-dfield"><label>Prioridade</label>' +
          '<div class="ls-prio-row">' +
          prioOpts.map(p => '<button class="ls-prio-btn ' + p.id + ' ' + (d.priority === p.id ? 'on' : '') + '" onclick="App.activePlugin._detailSetPrio(\'' + p.id + '\')">' + p.label + '</button>').join('') +
          '</div></div>' +

          '<div class="ls-dfield"><label>Categoria</label>' +
          '<select oninput="App.activePlugin._detail.category=this.value">' +
          cats.map(c => '<option value="' + esc(c) + '" ' + (d.category === c ? 'selected' : '') + '>' + esc(c) + '</option>').join('') +
          '<option value="">+ Nova categoria</option>' +
          '</select></div>' +

          '<div class="ls-dfield"><label>Data de vencimento</label>' +
          '<input type="datetime-local" value="' + dueFmt + '" oninput="App.activePlugin._detail.dueDate=this.value?new Date(this.value).getTime():null"></div>' +

          '<div class="ls-dfield"><label>Etiquetas</label>' + tagsHtml + '</div>' +

          '<div class="ls-dfield"><label>Nota / Descrição</label>' +
          '<textarea rows="3" placeholder="Adicione detalhes…" oninput="App.activePlugin._detail.note=this.value">' + esc(d.note || '') + '</textarea></div>' +

          '<div class="ls-dfield"><label>Subtarefas</label>' + subHtml + '</div>' +

          '<div class="ls-detail-btns">' +
          '<button class="ls-dsave-btn" onclick="App.activePlugin._saveDetail()">💾 Salvar</button>' +
          '<button class="ls-ddel-btn" onclick="App.activePlugin._deleteFromDetail()">🗑</button>' +
          '</div>' +
          '</div>' +
          '</div>';

        document.body.appendChild(overlay);
      },

      _closeDetail() {
        document.getElementById('ls_detail_overlay')?.remove();
        this._detail = null;
      },

      _detailSetPrio(p) {
        if (!this._detail) return;
        this._detail.priority = p;
        this._renderDetail();
      },

      _detailToggleTag(tid) {
        if (!this._detail) return;
        if (!this._detail.tags) this._detail.tags = [];
        const idx = this._detail.tags.indexOf(tid);
        if (idx >= 0) this._detail.tags.splice(idx, 1);
        else this._detail.tags.push(tid);
        this._renderDetail();
      },

      _detailAddSub() {
        if (!this._detail) return;
        if (!this._detail.subtasks) this._detail.subtasks = [];
        this._detail.subtasks.push({ id: 's' + Date.now(), text: '', done: false });
        this._renderDetail();
      },

      _detailRemoveSub(idx) {
        if (!this._detail) return;
        this._detail.subtasks.splice(idx, 1);
        this._renderDetail();
      },

      _detailToggleSub(idx) {
        if (!this._detail) return;
        this._detail.subtasks[idx].done = !this._detail.subtasks[idx].done;
        this._renderDetail();
      },

      async _saveDetail() {
        if (!this._detail) return;
        const d = this._detail;
        if (!d.text.trim()) { toast('O item precisa de um texto'); return; }
        const idx = this._rec.data.items.findIndex(i => i.id === d.id);
        if (idx >= 0) this._rec.data.items[idx] = d;
        await this._save();
        this._closeDetail();
        this._renderLista();
        toast('💾 Salvo!');
      },

      async _deleteFromDetail() {
        if (!this._detail) return;
        const id = this._detail.id;
        this._closeDetail();
        await this._deleteItem(id);
      },

      /* ══════════════════════════════════════
         DRAG AND DROP
      ══════════════════════════════════════ */
      _initDrag() { /* handlers já estão inline nos elementos */ },

      _onDragStart(e, id) {
        this._dragSrc = id;
        setTimeout(() => { const el = document.getElementById('ls_item_' + id); if (el) el.classList.add('dragging'); }, 0);
      },

      _onDragOver(e, id) {
        e.preventDefault();
        document.querySelectorAll('.ls-item.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (id !== this._dragSrc) { const el = document.getElementById('ls_item_' + id); if (el) el.classList.add('drag-over'); }
      },

      _onDrop(e, targetId) {
        e.preventDefault();
        const srcId = this._dragSrc;
        if (!srcId || srcId === targetId) return;
        const items = this._rec.data.items;
        const srcIdx = items.findIndex(i => i.id === srcId);
        const tgtIdx = items.findIndex(i => i.id === targetId);
        if (srcIdx < 0 || tgtIdx < 0) return;
        const [moved] = items.splice(srcIdx, 1);
        items.splice(tgtIdx, 0, moved);
        this._save().then(() => this._renderLista());
      },

      _onDragEnd() {
        document.querySelectorAll('.ls-item.dragging,.ls-item.drag-over').forEach(el => {
          el.classList.remove('dragging', 'drag-over');
        });
        this._dragSrc = null;
      },

      /* ══════════════════════════════════════
         MODO FOCO
      ══════════════════════════════════════ */
      _renderFoco() {
        const cont = document.getElementById('ls_content');
        const pending = (this._rec.data.items || []).filter(i => !i.done);

        if (!pending.length) {
          cont.innerHTML =
            '<div class="ls-focus-wrap">' +
            '<div class="ls-focus-empty">' +
            '<span style="font-size:48px;display:block;margin-bottom:12px">🎉</span>' +
            'Tudo feito! Nenhum item pendente.' +
            '</div>' +
            '</div>';
          return;
        }

        /* ordena por prioridade */
        const order = { alta: 0, media: 1, baixa: 2, none: 3 };
        const sorted = [...pending].sort((a, b) => (order[a.priority] || 3) - (order[b.priority] || 3));

        if (this._focusIdx >= sorted.length) this._focusIdx = 0;
        const item = sorted[this._focusIdx];
        const tags = this._rec.data.tags || [];
        const due = item.dueDate ? this._dueTxt(item.dueDate) : null;
        const pct = Math.round((this._focusIdx) / sorted.length * 100);

        const prioColor = item.priority === 'alta' ? '#f05f5f' : item.priority === 'media' ? '#f5bb45' : '#3ecf7a';
        const prioLabel = item.priority === 'alta' ? 'ALTA' : item.priority === 'media' ? 'MÉDIA' : item.priority === 'baixa' ? 'BAIXA' : '—';

        let tagsHtml = '';
        (item.tags || []).forEach(tid => {
          const tag = tags.find(t => t.id === tid || t.label === tid);
          if (tag) tagsHtml += '<span class="ls-item-tag" style="background:' + tag.color + '22;color:' + tag.color + '">' + esc(tag.label) + '</span>';
        });

        cont.innerHTML =
          '<div class="ls-focus-wrap">' +
          '<span class="ls-focus-pct">' + pct + '% COMPLETO · ' + this._focusIdx + '/' + sorted.length + ' FEITOS</span>' +
          '<div class="ls-focus-card">' +
          (item.priority !== 'none' ? '<span class="ls-focus-tag" style="background:' + prioColor + '22;color:' + prioColor + '">' + prioLabel + '</span>' : '') +
          (tagsHtml ? '<div style="margin-bottom:8px">' + tagsHtml + '</div>' : '') +
          '<div class="ls-focus-text">' + esc(item.text) + '</div>' +
          (item.note ? '<div class="ls-focus-note">' + esc(item.note) + '</div>' : '') +
          (due ? '<div class="ls-focus-due">📅 ' + esc(due) + '</div>' : '') +
          '<button class="ls-focus-done-btn" onclick="App.activePlugin._focusDone(\'' + item.id + '\',' + JSON.stringify(sorted.map(i => i.id)).replace(/"/g, "'") + ')">✓</button>' +
          '<div style="font-size:12px;color:var(--text3)">Toque para concluir</div>' +
          '</div>' +
          '<div class="ls-focus-nav">' +
          (this._focusIdx > 0 ? '<button class="ls-focus-nav-btn" onclick="App.activePlugin._focusIdx--;App.activePlugin._renderFoco()">← Anterior</button>' : '') +
          (this._focusIdx < sorted.length - 1 ? '<button class="ls-focus-nav-btn" onclick="App.activePlugin._focusIdx++;App.activePlugin._renderFoco()">Próximo →</button>' : '') +
          '</div>' +
          '</div>';
      },

      async _focusDone(id, orderedIds) {
        await this._toggleDone(id);
        const newPending = (this._rec.data.items || []).filter(i => !i.done);
        if (!newPending.length) { this._focusIdx = 0; this._renderFoco(); return; }
        /* mantém posição relativa */
        const nextIdx = orderedIds.indexOf(id) + 1;
        this._focusIdx = Math.min(nextIdx, newPending.length - 1);
        this._renderFoco();
      },

      /* ══════════════════════════════════════
         ESTATÍSTICAS
      ══════════════════════════════════════ */
      _renderStats() {
        const cont = document.getElementById('ls_content');
        const items = this._rec.data.items || [];
        const total = items.length;
        const done = items.filter(i => i.done).length;
        const pct = total ? Math.round(done / total * 100) : 0;

        const overdue = items.filter(i => !i.done && i.dueDate && i.dueDate < Date.now()).length;
        const today = items.filter(i => !i.done && i.dueDate && this._isToday(i.dueDate)).length;
        const withSubs = items.filter(i => (i.subtasks || []).length > 0).length;
        const subTotal = items.reduce((s, i) => s + (i.subtasks || []).length, 0);
        const subDone = items.reduce((s, i) => s + (i.subtasks || []).filter(st => st.done).length, 0);

        const prioMap = { alta: 0, media: 0, baixa: 0, none: 0 };
